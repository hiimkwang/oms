spring.application.name=oms


spring.datasource.url=jdbc:mysql://127.0.0.1:3306/oms?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=admin
spring.datasource.password=Passla@1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false
app.upload.dir=E:/Quang Workspace/Order Management System/oms/media/
app.upload.domain=http://localhost:8080/media/
spring.jackson.date-format=dd/MM/yyyy HH:mm
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# Cảnh báo tồn kho thấp: ngưỡng tồn (<=) và lịch quét (cron). Mặc định 8h sáng mỗi ngày.
app.inventory.low-stock-threshold=5
app.inventory.low-stock-cron=0 0 8 * * *

# Giới hạn dung lượng upload (file đối soát sàn, ảnh chứng từ)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

# Backup database tự động
app.backup.enabled=true
app.backup.dir=E:/Quang-Wordspace/OMS/backups
app.backup.mysqldump-path=mysqldump
app.backup.cron=0 0 1 * * *
app.backup.keep-days=14