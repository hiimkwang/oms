<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">
    <style>
        /* Thống nhất style chuẩn hệ thống */
        .filter-btn {
            background: white;
            border: 1px solid #dce0e4;
            color: #4b566b;
            font-size: 13px;
            font-weight: 500;
            height: 36px;
            display: flex;
            align-items: center;
        }

        .filter-btn:hover {
            background-color: #f8f9fb;
            border-color: #cbd5e1;
        }

        .table-custom thead th {
            background: #f8f9fb;
            color: #4b566b;
            font-weight: 600;
            font-size: 13px;
            border-top: 1px solid #dee2e6;
            padding: 12px 10px;
        }

        .table-custom td {
            vertical-align: middle;
            font-size: 13px;
            color: #2b3445;
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .nav-tabs-custom .nav-link {
            border: none;
            color: #666;
            font-weight: 500;
            padding: 10px 20px;
            font-size: 14px;
            position: relative;
        }

        .nav-tabs-custom .nav-link.active {
            color: #0d6efd;
            background: transparent;
        }

        .nav-tabs-custom .nav-link.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0d6efd;
        }

        .search-box {
            max-width: 500px;
            border: 1px solid #dce0e4;
            border-radius: 6px;
            background: white;
            transition: all 0.2s ease-in-out;
        }

        .search-box:focus-within {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, .25);
        }

        .search-box .input-group-text {
            background: transparent;
            border: none;
            padding-right: 8px;
        }

        .search-box .form-control {
            border: none;
            background: transparent;
            box-shadow: none;
            padding-left: 0;
            font-size: 13px;
            height: 34px;
        }

        .badge-status {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 11px;
        }

        .cursor-pointer {
            cursor: pointer;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
        <h4 class="fw-bold mb-0 text-dark">Danh sách trả hàng</h4>
        <div class="d-flex gap-2">
            <button class="btn filter-btn px-3 shadow-sm"><i class="bi bi-upload me-2"></i>Xuất file</button>
        </div>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 8px;">

        <div class="card-header bg-white border-0 p-0">
            <ul class="nav nav-tabs nav-tabs-custom border-bottom px-3">
                <li class="nav-item"><a class="nav-link active" th:href="@{/ui/returns}">Tất cả phiếu trả</a></li>
            </ul>
        </div>

        <form id="filterForm" method="GET" th:action="@{/ui/returns}" class="m-0">
            <div id="defaultToolbar"
                 class="p-3 d-flex justify-content-between align-items-center gap-2 flex-wrap bg-white">
                <div class="input-group search-box flex-grow-1">
                    <span class="input-group-text"><i class="bi bi-search fs-5 text-muted"></i></span>
                    <input type="text" name="keyword" th:value="${param.keyword}" class="form-control"
                           placeholder="Tìm kiếm theo mã trả hàng, mã đơn gốc...">
                </div>

                <div class="d-flex gap-2">
                    <select name="status" class="form-select filter-btn w-auto" onchange="this.form.submit()">
                        <option value="">Tất cả trạng thái</option>
                        <option value="PROCESSING"
                                th:selected="${#strings.equals(param.status, 'PROCESSING')}">Đang xử lý
                        </option>
                        <option value="COMPLETED"
                                th:selected="${#strings.equals(param.status, 'COMPLETED')}">Đã hoàn tất
                        </option>
                    </select>

                    <button type="button" class="btn filter-btn px-3" data-bs-toggle="offcanvas"
                            data-bs-target="#offcanvasFilters">
                        <i class="bi bi-funnel me-2"></i>Bộ lọc khác
                    </button>
                    <button type="button" class="btn filter-btn px-3" onclick="window.location.href='/ui/returns'">
                        <i class="bi bi-arrow-clockwise me-2"></i>Làm mới
                    </button>
                </div>
                <button type="submit" class="d-none"></button>
            </div>

            <div class="offcanvas offcanvas-end shadow" tabindex="-1" id="offcanvasFilters"
                 aria-labelledby="offcanvasFiltersLabel" style="width: 400px;">
                <div class="offcanvas-header border-bottom py-3">
                    <h5 class="offcanvas-title fw-bold text-dark fs-5" id="offcanvasFiltersLabel">Bộ lọc khác</h5>
                    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"
                            aria-label="Close"></button>
                </div>
                <div class="offcanvas-body p-0" style="overflow-y: auto;">
                    <div class="list-group list-group-flush">
                        <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3 border-bottom border-light"
                           href="javascript:void(0)">
                            <span class="text-dark">Ngày tạo</span> <i class="bi bi-chevron-right text-muted small"></i>
                        </a>
                    </div>
                </div>
                <div class="offcanvas-footer border-top p-3 d-flex justify-content-between align-items-center bg-white sticky-bottom">
                    <button type="button" class="btn btn-outline-danger fw-medium px-4"
                            onclick="window.location.href='/ui/returns'">Xóa bộ lọc
                    </button>
                    <button type="submit" class="btn btn-primary fw-bold px-5">Áp dụng Lọc</button>
                </div>
            </div>
        </form>

        <div id="bulkActionBar" class="d-none align-items-center justify-content-between p-2 px-3"
             style="background-color: #f0f8ff; border-top: 1px solid #dce0e4; border-bottom: 1px solid #dce0e4;">
            <div class="d-flex align-items-center gap-3">
                <span class="fw-medium" style="color: #0369a1; font-size: 13px;">
                    Đã chọn <span id="selectedCount" class="fw-bold fs-6">0</span> phiếu trả hàng
                </span>
                <span class="text-muted small">|</span>
                <a href="javascript:void(0)" class="text-decoration-none fw-medium"
                   style="color: #0369a1; font-size: 13px;" onclick="clearSelection()">Bỏ chọn</a>
            </div>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-white border-danger text-danger fw-medium px-4 shadow-sm"
                        style="font-size: 13px; padding-top: 6px; padding-bottom: 6px;"
                        onclick="deleteSelected()">
                    Xóa phiếu
                </button>
            </div>
        </div>

        <div class="table-responsive" style="min-height: 300px;">
            <table class="table table-custom table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-4" style="width: 40px;">
                        <input class="form-check-input" type="checkbox" id="checkAll" onchange="toggleAll(this)">
                    </th>
                    <th>Mã trả hàng</th>
                    <th>Ngày tạo</th>
                    <th>Mã đơn gốc</th>
                    <th>Lý do</th>
                    <th class="text-end">Tiền hoàn trả</th>
                    <th class="text-center pe-4">Trạng thái</th>
                </tr>
                </thead>
                <tbody>

                <tr th:each="r : ${returns}" class="cursor-pointer main-row"
                    th:data-url="@{/ui/returns/{code}(code=${r.returnCode})}"
                    onclick="window.location.href=this.getAttribute('data-url')">
                    <td class="ps-4" onclick="event.stopPropagation();">
                        <input class="form-check-input item-check" type="checkbox" th:value="${r.id}"
                               onchange="updateBulkAction()">
                    </td>
                    <td>
                        <a th:href="@{/ui/returns/{code}(code=${r.returnCode})}"
                           onclick="event.stopPropagation();"
                           class="fw-bold text-primary text-decoration-none" th:text="${r.returnCode}"></a>
                    </td>
                    <td class="text-muted" th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <a th:href="@{/ui/orders/{code}(code=${r.originalOrder.orderCode})}"
                           onclick="event.stopPropagation();"
                           class="text-dark fw-medium text-decoration-none"><i class="bi bi-box-seam me-1"></i> <span
                                th:text="${r.originalOrder.orderCode}"></span></a>
                    </td>
                    <td>
                        <span class="text-danger fw-medium" th:text="${r.reason}"></span>
                    </td>
                    <td class="text-end fw-bold text-dark"
                        th:text="${#numbers.formatDecimal(r.totalRefundAmount, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
                    <td class="text-center pe-4">
                        <span class="badge-status"
                              th:classappend="${r.status == 'COMPLETED' ? 'bg-success text-white' : 'bg-warning text-dark'}"
                              th:text="${r.status == 'COMPLETED' ? 'Đã hoàn tất' : 'Đang xử lý'}">
                        </span>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(returns)}">
                    <td colspan="7" class="text-center py-5 text-muted">
                        <i class="bi bi-arrow-counterclockwise fs-2 d-block mb-2"></i>Chưa có yêu cầu trả hàng nào.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="p-3 d-flex justify-content-between align-items-center border-top bg-white">
            <div class="text-muted small" id="recordInfo">
                <span th:if="${returns != null and not #lists.isEmpty(returns)}"
                      th:text="'Hiển thị 1 - ' + ${#lists.size(returns)} + ' trên tổng số ' + ${#lists.size(returns)} + ' phiếu trả hàng'"></span>
                <span th:unless="${returns != null and not #lists.isEmpty(returns)}">Hiển thị 0 phiếu trả hàng</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center gap-2">
                    <span class="small text-muted">Hiển thị</span>
                    <select class="form-select form-select-sm w-auto">
                        <option>20</option>
                    </select>
                    <span class="small text-muted">kết quả</span>
                </div>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item disabled"><a class="page-link" href="#"><i class="bi bi-chevron-left"></i></a>
                        </li>
                        <li class="page-item active"><a class="page-link" href="#">1</a></li>
                        <li class="page-item disabled"><a class="page-link" href="#"><i class="bi bi-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

    </div>

    <script th:inline="javascript">
        // Xử lý Checkbox & Bulk Actions
        function toggleAll(source) {
            const checkboxes = document.querySelectorAll('.item-check');
            checkboxes.forEach(cb => cb.checked = source.checked);
            document.getElementById('checkAll').checked = source.checked;
            updateBulkAction();
        }

        function clearSelection() {
            document.querySelectorAll('.item-check, #checkAll').forEach(cb => cb.checked = false);
            updateBulkAction();
        }

        function updateBulkAction() {
            const count = document.querySelectorAll('.item-check:checked').length;
            const bulkBar = document.getElementById('bulkActionBar');
            const toolbar = document.getElementById('defaultToolbar');

            if (count > 0) {
                document.getElementById('selectedCount').innerText = count;
                toolbar.classList.add('d-none');
                bulkBar.classList.remove('d-none');
                bulkBar.classList.add('d-flex');
            } else {
                toolbar.classList.remove('d-none');
                bulkBar.classList.add('d-none');
                bulkBar.classList.remove('d-flex');
            }
        }

        async function deleteSelected() {
            const checkedBoxes = document.querySelectorAll('.item-check:checked');

            if (checkedBoxes.length === 0) {
                Toast.fire({
                    icon: 'warning',
                    title: 'Vui lòng chọn ít nhất 1 phiếu trả hàng để xóa!'
                });
                return;
            }

            const ids = Array.from(checkedBoxes).map(cb => Number(cb.value));

            const confirmation = await Swal.fire({
                title: 'Xác nhận xóa hàng loạt',
                text: `Bạn có chắc chắn muốn xóa vĩnh viễn ${ids.length} phiếu trả hàng đã chọn? Dữ liệu chi tiết và lịch sử cũng sẽ bị xóa sạch.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Xác nhận xóa',
                cancelButtonText: 'Hủy bỏ'
            });

            if (!confirmation.isConfirmed) return;

            try {
                const res = await fetch('/api/v1/returns/bulk', {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(ids)
                });

                if (res.ok) {
                    await Toast.fire({
                        icon: 'success',
                        title: `Đã xóa thành công ${ids.length} phiếu!`
                    });
                    window.location.reload();
                } else {
                    const errText = await res.text();
                    Toast.fire({
                        icon: 'error',
                        title: 'Lỗi: ' + (errText || 'Không thể xóa phiếu!')
                    });
                }
            } catch (err) {
                Toast.fire({
                    icon: 'error',
                    title: 'Lỗi kết nối đến máy chủ!'
                });
            }
        }
    </script>
</div>
</body>
</html>
