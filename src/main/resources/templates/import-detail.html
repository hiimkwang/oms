<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">
    <style>
        .detail-card-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label {
            font-size: 13px;
            color: #666;
            width: 150px;
            flex-shrink: 0;
        }

        .info-value {
            font-size: 13px;
            color: #333;
            font-weight: 500;
        }

        .status-header-badge {
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 10px;
            border: 1px solid;
        }

        /* Màu sắc Badge Header */
        .badge-trading {
            background: #f1f5f9;
            color: #475569;
            border-color: #cbd5e1;
        }

        /* Đang giao dịch -> Xám */
        .badge-completed {
            background: #e6f6ee;
            color: #008a47;
            border-color: #c2ebd5;
        }

        /* Hoàn thành -> Xanh lá */
        .badge-cancelled {
            background: #fef2f2;
            color: #dc2626;
            border-color: #fecaca;
        }

        /* Timeline */
        .timeline-item {
            border-left: 2px solid #e2e8f0;
            padding-left: 20px;
            position: relative;
            padding-bottom: 15px;
        }

        .timeline-item::before {
            content: "";
            position: absolute;
            left: -7px;
            top: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #3b82f6;
        }

        /* Tiện ích màu sắc */
        .text-success-custom {
            color: #008a47 !important;
        }

        .text-warning-custom {
            color: #ff9800 !important;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/ui/imports}" class="btn btn-white border px-2 py-1"><i class="bi bi-arrow-left"></i></a>
            <h4 class="fw-bold mb-0" th:text="${order.code}"></h4>
            <span class="text-muted small" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>

            <span class="status-header-badge"
                  th:classappend="${order.status == 'CANCELLED' ? 'badge-cancelled' : (order.status == 'COMPLETED' ? 'badge-completed' : 'badge-trading')}"
                  th:text="${order.status == 'CANCELLED' ? 'Đã hủy' : (order.status == 'COMPLETED' ? 'Hoàn thành' : 'Đang giao dịch')}">
            </span>
        </div>
        <div class="d-flex gap-2">
            <th:block th:if="${order.status == 'TRADING' && order.importStatus != 'COMPLETED'}">
                <button class="btn btn-white border btn-sm px-3"><i class="bi bi-pencil me-1"></i> Sửa đơn</button>
                <div class="dropdown">
                    <button class="btn btn-white border btn-sm px-3 dropdown-toggle" data-bs-toggle="dropdown">Thao tác
                        khác
                    </button>
                    <ul class="dropdown-menu shadow-sm">
                        <li><a class="dropdown-item text-danger" href="javascript:void(0)"
                               th:onclick="'cancelOrder(' + ${order.id} + ')'">Hủy đơn</a></li>
                    </ul>
                </div>
            </th:block>
            <button class="btn btn-white border btn-sm px-3"><i class="bi bi-printer me-1"></i> In đơn</button>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4">
                    <div class="detail-card-title"
                         th:classappend="${order.importStatus == 'COMPLETED' ? 'text-success-custom' : 'text-warning-custom'}">
                        <i th:class="${order.importStatus == 'COMPLETED' ? 'bi bi-check-circle-fill' : 'bi bi-clock-history'}"></i>
                        <span th:text="${order.importStatus == 'COMPLETED' ? 'Đã nhập hàng' : 'Chưa nhập kho'}"></span>
                    </div>
                    <table class="table table-borderless align-middle mb-4">
                        <thead class="border-bottom">
                        <tr class="text-muted small">
                            <th style="width: 50%">Sản phẩm</th>
                            <th class="text-center">Số lượng</th>
                            <th class="text-end">Đơn giá</th>
                            <th class="text-end pe-0">Thành tiền</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${order.details}" class="border-bottom">
                            <td class="py-3">
                                <div class="d-flex align-items-center gap-3">
                                    <div class="bg-light rounded d-flex align-items-center justify-content-center"
                                         style="width:40px; height:40px;"><i class="bi bi-box-seam"></i></div>
                                    <div>
                                        <div class="text-primary fw-medium" th:text="${item.productName}"></div>
                                        <div class="text-muted small" th:text="${item.sku}"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="text-center fw-medium" th:text="${item.quantity}"></td>
                            <td class="text-end"
                                th:text="${#numbers.formatDecimal(item.importPrice, 0, 'COMMA', 0, 'POINT') + '₫'}"></td>
                            <td class="text-end fw-bold pe-0"
                                th:text="${#numbers.formatDecimal(item.importPrice * item.quantity, 0, 'COMMA', 0, 'POINT') + '₫'}"></td>
                        </tr>
                        </tbody>
                    </table>
                    <div class="text-end" th:if="${order.importStatus != 'COMPLETED' && order.status != 'CANCELLED'}">
                        <button class="btn btn-primary fw-bold px-4 shadow-sm"
                                th:onclick="'confirmReceive(' + ${order.id} + ')'">Nhập kho
                        </button>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4">
                    <div class="detail-card-title"
                         th:classappend="${order.paymentStatus == 'PAID' ? 'text-success-custom' : 'text-warning-custom'}">
                        <i th:class="${order.paymentStatus == 'PAID' ? 'bi bi-check-circle-fill' : 'bi bi-wallet2'}"></i>
                        <span th:text="${order.paymentStatus == 'PAID' ? 'Đã thanh toán' : 'Chưa thanh toán'}"></span>
                    </div>
                    <div class="d-flex flex-column gap-2 mb-4 ms-auto" style="max-width: 300px;">
                        <div class="d-flex justify-content-between text-muted"><span>Tổng tiền</span><span
                                th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + '₫'}"></span>
                        </div>
                        <div class="d-flex justify-content-between fw-bold text-dark fs-5 pt-2 border-top"><span>Tiền cần trả NCC</span><span
                                th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + '₫'}"></span>
                        </div>
                    </div>
                    <div class="text-end" th:if="${order.paymentStatus != 'PAID' && order.status != 'CANCELLED'}">
                        <button class="btn btn-primary fw-bold px-4 shadow-sm"
                                th:onclick="'confirmPayment(' + ${order.id} + ')'">Xác nhận thanh toán
                        </button>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="detail-card-title">Lịch sử đơn nhập hàng</div>
                    <div class="timeline mt-3">
                        <div class="timeline-item" th:each="activity : ${order.activities}">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <span class="fw-bold"
                                          th:text="${#temporals.format(activity.createdAt, 'HH:mm')}"></span>
                                    <span class="ms-3 fw-bold text-dark" th:text="${activity.creatorName}"></span>
                                    <span class="ms-2" th:text="${activity.action}"></span>
                                </div>
                                <div class="text-muted small"
                                     th:text="${#temporals.format(activity.createdAt, 'dd/MM/yyyy')}"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4">
                    <div class="detail-card-title">Nhà cung cấp</div>
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
                             style="width:40px; height:40px;"><i class="bi bi-person"></i></div>
                        <div class="fw-bold text-primary" th:text="${order.supplier.name}"></div>
                    </div>
                    <div class="mb-2"><span class="info-label">Mã NCC:</span><span class="info-value"
                                                                                   th:text="${order.supplier.code}"></span>
                    </div>
                    <div class="mb-2"><span class="info-label">Số điện thoại:</span><span class="info-value"
                                                                                          th:text="${order.supplier.phone}"></span>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4">
                    <div class="detail-card-title">Thông tin bổ sung</div>
                    <div class="mb-3"><label class="info-label d-block mb-1">Chi nhánh nhập</label>
                        <div class="info-value p-2 bg-light rounded" th:text="${order.branchName}"></div>
                    </div>
                    <div class="mb-3"><label class="info-label d-block mb-1">Nhân viên phụ trách</label>
                        <div class="info-value p-2 bg-light rounded" th:text="${order.creatorName}"></div>
                    </div>
                    <div><label class="info-label d-block mb-1">Ghi chú</label>
                        <div class="info-value p-2 bg-light rounded" th:text="${order.note ?: '---'}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function confirmReceive(id) {
            if (!confirm("Xác nhận nhập kho và tính lại giá vốn bình quân?")) return;
            postAction(`/api/v1/imports/${id}/receive`, "Nhập kho thành công!");
        }

        function confirmPayment(id) {
            if (!confirm("Xác nhận đã thanh toán cho đơn hàng này?")) return;
            postAction(`/api/v1/imports/${id}/payment`, "Xác nhận thanh toán thành công!");
        }

        function cancelOrder(id) {
            if (!confirm("Bạn có chắc chắn muốn hủy đơn hàng này?")) return;
            postAction(`/api/v1/imports/${id}/cancel`, "Đã hủy đơn hàng!");
        }

        function postAction(url, successMsg) {
            fetch(url, {method: 'POST', headers: {'Content-Type': 'application/json'}})
                .then(res => {
                    if (res.ok) {
                        alert(successMsg);
                        location.reload();
                    } else {
                        res.text().then(text => alert("Lỗi: " + text));
                    }
                })
                .catch(err => alert("Lỗi kết nối máy chủ!"));
        }
    </script>
</div>
</body>
</html>
