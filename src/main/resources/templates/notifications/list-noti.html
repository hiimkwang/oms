<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.noti-container})}">
<body>
<div class="noti-container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4 pt-3">
        <h4 class="fw-bold"><i class="bi bi-bell me-2"></i>Tất cả thông báo</h4>
        <button class="btn btn-outline-primary btn-sm fw-bold" onclick="markAllRead()">
            <i class="bi bi-check2-all me-1"></i> Đánh dấu tất cả đã đọc
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
        <div class="list-group list-group-flush">
            <div th:each="n : ${notifications}"
                 th:classappend="${n.read ? '' : 'bg-light border-start border-primary border-4'}"
                 class="list-group-item list-group-item-action p-3"
                 th:onclick="|handleNotiClick(${n.id}, '${n.link}')|"
                 style="cursor: pointer;">

                <div class="d-flex gap-3">
                    <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                         style="width: 45px; height: 45px;"
                         th:classappend="${n.type.name() == 'ORDER' ? 'bg-primary-subtle text-primary' :
                                          (n.type.name() == 'PAYMENT' ? 'bg-success-subtle text-success' : 'bg-info-subtle text-info')}">
                        <i class="bi" th:classappend="${n.type.name() == 'ORDER' ? 'bi-cart-check' :
                                                       (n.type.name() == 'PAYMENT' ? 'bi-cash-coin' : 'bi-info-circle')}"></i>
                    </div>

                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between align-items-start">
                            <h6 class="mb-1 fw-bold text-dark" th:text="${n.title}">Tiêu đề</h6>
                            <small class="text-muted" th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm')}">Thời
                                gian</small>
                        </div>
                        <p class="mb-1 text-secondary small" th:text="${n.message}">Nội dung thông báo...</p>
                        <span th:if="${!n.read}" class="badge bg-primary rounded-pill"
                              style="font-size: 9px;">Mới</span>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(notifications)}" class="text-center py-5">
                <i class="bi bi-bell-slash fs-1 text-muted opacity-25"></i>
                <p class="mt-3 text-muted">Bạn chưa có thông báo nào.</p>
            </div>
        </div>
    </div>
</div>

<script>
    async function markAllRead() {
        await fetch('/api/notifications/mark-all-read', {method: 'POST'});
        window.location.reload();
    }
</script>
</body>
</html>
