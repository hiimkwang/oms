<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">

    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <style>
        .oms-input {
            background-color: #f8f9fa;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        .oms-input:focus {
            background-color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }

        .card-title-custom {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        .form-label {
            font-size: 0.85rem;
            color: #475569;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .ts-control {
            border: 1px solid #e2e8f0 !important;
            border-radius: 6px !important;
            box-shadow: none !important;
            padding: 6px 10px !important;
            background-color: #f8f9fa !important;
            min-height: 38px;
        }

        .ts-control.focus {
            background-color: #ffffff !important;
            border-color: #3b82f6 !important;
        }

        .ts-control > input {
            font-size: 0.875rem;
        }

        .ts-wrapper.multi .ts-control > div {
            background: #f1f5f9 !important;
            color: #334155 !important;
            border: 1px solid #cbd5e1 !important;
            border-radius: 4px;
            padding: 2px 8px;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .ts-wrapper.multi .ts-control > div .remove {
            border-left-color: #cbd5e1 !important;
            color: #64748b !important;
        }

        .ts-wrapper.multi .ts-control > div .remove:hover {
            background: #e2e8f0 !important;
            color: #ef4444 !important;
        }

        .ts-dropdown .create {
            color: #0284c7 !important;
            font-weight: 600;
        }

        .btn-remove-attr {
            color: #94a3b8;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-remove-attr:hover {
            color: #ef4444;
        }

        #variantTableContainer th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
            font-size: 0.85rem;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 sticky-top bg-white py-3 shadow-sm px-4 rounded-bottom"
         style="z-index: 1000; top: 64px; margin-left: -30px; margin-right: -30px;">
        <div class="d-flex align-items-center gap-3">
            <a href="/ui/products" class="btn btn-light border"><i class="bi bi-arrow-left"></i></a>
            <h4 class="fw-bold mb-0 text-dark">Thêm sản phẩm</h4>
        </div>
        <div class="d-flex gap-2">
            <a href="/ui/products" class="btn btn-light border fw-medium px-4">Hủy</a>
            <button class="btn btn-primary fw-bold px-4 shadow-sm" onclick="saveProduct()">Lưu sản phẩm</button>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="card-title-custom">Thông tin sản phẩm</div>
                <div class="mb-3">
                    <label class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
                    <input type="text" id="name" class="form-control oms-input py-2"
                           placeholder="Nhập tên sản phẩm (tối đa 320 ký tự)" required>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Mã SKU</label>
                        <input type="text" id="sku" class="form-control oms-input py-2"
                               placeholder="Để trống để tự động sinh">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mã vạch/ Barcode</label>
                        <input type="text" class="form-control oms-input py-2" placeholder="Nhập mã vạch/ Barcode">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Đơn vị tính <span class="text-danger">*</span></label>
                    <select id="unit" class="form-control" placeholder="Chọn hoặc nhập để thêm mới...">
                        <option value="">Chọn đơn vị tính</option>
                        <option th:each="u : ${units}" th:value="${u}" th:text="${u}"></option>
                    </select>
                </div>
                <div class="mb-2">
                    <label class="form-label">Mô tả</label>
                    <div class="border rounded bg-white">
                        <div class="bg-light border-bottom p-2 d-flex gap-2 text-muted">
                            <i class="bi bi-type-bold px-2 cursor-pointer"></i>
                            <i class="bi bi-type-italic px-2"></i>
                            <i class="bi bi-type-underline px-2"></i>
                            <i class="bi bi-list-ul px-2"></i>
                            <i class="bi bi-image px-2"></i>
                        </div>
                        <textarea id="description" class="form-control border-0 p-3" rows="6"
                                  placeholder="Nhập mô tả sản phẩm..."></textarea>
                    </div>
                </div>
            </div>

            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="card-title-custom">Thông tin giá</div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Giá bán</label>
                        <div class="input-group">
                            <input type="number" id="price" class="form-control oms-input text-end py-2" placeholder="0"
                                   oninput="generateVariantTable()">
                            <span class="input-group-text bg-light text-muted border-light">đ</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Giá so sánh</label>
                        <div class="input-group">
                            <input type="number" class="form-control oms-input text-end py-2" placeholder="0">
                            <span class="input-group-text bg-light text-muted border-light">đ</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="card-title-custom mb-0">Phân loại & Thuộc tính</div>
                </div>

                <div id="attributesContainer">
                    <div class="row g-2 mb-3 align-items-start attr-row">
                        <div class="col-md-3">
                            <label class="form-label">Tên thuộc tính</label>
                            <input type="text" class="form-control oms-input attr-name-input" value="Kích thước"
                                   placeholder="VD: Kích thước...">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Giá trị</label>
                            <input type="text" class="tag-input" placeholder="Nhập giá trị và ấn enter">
                        </div>
                        <div class="col-md-1 d-flex justify-content-center pt-4 mt-1">
                            <i class="bi bi-trash fs-5 btn-remove-attr"></i>
                        </div>
                    </div>
                </div>

                <div>
                    <button class="btn btn-link text-decoration-none p-0 fw-medium" onclick="addAttributeRow()">
                        <i class="bi bi-plus-circle me-1"></i>Thêm thuộc tính khác
                    </button>
                </div>

                <div class="mt-4 pt-4 border-top d-none" id="variantTableContainer">
                    <h6 class="fw-bold mb-3 text-dark">Cấu hình biến thể chi tiết</h6>
                    <div class="table-responsive">
                        <table class="table table-bordered align-middle text-center mb-0">
                            <thead id="variantTableHead">
                            </thead>
                            <tbody id="variantTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="card-title-custom">Thông tin kho</div>
                <div class="mb-4">
                    <label class="form-label">Lưu kho tại</label>
                    <select class="form-select oms-input py-2">
                        <option>Cửa hàng chính</option>
                    </select>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="manageStock" checked>
                    <label class="form-check-label text-dark" for="manageStock">Quản lý số lượng tồn kho</label>
                </div>
                <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-3">
                    <div>
                        <div class="fw-medium text-dark">Cửa hàng chính</div>
                        <a href="#" class="text-decoration-none small">Vị trí lưu kho</a>
                    </div>
                    <div style="width: 150px;">
                        <label class="form-label mb-1">Tồn kho ban đầu</label>
                        <input type="number" id="stockQuantity" class="form-control oms-input text-end" value="0">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="card-title-custom">Ảnh sản phẩm chính</div>
                <div class="text-center bg-light border-dashed rounded p-3 text-muted position-relative"
                     style="border: 2px dashed #cbd5e1; cursor: pointer; min-height: 160px; display: flex; align-items: center; justify-content: center;"
                     onclick="document.getElementById('mainImageInput').click()">

                    <div id="mainImagePlaceholder">
                        <i class="bi bi-cloud-arrow-up fs-2"></i>
                        <p class="mt-2 mb-0 fw-medium small">Click để tải ảnh lên</p>
                    </div>

                    <img id="mainImagePreview" src="" class="img-fluid rounded d-none"
                         style="max-height: 140px; object-fit: contain;">

                    <input type="file" id="mainImageInput" class="d-none" accept="image/*"
                           onchange="uploadMainImage(this)">
                </div>
                <input type="hidden" id="imageUrl" value="">
            </div>

            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="mb-3">
                    <label class="form-label">Danh mục</label>
                    <select id="category" class="form-control" placeholder="Chọn danh mục...">
                        <option value="">Chọn danh mục</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nhãn hiệu (Hãng)</label>
                    <select id="brand" class="form-control" placeholder="Chọn nhãn hiệu...">
                        <option value="">Chọn nhãn hiệu</option>
                        <option th:each="b : ${brands}" th:value="${b}" th:text="${b}"></option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Tag</label>
                    <input type="text" id="tags" class="form-control" placeholder="Nhập tag và ấn enter...">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            // 1. Config Quick Add cho Hãng và Đơn vị tính (Dùng Master Data)
            const masterDataConfig = {
                create: function (input, callback) {
                    let dataType = 'BRAND';
                    if (this.input.id === 'unit') dataType = 'UNIT';

                    fetch('/api/v1/settings/master-data/quick-add', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({type: dataType, value: input})
                    }).then(res => res.ok ? res.json() : Promise.reject())
                        .then(data => callback({value: data.dataValue, text: data.dataValue}))
                        .catch(() => callback(false));
                },
                render: {
                    option_create: function (data, escape) {
                        return `<div class="create fw-semibold p-2 text-primary"><i class="bi bi-plus-circle me-1"></i> Thêm mới: <strong>${escape(data.input)}</strong></div>`;
                    }
                }
            };

            // 2. Config Quick Add cho Danh mục (Dùng API Category mới)
            const categoryConfig = {
                create: function (input, callback) {
                    const formData = new FormData();
                    formData.append("name", input);
                    formData.append("description", "Thêm nhanh từ màn hình tạo sản phẩm");

                    fetch('/api/v1/categories', {
                        method: 'POST',
                        body: formData
                    }).then(res => res.ok ? res.json() : Promise.reject())
                        .then(data => callback({value: data.id, text: data.name})) // Trả về ID và Name
                        .catch(() => callback(false));
                },
                render: {
                    option_create: function (data, escape) {
                        return `<div class="create fw-semibold p-2 text-success"><i class="bi bi-folder-plus me-1"></i> Tạo danh mục mới: <strong>${escape(data.input)}</strong></div>`;
                    }
                }
            };

            new TomSelect('#category', categoryConfig);
            new TomSelect('#brand', masterDataConfig);
            new TomSelect('#unit', masterDataConfig);
            new TomSelect('#tags', {create: true, plugins: ['remove_button']});

            initAttributeTags();
        });

        document.addEventListener('input', function (e) {
            if (e.target.classList.contains('attr-name-input')) {
                generateVariantTable();
            }
        });

        function initAttributeTags() {
            document.querySelectorAll('.tag-input').forEach(el => {
                if (!el.tomselect) {
                    new TomSelect(el, {
                        create: true,
                        plugins: ['remove_button'],
                        delimiter: ',',
                        placeholder: "Nhập giá trị và ấn enter",
                        onChange: function () {
                            generateVariantTable();
                        }
                    });
                }
            });
        }

        function addAttributeRow() {
            const container = document.getElementById('attributesContainer');
            const newRow = document.createElement('div');
            newRow.className = 'row g-2 mb-3 align-items-start attr-row';

            newRow.innerHTML = `
                <div class="col-md-3">
                    <input type="text" class="form-control oms-input attr-name-input" placeholder="Tên thuộc tính (VD: Switch)">
                </div>
                <div class="col-md-8">
                    <input type="text" class="tag-input" placeholder="Nhập giá trị và ấn enter">
                </div>
                <div class="col-md-1 d-flex justify-content-center pt-2 mt-1">
                    <i class="bi bi-trash fs-5 btn-remove-attr"></i>
                </div>
            `;
            container.appendChild(newRow);

            const allTagInputs = container.querySelectorAll('.tag-input');
            const newestInput = allTagInputs[allTagInputs.length - 1];

            new TomSelect(newestInput, {
                create: true,
                plugins: ['remove_button'],
                delimiter: ',',
                placeholder: "Nhập giá trị và ấn enter",
                onChange: function () {
                    generateVariantTable();
                }
            });

            generateVariantTable();
        }

        function generateVariantTable() {
            const container = document.getElementById('variantTableContainer');
            const thead = document.getElementById('variantTableHead');
            const tbody = document.getElementById('variantTableBody');

            let validAttributes = [];
            document.querySelectorAll('.attr-row').forEach(row => {
                const nameInput = row.querySelector('.attr-name-input');
                const attrName = nameInput ? nameInput.value.trim() : 'Thuộc tính';
                const tagInput = row.querySelector('.tag-input');

                if (tagInput && tagInput.tomselect) {
                    const values = tagInput.tomselect.getValue().split(',').filter(v => v.trim() !== '');
                    if (values.length > 0) {
                        validAttributes.push({name: attrName || 'Phân loại', values: values});
                    }
                }
            });

            if (validAttributes.length === 0) {
                container.classList.add('d-none');
                return;
            }

            let headerHtml = '<tr>';
            validAttributes.forEach(attr => {
                headerHtml += `<th class="text-start ps-3">${attr.name}</th>`;
            });
            headerHtml += `
                <th width="80">Ảnh</th>
                <th width="130">Giá bán</th>
                <th width="130">Giá nhập (Vốn)</th>
                <th width="100">Tồn kho</th>
                <th width="160">Mã SKU</th>
            </tr>`;
            thead.innerHTML = headerHtml;

            const allValues = validAttributes.map(attr => attr.values);
            const cartesian = (args) => {
                let r = [], max = args.length - 1;

                function helper(arr, i) {
                    for (let j = 0, l = args[i].length; j < l; j++) {
                        let a = arr.slice(0);
                        a.push(args[i][j]);
                        if (i === max) r.push(a);
                        else helper(a, i + 1);
                    }
                }

                helper([], 0);
                return r;
            };

            const combos = cartesian(allValues);
            const basePrice = document.getElementById('price').value || 0;
            const baseSku = document.getElementById('sku').value.trim() || 'AUTO';

            let bodyHtml = '';

            combos.forEach((combo, index) => {
                let variantSuffix = Array.isArray(combo) ? combo.join('-') : combo;
                variantSuffix = variantSuffix.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().replace(/\s+/g, '-');
                const variantSku = baseSku === 'AUTO' ? `AUTO-${variantSuffix}` : `${baseSku}-${variantSuffix}`;

                let rowHtml = '<tr>';
                combo.forEach(val => {
                    rowHtml += `<td class="fw-medium text-dark text-start ps-3 align-middle bg-light border-end-0 var-name-part">${val}</td>`;
                });

                rowHtml += `
                    <td>
                        <div class="d-flex justify-content-center">
                            <label style="cursor: pointer; margin: 0;">
                                <div class="variant-img-placeholder bg-light border rounded d-flex align-items-center justify-content-center text-muted" style="width: 36px; height: 36px;">
                                    <i class="bi bi-camera"></i>
                                </div>
                                <img class="variant-img-preview rounded border d-none" style="width: 36px; height: 36px; object-fit: cover;">
                                <input type="file" class="d-none" accept="image/*" onchange="uploadVariantImage(this)">
                            </label>
                            <input type="hidden" class="var-image" value="">
                        </div>
                    </td>
                    <td><input type="number" class="form-control form-control-sm text-end oms-input var-price" value="${basePrice}"></td>
                    <td><input type="number" class="form-control form-control-sm text-end oms-input var-cost" value="0" placeholder="Giá nhập"></td>
                    <td><input type="number" class="form-control form-control-sm text-center oms-input var-stock" value="0"></td>
                    <td><input type="text" class="form-control form-control-sm oms-input var-sku text-primary fw-medium" value="${variantSku}" readonly></td>
                </tr>`;
                bodyHtml += rowHtml;
            });

            tbody.innerHTML = bodyHtml;
            container.classList.remove('d-none');
        }

        document.addEventListener('click', function (e) {
            if (e.target.classList.contains('btn-remove-attr')) {
                e.target.closest('.attr-row').remove();
                generateVariantTable();
            }
        });

        function saveProduct() {
            const nameVal = document.getElementById("name").value.trim();
            const skuVal = document.getElementById("sku").value.trim();
            const unitVal = document.getElementById("unit").value.trim();

            if (!nameVal) {
                alert("Vui lòng nhập Tên sản phẩm!");
                document.getElementById("name").focus();
                return;
            }
            if (!unitVal) {
                alert("Vui lòng nhập Đơn vị tính (VD: Chiếc, Bộ)!");
                return;
            }

            const payload = {
                sku: skuVal,
                name: nameVal,
                imageUrl: document.getElementById("imageUrl").value.trim(),
                categoryId: document.getElementById("category").value, // Lấy ID của Category mới
                brand: document.getElementById("brand").value, // Brand lấy chuỗi text bình thường
                unit: unitVal,
                price: parseFloat(document.getElementById("price").value) || 0,
                stockQuantity: parseInt(document.getElementById("stockQuantity").value) || 0,
                minStockLevel: 0,
                description: document.getElementById("description").value,
                variants: []
            };

            const variantRows = document.querySelectorAll('#variantTableBody tr');
            variantRows.forEach(row => {
                const nameParts = Array.from(row.querySelectorAll('.var-name-part')).map(td => td.innerText);
                const variantName = nameParts.join(' - ');

                payload.variants.push({
                    variantName: variantName,
                    sku: row.querySelector('.var-sku').value,
                    imageUrl: row.querySelector('.var-image').value.trim(),
                    price: parseFloat(row.querySelector('.var-price').value) || 0,
                    costPrice: parseFloat(row.querySelector('.var-cost').value) || 0,
                    stockQuantity: parseInt(row.querySelector('.var-stock').value) || 0
                });
            });

            fetch('/api/v1/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).then(res => {
                if (res.ok) {
                    alert("Thêm sản phẩm thành công!");
                    window.location.href = '/ui/products';
                } else {
                    res.json().then(err => alert("Lỗi Backend: " + (err.message || "Kiểm tra DTO Java!")));
                }
            }).catch(err => alert("Lỗi kết nối: " + err));
        }

        // ================= XỬ LÝ UPLOAD ẢNH =================
        async function uploadFileToAPI(file) {
            const formData = new FormData();
            formData.append("file", file);

            const response = await fetch('/api/v1/upload', {
                method: 'POST',
                body: formData
            });
            if (!response.ok) throw new Error("Upload thất bại, hãy check lại API Java!");
            const data = await response.json();
            return data.url;
        }

        // Upload ảnh SP mẹ
        async function uploadMainImage(inputEl) {
            if (!inputEl.files || inputEl.files.length === 0) return;
            try {
                const url = await uploadFileToAPI(inputEl.files[0]);

                document.getElementById('imageUrl').value = url;

                const previewEl = document.getElementById('mainImagePreview');
                const placeholder = document.getElementById('mainImagePlaceholder');

                previewEl.src = url;
                previewEl.classList.remove('d-none'); // Hiện ảnh
                placeholder.classList.add('d-none');  // Ẩn icon upload đi
            } catch (err) {
                alert(err.message);
            }
        }

        // Upload ảnh cho biến thể con
        async function uploadVariantImage(inputEl) {
            if (!inputEl.files || inputEl.files.length === 0) return;
            try {
                const url = await uploadFileToAPI(inputEl.files[0]);

                // Tìm vùng cha bọc nút bấm hiện tại
                const labelWrapper = inputEl.closest('label');
                const td = inputEl.closest('td');

                // Gán link url vào biến ẩn để hàm saveProduct lấy được
                td.querySelector('.var-image').value = url;

                const previewEl = labelWrapper.querySelector('.variant-img-preview');
                const placeholder = labelWrapper.querySelector('.variant-img-placeholder');

                previewEl.src = url;
                previewEl.classList.remove('d-none'); // Hiện ảnh vuông nhỏ
                placeholder.classList.add('d-none');  // Ẩn icon camera đi
            } catch (err) {
                alert(err.message);
            }
        }
    </script>
</div>
</body>
</html>
