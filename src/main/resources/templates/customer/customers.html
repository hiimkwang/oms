<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">
    <style>
        /* Thống nhất style chuẩn Sapo */
        .filter-btn {
            background: white;
            border: 1px solid #dce0e4;
            color: #4b566b;
            font-size: 13px;
            font-weight: 500;
            height: 36px;
            display: flex;
            align-items: center;
        }

        .filter-btn:hover {
            background-color: #f8f9fb;
            border-color: #cbd5e1;
        }

        .table-customer thead th {
            background: #f8f9fb;
            color: #4b566b;
            font-weight: 600;
            font-size: 13px;
            border-top: 1px solid #dee2e6;
            padding: 12px 10px;
        }

        .table-customer td {
            vertical-align: middle;
            font-size: 13px;
            color: #2b3445;
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        /* Avatar chữ cái đầu */
        .avatar-circle {
            width: 32px;
            height: 32px;
            background: #e0f2fe;
            color: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            flex-shrink: 0;
        }

        .nav-tabs-custom .nav-link {
            border: none;
            color: #666;
            font-weight: 500;
            padding: 10px 20px;
            font-size: 14px;
            position: relative;
        }

        .nav-tabs-custom .nav-link.active {
            color: #3b82f6;
            background: transparent;
        }

        .nav-tabs-custom .nav-link.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #3b82f6;
        }

        /* Tùy chỉnh ô Search chuẩn */
        .search-box {
            max-width: 500px;
            border: 1px solid #dce0e4;
            border-radius: 6px;
            background: white;
            transition: all 0.2s ease-in-out;
        }

        /* Khi click vào input thì viền cả khung sáng lên */
        .search-box:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, .25);
        }

        .search-box .input-group-text {
            background: transparent;
            border: none;
            padding-right: 8px;
        }

        .search-box .form-control {
            border: none;
            background: transparent;
            box-shadow: none;
            padding-left: 0;
            font-size: 13px;
            height: 36px;
        }

        .search-box .form-control:focus {
            box-shadow: none;
        }

        .badge-group {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .cursor-pointer {
            cursor: pointer;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
        <h4 class="fw-bold mb-0 text-dark">Khách hàng</h4>
        <div class="d-flex gap-2">
            <button class="btn btn-white border fw-medium shadow-sm text-primary" onclick="syncGroups()" id="btnSync">
                <i class="bi bi-magic me-2"></i>Quét & Phân loại
            </button>
            <a th:href="@{/ui/customers/create}" class="btn btn-primary fw-bold px-3 shadow-sm">
                <i class="bi bi-plus-circle me-2"></i>Thêm khách hàng
            </a>
        </div>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 8px;">
        <div class="card-header bg-white border-0 p-0">
            <ul class="nav nav-tabs nav-tabs-custom border-bottom px-3">
                <li class="nav-item"><a class="nav-link active" href="javascript:void(0)">Tất cả</a></li>
            </ul>
        </div>

        <div class="card-body p-0">
            <div class="p-3 d-flex justify-content-between align-items-center gap-2 flex-wrap bg-white">
                <div class="input-group search-box flex-grow-1">
                    <span class="input-group-text"><i class="bi bi-search fs-5 text-muted"></i></span>
                    <input type="text" id="cusSearchInput" class="form-control"
                           placeholder="Tìm kiếm khách hàng theo mã, tên, SĐT...">
                </div>
                <div class="d-flex gap-2">
                    <select class="form-select filter-btn w-auto" id="groupFilter">
                        <option value="">Tất cả phân loại</option>
                    </select>
                </div>
            </div>

            <div id="bulkActionBar" class="d-none align-items-center justify-content-between p-2 px-3"
                 style="background-color: #f0f8ff; border-top: 1px solid #dce0e4; border-bottom: 1px solid #dce0e4;">
                <div class="d-flex align-items-center gap-3">
                    <span class="fw-medium" style="color: #2563eb; font-size: 13px;">
                        Đã chọn <span id="deleteCount" class="fw-bold fs-6">0</span> khách hàng
                    </span>
                    <span class="text-muted small">|</span>
                    <a href="javascript:void(0)" class="text-decoration-none fw-medium"
                       style="color: #2563eb; font-size: 13px;" onclick="clearSelection()">Bỏ chọn</a>
                </div>
                <div>
                    <button class="btn btn-white border-danger text-danger fw-medium px-4 shadow-sm"
                            style="font-size: 13px; padding-top: 6px; padding-bottom: 6px;" onclick="deleteSelected()">
                        Xóa khách hàng
                    </button>
                </div>
            </div>

            <div class="table-responsive" style="min-height: 300px;">
                <table class="table table-customer table-hover mb-0">
                    <thead>
                    <tr>
                        <th class="ps-4" style="width: 40px;"><input type="checkbox" class="form-check-input"
                                                                     id="checkAll"></th>
                        <th>Tên khách hàng</th>
                        <th>Email</th>
                        <th>Điện thoại</th>
                        <th class="text-center">Số đơn</th>
                        <th class="text-end pe-4">Tổng chi tiêu</th>
                    </tr>
                    </thead>
                    <tbody id="customerTableBody">
                    <tr>
                        <td colspan="7" class="text-center py-5">Đang tải dữ liệu...</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="p-3 d-flex justify-content-between align-items-center border-top">
                <div class="text-muted small" id="recordInfo">Đang tải...</div>
                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center gap-2">
                        <span class="small text-muted">Hiển thị</span>
                        <select class="form-select form-select-sm oms-page-size" id="customerPageSize">
                            <option value="15">15</option>
                            <option value="20" selected>20</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                        <span class="small text-muted">kết quả/trang</span>
                    </div>
                    <nav>
                        <ul class="pagination pagination-sm mb-0" id="customerPagination"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="none">
        // Biến toàn cục để lưu trữ thông tin nhóm (Tên -> Màu)
        let groupColorMap = {};

        // --- PHÂN TRANG PHÍA BACKEND ---
        let customerCurrentPage = 1;    // 1-based ở UI
        let customerTotalPages = 1;
        let customerTotalElements = 0;
        let pageCustomers = [];
        let customerLoading = false;

        document.addEventListener('DOMContentLoaded', async function () {
            // 1. Tải danh sách nhóm để lấy mã màu TRƯỚC
            await loadGroupColors();

            // 2. Sau đó mới tải danh sách khách hàng (trang 1)
            loadCustomers(1);

            // Xử lý Search với Debounce
            let timeout = null;
            document.getElementById('cusSearchInput').addEventListener('input', function () {
                clearTimeout(timeout);
                timeout = setTimeout(() => loadCustomers(1), 400);
            });

            // Xử lý Bộ lọc nhóm khách hàng
            document.getElementById('groupFilter').addEventListener('change', function () {
                loadCustomers(1);
            });

            // Ô chọn số dòng/trang
            document.getElementById('customerPageSize').addEventListener('change', function () {
                loadCustomers(1);
            });

            // Xử lý Checkbox Chọn tất cả
            document.getElementById('checkAll').addEventListener('change', function () {
                const isChecked = this.checked;
                document.querySelectorAll('.customer-checkbox').forEach(cb => cb.checked = isChecked);
                toggleBulkActionBar();
            });
        });

        // Hàm gọi API lấy danh sách nhóm và lưu màu sắc
        async function loadGroupColors() {
            try {
                const res = await fetch('/api/v1/customer-groups');
                if (res.ok) {
                    const groups = await res.json();

                    // Cập nhật bộ lọc Dropdown bằng dữ liệu thực
                    const filterSelect = document.getElementById('groupFilter');
                    filterSelect.innerHTML = '<option value="">Tất cả phân loại</option>';

                    groups.forEach(g => {
                        // Lưu mapping Tên nhóm -> Mã màu
                        groupColorMap[g.name] = g.colorCode || '#6c757d'; // Mặc định xám nếu ko có màu

                        // Đổ dữ liệu vào Dropdown lọc
                        filterSelect.innerHTML += `<option value="${g.name}">${g.name}</option>`;
                    });
                }
            } catch (e) {
                console.error("Lỗi tải màu nhóm:", e);
            }
        }

        function toggleBulkActionBar() {
            const checkedCount = document.querySelectorAll('.customer-checkbox:checked').length;
            const bulkBar = document.getElementById('bulkActionBar');
            const countSpan = document.getElementById('deleteCount');

            if (checkedCount > 0) {
                countSpan.innerText = checkedCount;
                bulkBar.classList.remove('d-none');
                bulkBar.classList.add('d-flex');
            } else {
                bulkBar.classList.add('d-none');
                bulkBar.classList.remove('d-flex');
            }
        }

        function clearSelection() {
            document.querySelectorAll('.customer-checkbox, #checkAll').forEach(cb => cb.checked = false);
            toggleBulkActionBar();
        }

        async function deleteSelected() {
            const checkboxes = document.querySelectorAll('.customer-checkbox:checked');

            // Cảnh báo nếu chưa chọn khách hàng nào
            if (checkboxes.length === 0) {
                Toast.fire({
                    icon: 'warning',
                    title: 'Vui lòng chọn ít nhất 1 khách hàng để xóa!'
                });
                return;
            }

            // Hiện bảng xác nhận chuyên nghiệp
            const confirmation = await Swal.fire({
                title: 'Xác nhận xóa hàng loạt',
                text: `Bạn có chắc chắn muốn xóa vĩnh viễn ${checkboxes.length} khách hàng đã chọn không? Thao tác này không thể hoàn tác.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',   // Nút đỏ cảnh báo nguy hiểm
                cancelButtonColor: '#3085d6', // Nút xanh an toàn
                confirmButtonText: 'Xác nhận xóa',
                cancelButtonText: 'Hủy bỏ'
            });

            // Dừng lại nếu người dùng bấm Hủy
            if (!confirmation.isConfirmed) return;

            const codes = Array.from(checkboxes).map(cb => cb.value);

            try {
                const res = await fetch('/api/v1/customers/bulk-delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(codes)
                });

                if (res.ok) {
                    Toast.fire({
                        icon: 'success',
                        title: `Đã xóa thành công ${codes.length} khách hàng!`
                    });

                    // Xóa vùng chọn và load lại trang hiện tại
                    clearSelection();
                    loadCustomers(customerCurrentPage);
                } else {
                    const err = await res.json();
                    Toast.fire({
                        icon: 'error',
                        title: 'Lỗi: ' + (err.message || 'Không thể xóa khách hàng!')
                    });
                }
            } catch (e) {
                console.error("Lỗi xóa khách hàng:", e);
                Toast.fire({
                    icon: 'error',
                    title: 'Lỗi kết nối đến máy chủ!'
                });
            }
        }

        // Nạp 1 trang khách hàng từ backend theo bộ lọc hiện tại
        async function loadCustomers(page) {
            if (customerLoading) return;
            customerLoading = true;
            const tbody = document.getElementById('customerTableBody');
            const keyword = document.getElementById('cusSearchInput').value.trim();
            const group = document.getElementById('groupFilter').value;
            const size = parseInt(document.getElementById('customerPageSize').value, 10) || 20;

            const params = new URLSearchParams();
            params.set('page', Math.max(0, (page || 1) - 1));
            params.set('size', size);
            if (keyword) params.set('keyword', keyword);
            if (group) params.set('group', group);

            try {
                const response = await fetch('/api/v1/customers?' + params.toString());
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                pageCustomers = data.content || [];
                customerCurrentPage = (data.page || 0) + 1;
                customerTotalPages = data.totalPages || 1;
                customerTotalElements = data.totalElements || 0;
                renderCustomers();
            } catch (error) {
                console.error("Lỗi tải khách hàng:", error);
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5 text-danger">Có lỗi xảy ra khi tải dữ liệu! <br> <small>${error.message}</small></td></tr>`;
            } finally {
                customerLoading = false;
            }
        }

        function renderCustomers() {
            const tbody = document.getElementById('customerTableBody');
            const info = document.getElementById('recordInfo');

            const total = customerTotalElements;
            if (!pageCustomers.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted"><i class="bi bi-person-x fs-2 d-block mb-2"></i>Không tìm thấy khách hàng nào</td></tr>';
                info.innerText = 'Hiển thị 0 khách hàng';
                renderCustomerPagination();
                clearSelection();
                return;
            }

            const size = parseInt(document.getElementById('customerPageSize').value, 10) || 20;
            const startIdx = (customerCurrentPage - 1) * size;
            const customers = pageCustomers;

            {
                let html = '';
                customers.forEach(c => {
                    const fullName = c.fullName || 'Chưa có tên';
                    const customerCode = c.customerCode || '---';
                    const nameParts = fullName.split(' ');
                    const initials = nameParts.length > 1
                        ? (nameParts[0][0] + nameParts[nameParts.length - 1][0]).toUpperCase()
                        : nameParts[0][0].toUpperCase();

                    const lastDate = c.lastOrder ? new Date(c.lastOrder).toLocaleDateString('vi-VN') : '---';
                    const totalSpent = new Intl.NumberFormat('vi-VN').format(c.totalSpent || 0) + '₫';

                    const groupName = c.customerGroup || 'Khách lẻ';

                    // LẤY MÀU TỪ MAP, NẾU KHÔNG CÓ THÌ TRẢ VỀ XÁM MẶC ĐỊNH
                    const badgeColor = groupColorMap[groupName] || '#6c757d';

                    html += `
                        <tr>
                            <td class="ps-4">
                                <input type="checkbox" class="form-check-input customer-checkbox" value="${customerCode}" onchange="toggleBulkActionBar()">
                            </td>
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <div class="avatar-circle">${initials}</div>
                                    <div class="lh-sm">
                                        <a href="/ui/customers/${customerCode}" class="text-decoration-none fw-bold text-primary">${fullName}</a>
                                        <div class="mt-1">
                                            <span class="badge-group text-white" style="background-color: ${badgeColor};">${groupName}</span>
                                            <small class="text-muted ms-2">${customerCode}</small>
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td>${c.email || '---'}</td>
                            <td>${c.phoneNumber || '---'}</td>
                            <td class="text-center fw-medium">${c.orderCount || 0}</td>
                            <td class="text-end pe-4 fw-bold">${totalSpent}</td>
                        </tr>
                    `;
                });

                tbody.innerHTML = html;
                const fromIdx = startIdx + 1;
                const toIdx = startIdx + customers.length;
                info.innerText = `Hiển thị ${fromIdx} - ${toIdx} trên tổng số ${total} khách hàng`;
                renderCustomerPagination();
                clearSelection();
            }
        }

        // Vẽ thanh phân trang khách hàng (theo tổng số trang từ backend)
        function renderCustomerPagination() {
            const ul = document.getElementById('customerPagination');
            if (!ul) return;
            const totalPages = customerTotalPages;
            if (totalPages <= 1) {
                ul.innerHTML = '';
                return;
            }
            let html = '';
            html += `<li class="page-item ${customerCurrentPage === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="goToCustomerPage(${customerCurrentPage - 1}); return false;"><i class="bi bi-chevron-left"></i></a></li>`;
            let startPage = Math.max(1, customerCurrentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            startPage = Math.max(1, endPage - 4);
            for (let p = startPage; p <= endPage; p++) {
                html += `<li class="page-item ${p === customerCurrentPage ? 'active' : ''}">
                            <a class="page-link" href="#" onclick="goToCustomerPage(${p}); return false;">${p}</a></li>`;
            }
            html += `<li class="page-item ${customerCurrentPage === totalPages ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="goToCustomerPage(${customerCurrentPage + 1}); return false;"><i class="bi bi-chevron-right"></i></a></li>`;
            ul.innerHTML = html;
        }

        function goToCustomerPage(p) {
            if (p < 1 || p > customerTotalPages || p === customerCurrentPage) return;
            loadCustomers(p);
        }

        async function syncGroups() {
            // Hiện bảng xác nhận bằng SweetAlert2
            const confirmation = await Swal.fire({
                title: 'Xác nhận đồng bộ hệ thống',
                text: 'Hệ thống sẽ quét toàn bộ dữ liệu đơn hàng và tự động xếp lại nhóm cho TẤT CẢ khách hàng. Bạn có chắc chắn muốn tiếp tục?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6', // Xanh lam cho hành động xử lý hệ thống
                cancelButtonColor: '#6c757d',  // Xám cho nút hủy
                confirmButtonText: 'Bắt đầu đồng bộ',
                cancelButtonText: 'Hủy bỏ'
            });

            // Dừng lại nếu người dùng bấm Hủy
            if (!confirmation.isConfirmed) return;

            // Logic xử lý UI loading (Bạn viết đoạn này rất chuẩn!)
            const btn = document.getElementById('btnSync');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Đang đồng bộ...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/v1/customers/sync-groups', {
                    method: 'POST'
                });

                if (res.ok) {
                    Toast.fire({
                        icon: 'success',
                        title: 'Đồng bộ và phân loại nhóm khách hàng thành công!'
                    });
                    // Gọi lại hàm load để vẽ lại danh sách mượt mà
                    loadCustomers(customerCurrentPage);
                } else {
                    const err = await res.json();
                    Toast.fire({
                        icon: 'error',
                        title: 'Lỗi đồng bộ: ' + (err.message || 'Vui lòng kiểm tra lại server')
                    });
                }
            } catch (e) {
                console.error("Lỗi:", e);
                Toast.fire({
                    icon: 'error',
                    title: 'Lỗi kết nối đến máy chủ!'
                });
            } finally {
                // Luôn nhả nút bấm ra cho dù API thành công hay thất bại
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</div>
</body>
</html>
