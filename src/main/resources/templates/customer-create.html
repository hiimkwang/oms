<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5" style="background-color: #f3f4f6;">
    <style>
        .card-title-custom {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 16px;
        }

        .form-label-custom {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-control-custom, .form-select-custom {
            font-size: 13px;
            border-color: #cbd5e1;
            height: 36px;
        }

        .info-card {
            background-color: #fff;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            margin-bottom: 15px;
        }

        .auto-selected {
            border-color: #0d6efd !important;
            background-color: #f0f7ff !important;
            transition: all 0.5s;
        }

        .cursor-pointer {
            cursor: pointer;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 pt-3">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/ui/customers}" class="btn btn-white border bg-white shadow-sm px-2"><i
                    class="bi bi-arrow-left"></i></a>
            <h4 class="fw-bold text-dark mb-0" id="pageTitle">Thêm mới khách hàng</h4>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/ui/customers}" class="btn btn-white border bg-white px-4">Hủy</a>
            <button type="button" class="btn btn-primary fw-bold px-4 shadow-sm" onclick="saveCustomer()">Lưu khách
                hàng
            </button>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-8">
            <div class="info-card shadow-sm">
                <div class="card-title-custom">Thông tin cơ bản</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label-custom">Họ</label>
                        <input type="text" id="lastName" class="form-control form-control-custom" placeholder="Nhập họ">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Tên <span class="text-danger">*</span></label>
                        <input type="text" id="firstName" class="form-control form-control-custom"
                               placeholder="Nhập tên">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Email</label>
                        <input type="email" id="email" class="form-control form-control-custom"
                               placeholder="Nhập email">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Số điện thoại <span class="text-danger">*</span></label>
                        <input type="text" id="phoneNumber" class="form-control form-control-custom"
                               placeholder="Nhập số điện thoại">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Ngày sinh</label>
                        <input type="date" id="dob" class="form-control form-control-custom">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Giới tính</label>
                        <div class="d-flex gap-4 mt-1">
                            <div class="form-check"><input class="form-check-input" type="radio" name="gender" id="gNam"
                                                           value="NAM" checked><label class="small cursor-pointer"
                                                                                      for="gNam">Nam</label></div>
                            <div class="form-check"><input class="form-check-input" type="radio" name="gender" id="gNu"
                                                           value="NU"><label class="small cursor-pointer"
                                                                             for="gNu">Nữ</label></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="info-card shadow-sm">
                <div class="card-title-custom">Địa chỉ nhận hàng</div>
                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label-custom">Địa chỉ chi tiết</label>
                        <textarea id="shipAddressDetail" class="form-control" rows="2"
                                  placeholder="Số nhà, tên đường, phường/xã, quận/huyện..."></textarea>
                    </div>
                </div>
            </div>

            <div class="info-card shadow-sm">
                <div class="form-check mb-3">
                    <input class="form-check-input cursor-pointer" type="checkbox" id="hasInvoice"
                           onchange="document.getElementById('invBlock').classList.toggle('d-none', !this.checked)">
                    <label class="fw-bold text-dark cursor-pointer" for="hasInvoice">Khách có thông tin xuất hóa
                        đơn</label>
                </div>
                <div id="invBlock" class="d-none pt-3 border-top">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label-custom">Mã số thuế</label>
                            <input type="text" id="taxCode" class="form-control form-control-custom" placeholder="MST">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label-custom">Tên công ty</label>
                            <input type="text" id="companyName" class="form-control form-control-custom"
                                   placeholder="Tên công ty xuất hóa đơn">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label-custom">Địa chỉ công ty</label>
                            <input type="text" id="companyAddress" class="form-control form-control-custom"
                                   placeholder="Địa chỉ trên hóa đơn">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="info-card shadow-sm">
                <label class="form-label-custom">Nhóm khách hàng</label>
                <select id="customerGroup" class="form-select form-select-custom">
                    <option value="">Đang tải nhóm...</option>
                </select>
                <div id="autoCheckNote" class="small text-primary mt-2 d-none">
                    <i class="bi bi-magic"></i> Đã tự động chọn nhóm phù hợp
                </div>
            </div>

            <div class="info-card shadow-sm">
                <label class="form-label-custom">Ghi chú</label>
                <textarea id="note" class="form-control" rows="4"
                          placeholder="Nhập ghi chú về khách hàng..."></textarea>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const pathSegments = window.location.pathname.split('/');
        const editCustomerCode = pathSegments.length > 3 ? pathSegments[3] : null;
        const isEditMode = (editCustomerCode && editCustomerCode !== 'create');

        let allGroups = [];
        let stats = {orderCount: 0, totalSpent: 0};

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Luôn tải danh sách nhóm trước
            await fetchGroups();

            if (isEditMode) {
                document.getElementById('pageTitle').innerText = "Chỉnh sửa khách hàng";
                await fetchCustomerData(editCustomerCode);
            } else {
                // Nếu thêm mới: Mặc định chọn Khách lẻ và không cần chạy auto-check
                const select = document.getElementById('customerGroup');
                if (select.querySelector('option[value="Khách lẻ"]')) {
                    select.value = "Khách lẻ";
                }
            }
        });

        async function fetchGroups() {
            try {
                const res = await fetch('/api/v1/customer-groups');
                allGroups = await res.json();
                const select = document.getElementById('customerGroup');

                // Render lại danh sách nhóm
                let html = '<option value="Khách lẻ">Khách lẻ</option>';
                allGroups.forEach(g => {
                    if (g.name !== "Khách lẻ") {
                        html += `<option value="${g.name}">${g.name}</option>`;
                    }
                });
                select.innerHTML = html;
            } catch (e) {
                console.error("Không thể tải danh sách nhóm:", e);
            }
        }

        async function fetchCustomerData(code) {
            try {
                const res = await fetch(`/api/v1/customers/${code}`);
                if (!res.ok) return;
                const c = await res.json();

                // Fill form (Dùng Optional chaining ?. để tránh lỗi nếu thiếu trường)
                document.getElementById('firstName').value = c.firstName || '';
                document.getElementById('lastName').value = c.lastName || '';
                document.getElementById('email').value = c.email || '';
                document.getElementById('phoneNumber').value = c.phoneNumber || '';
                document.getElementById('dob').value = c.dob || '';
                document.getElementById('note').value = c.note || '';
                document.getElementById('shipAddressDetail').value = c.shipAddressDetail || '';

                if (c.gender) {
                    const genderRadio = document.querySelector(`input[name="gender"][value="${c.gender}"]`);
                    if (genderRadio) genderRadio.checked = true;
                }

                // Fill hóa đơn
                if (c.hasInvoice) {
                    document.getElementById('hasInvoice').checked = true;
                    document.getElementById('invBlock').classList.remove('d-none');
                    document.getElementById('taxCode').value = c.taxCode || '';
                    document.getElementById('companyName').value = c.companyName || '';
                    document.getElementById('companyAddress').value = c.companyAddress || '';
                }

                // Lưu stats và CHỈ chạy gợi ý khi SỬA
                stats.orderCount = c.orderCount || 0;
                stats.totalSpent = c.totalSpent || 0;

                autoCheckGroup(c.customerGroup);

            } catch (e) {
                console.error("Lỗi lấy data khách hàng:", e);
            }
        }

        function autoCheckGroup(manualGroup) {
            // Nếu không có stats thì không cần check
            if (stats.orderCount === 0 && stats.totalSpent === 0) {
                document.getElementById('customerGroup').value = manualGroup || "Khách lẻ";
                return;
            }

            let suggested = manualGroup || "Khách lẻ";
            let isAutoFound = false;

            allGroups.forEach(g => {
                if (g.autoUpdate && g.conditions) {
                    try {
                        const cond = JSON.parse(g.conditions);
                        const results = cond.rules.map(r => {
                            const val = (r.field === 'TOTAL_SPENT') ? stats.totalSpent : stats.orderCount;
                            const target = parseFloat(r.value);
                            if (r.operator === '>') return val > target;
                            if (r.operator === '<') return val < target;
                            if (r.operator === '=') return val == target;
                            return false;
                        });

                        const isMatch = (cond.matchType === 'ALL') ? results.every(res => res) : results.some(res => res);
                        if (isMatch) {
                            suggested = g.name;
                            isAutoFound = true;
                        }
                    } catch (e) {
                    }
                }
            });

            const select = document.getElementById('customerGroup');
            select.value = suggested;

            // Chỉ highlight nếu hệ thống gợi ý nhóm KHÁC với nhóm hiện tại
            if (isAutoFound && suggested !== manualGroup) {
                select.classList.add('auto-selected');
                document.getElementById('autoCheckNote').classList.remove('d-none');
            }
        }

        async function saveCustomer() {
            const firstName = document.getElementById('firstName').value.trim();
            const phone = document.getElementById('phoneNumber').value.trim();

            if (!firstName || !phone) return alert("Vui lòng nhập Tên và Số điện thoại!");

            const payload = {
                firstName: firstName,
                lastName: document.getElementById('lastName').value.trim(),
                fullName: (document.getElementById('lastName').value.trim() + ' ' + firstName).trim(),
                email: document.getElementById('email').value.trim(),
                phoneNumber: phone,
                dob: document.getElementById('dob').value,
                gender: document.querySelector('input[name="gender"]:checked')?.value,
                customerGroup: document.getElementById('customerGroup').value,
                note: document.getElementById('note').value.trim(),
                shipAddressDetail: document.getElementById('shipAddressDetail').value.trim(),
                hasInvoice: document.getElementById('hasInvoice').checked,
                taxCode: document.getElementById('taxCode').value.trim(),
                companyName: document.getElementById('companyName').value.trim(),
                companyAddress: document.getElementById('companyAddress').value.trim()
            };

            const url = isEditMode ? `/api/v1/customers/${editCustomerCode}` : '/api/v1/customers';
            const method = isEditMode ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert(isEditMode ? "Cập nhật thành công!" : "Thêm mới thành công!");
                    window.location.href = "/ui/customers";
                } else {
                    const err = await res.json();
                    alert("Lỗi: " + (err.message || "Thao tác thất bại"));
                }
            } catch (e) {
                alert("Lỗi kết nối server!");
            }
        }
    </script>
</div>
</body>
</html>
