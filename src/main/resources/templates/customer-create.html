<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5" style="background-color: #f3f4f6;">
    <style>
        .card-title-custom { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 16px; }
        .form-label-custom { font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
        .form-control-custom, .form-select-custom { font-size: 13px; border-color: #cbd5e1; height: 36px; }
        .form-control-custom:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.2rem rgba(13,110,253,.1); }
        .info-card { background-color: #fff; padding: 20px; border-radius: 6px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 pt-3">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/ui/customers}" class="btn btn-white border bg-white shadow-sm px-2"><i class="bi bi-arrow-left"></i></a>
            <h4 class="fw-bold text-dark mb-0">Thêm mới khách hàng</h4>
        </div>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-white border bg-white px-4">Hủy</button>
            <button type="button" class="btn btn-primary fw-bold px-4" onclick="saveCustomer()">Lưu</button>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-8">
            <div class="info-card">
                <div class="card-title-custom">Thông tin cơ bản</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label-custom">Họ</label>
                        <input type="text" id="lastName" class="form-control form-control-custom" placeholder="Nhập họ">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Tên <span class="text-danger">*</span></label>
                        <input type="text" id="firstName" class="form-control form-control-custom" placeholder="Nhập tên">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Email</label>
                        <input type="email" id="email" class="form-control form-control-custom" placeholder="Nhập email">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Số điện thoại <span class="text-danger">*</span></label>
                        <input type="text" id="phoneNumber" class="form-control form-control-custom" placeholder="Nhập số điện thoại">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Ngày sinh</label>
                        <input type="date" id="dob" class="form-control form-control-custom">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Giới tính</label>
                        <div class="d-flex gap-3 mt-1">
                            <div class="form-check"><input class="form-check-input" type="radio" name="gender" id="gNam" value="NAM"><label class="small" for="gNam">Nam</label></div>
                            <div class="form-check"><input class="form-check-input" type="radio" name="gender" id="gNu" value="NU"><label class="small" for="gNu">Nữ</label></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="info-card">
                <div class="card-title-custom">Địa chỉ nhận hàng</div>
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label-custom">Họ</label><input type="text" id="shipLastName" class="form-control form-control-custom"></div>
                    <div class="col-md-6"><label class="form-label-custom">Tên</label><input type="text" id="shipFirstName" class="form-control form-control-custom"></div>
                    <div class="col-md-12"><label class="form-label-custom">Công ty</label><input type="text" id="shipCompany" class="form-control form-control-custom"></div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Tỉnh/Thành phố</label>
                        <select id="shipCity" class="form-select form-select-custom"><option value="">Chọn Tỉnh/Thành</option></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Quận/Huyện</label>
                        <select id="shipDistrict" class="form-select form-select-custom"><option value="">Chọn Quận/Huyện</option></select>
                    </div>
                    <div class="col-md-12"><label class="form-label-custom">Địa chỉ chi tiết</label><textarea id="shipAddressDetail" class="form-control" rows="2"></textarea></div>
                </div>
            </div>

            <div class="info-card">
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="hasInvoice" onchange="document.getElementById('invBlock').classList.toggle('d-none')">
                    <label class="fw-bold" for="hasInvoice">Khách có thông tin xuất hóa đơn</label>
                </div>
                <div id="invBlock" class="d-none">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label-custom">Mã số thuế</label><input type="text" id="taxCode" class="form-control form-control-custom"></div>
                        <div class="col-md-6"><label class="form-label-custom">Tên công ty</label><input type="text" id="companyName" class="form-control form-control-custom"></div>
                        <div class="col-md-12"><label class="form-label-custom">Địa chỉ công ty</label><input type="text" id="companyAddress" class="form-control form-control-custom"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="info-card">
                <label class="form-label-custom">Nhóm khách hàng</label>
                <select id="customerGroup" class="form-select form-select-custom">
                    <option value="Khách lẻ">Khách lẻ</option>
                    <option value="VIP">VIP</option>
                    <option value="Đại lý">Đại lý</option>
                </select>
            </div>
            <div class="info-card">
                <label class="form-label-custom">Ghi chú</label>
                <textarea id="note" class="form-control" rows="4" placeholder="Nhập ghi chú..."></textarea>
            </div>
            <div class="info-card">
                <label class="form-label-custom">Tags</label>
                <input type="text" id="tags" class="form-control form-control-custom" placeholder="Gõ tag và nhấn enter">
            </div>
        </div>
    </div>
</div>

<script th:inline="none">
    async function saveCustomer() {
        // 1. Kiểm tra bắt buộc
        const firstName = document.getElementById('firstName').value;
        const phone = document.getElementById('phoneNumber').value;
        if(!firstName || !phone) return alert("Họ tên và SĐT là bắt buộc!");

        // 2. Gom toàn bộ data
        const payload = {
            firstName: firstName,
            lastName: document.getElementById('lastName').value,
            fullName: document.getElementById('lastName').value + ' ' + firstName,
            email: document.getElementById('email').value,
            phoneNumber: phone,
            dob: document.getElementById('dob').value,
            gender: document.querySelector('input[name="gender"]:checked')?.value,
            customerGroup: document.getElementById('customerGroup').value,
            note: document.getElementById('note').value,
            tags: document.getElementById('tags').value,

            // Shipping
            shipFirstName: document.getElementById('shipFirstName').value,
            shipLastName: document.getElementById('shipLastName').value,
            shipCompany: document.getElementById('shipCompany').value,
            shipCity: document.getElementById('shipCity').value,
            shipAddressDetail: document.getElementById('shipAddressDetail').value,

            // Invoice
            hasInvoice: document.getElementById('hasInvoice').checked,
            taxCode: document.getElementById('taxCode').value,
            companyName: document.getElementById('companyName').value,
            companyAddress: document.getElementById('companyAddress').value
        };

        // 3. Bắn về Backend
        try {
            const res = await fetch('/api/v1/customers', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                alert("Lưu thành công!");
                window.location.href = "/ui/customers";
            } else {
                const err = await res.json(); alert("Lỗi: " + err.message);
            }
        } catch(e) { alert("Lỗi server!"); }
    }
</script>
</body>
</html>
