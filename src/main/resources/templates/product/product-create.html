<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">

    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <style>
        .oms-input {
            background-color: #f8f9fa;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        .oms-input:focus {
            background-color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }

        .card-title-custom {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        .form-label {
            font-size: 0.85rem;
            color: #475569;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .ts-control {
            border: 1px solid #e2e8f0 !important;
            border-radius: 6px !important;
            box-shadow: none !important;
            padding: 6px 10px !important;
            background-color: #f8f9fa !important;
            min-height: 38px;
        }

        .ts-control.focus {
            background-color: #ffffff !important;
            border-color: #3b82f6 !important;
        }

        .ts-control > input {
            font-size: 0.875rem;
        }

        .ts-wrapper.multi .ts-control > div {
            background: #f1f5f9 !important;
            color: #334155 !important;
            border: 1px solid #cbd5e1 !important;
            border-radius: 4px;
            padding: 2px 8px;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .ts-wrapper.multi .ts-control > div .remove {
            border-left-color: #cbd5e1 !important;
            color: #64748b !important;
        }

        .ts-wrapper.multi .ts-control > div .remove:hover {
            background: #e2e8f0 !important;
            color: #ef4444 !important;
        }

        .ts-dropdown .create {
            color: #0284c7 !important;
            font-weight: 600;
        }

        .btn-remove-attr {
            color: #94a3b8;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-remove-attr:hover {
            color: #ef4444;
        }

        #variantTableContainer th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
            font-size: 0.85rem;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 sticky-top bg-white py-3 shadow-sm px-4 rounded-bottom"
         style="z-index: 1000; top: 64px; margin-left: -30px; margin-right: -30px;">
        <div class="d-flex align-items-center gap-3">
            <a href="/ui/products" class="btn btn-light border"><i class="bi bi-arrow-left"></i></a>
            <h4 class="fw-bold mb-0 text-dark">Thêm sản phẩm</h4>
        </div>
        <div class="d-flex gap-2">
            <a href="/ui/products" class="btn btn-light border fw-medium px-4">Hủy</a>
            <button class="btn btn-primary fw-bold px-4 shadow-sm" onclick="saveProduct()">Lưu sản phẩm</button>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="card-title-custom">Thông tin sản phẩm</div>
                <div class="mb-3">
                    <label class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
                    <input type="text" id="name" class="form-control oms-input py-2"
                           placeholder="Nhập tên sản phẩm (tối đa 320 ký tự)" required>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Mã SKU</label>
                        <input type="text" id="sku" class="form-control oms-input py-2 js-scan"
                               placeholder="Để trống để tự động sinh">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mã vạch/ Barcode</label>
                        <input type="text" class="form-control oms-input py-2" placeholder="Nhập mã vạch/ Barcode">
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Đơn vị tính <span class="text-danger">*</span></label>
                        <select id="unit" class="form-control" placeholder="Chọn hoặc nhập để thêm mới...">
                            <option value="">Chọn đơn vị tính</option>
                            <option th:each="u : ${units}" th:value="${u}" th:text="${u}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Thời hạn bảo hành (tháng)</label>
                        <input type="number" id="warrantyMonths" min="0" class="form-control oms-input py-2"
                               placeholder="VD: 12 — mặc định cho cả sản phẩm">
                    </div>
                </div>
                <div class="mb-2">
                    <label class="form-label">Mô tả</label>
                    <div class="border rounded bg-white">
                        <div class="bg-light border-bottom p-2 d-flex gap-2 text-muted">
                            <i class="bi bi-type-bold px-2 cursor-pointer"></i>
                            <i class="bi bi-type-italic px-2"></i>
                            <i class="bi bi-type-underline px-2"></i>
                            <i class="bi bi-list-ul px-2"></i>
                            <i class="bi bi-image px-2"></i>
                        </div>
                        <textarea id="description" class="form-control border-0 p-3" rows="6"
                                  placeholder="Nhập mô tả sản phẩm..."></textarea>
                    </div>
                </div>
            </div>

            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="card-title-custom">Thông tin giá</div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Giá bán</label>
                        <div class="input-group">
                            <input type="number" id="price" class="form-control oms-input text-end py-2" placeholder="0">
                            <span class="input-group-text bg-light text-muted border-light">đ</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Giá so sánh</label>
                        <div class="input-group">
                            <input type="number" class="form-control oms-input text-end py-2" placeholder="0">
                            <span class="input-group-text bg-light text-muted border-light">đ</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="card-title-custom mb-0">Phân loại hàng</div>
                    <span class="text-muted small">Chỉ nhóm phân loại 1 cần thêm ảnh cho từng tùy chọn</span>
                </div>

                <div id="tierList"></div>

                <div>
                    <button type="button" id="addTierBtn"
                            class="btn btn-outline-primary btn-sm fw-medium">
                        <i class="bi bi-plus-circle me-1"></i>Thêm nhóm phân loại
                    </button>
                </div>

                <div class="mt-4 pt-4 border-top d-none" id="variantMatrix"></div>
            </div>

            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="card-title-custom">Thông tin lưu kho ban đầu</div>
                <div class="mb-4">
                    <label class="form-label">Chi nhánh / Kho nhập hàng <span class="text-danger">*</span></label>
                    <select id="branchId" class="form-select oms-input py-2" onchange="updateBranchDisplay()">
                        <option value="">-- Chọn chi nhánh lưu kho --</option>
                        <option th:each="b : ${branches}" th:value="${b.id}" th:text="${b.name}"></option>
                    </select>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="manageStock" checked>
                    <label class="form-check-label text-dark" for="manageStock">Quản lý số lượng tồn kho</label>
                </div>
                <div id="singleProductStockArea"
                     class="d-flex justify-content-between align-items-center border-top pt-3 mt-3">
                    <div>
                        <div class="fw-bold text-primary" id="displaySelectedBranch">Chưa chọn kho</div>
                        <div class="small text-muted mt-1">Tồn kho ban đầu cho Sản phẩm gốc</div>
                    </div>
                    <div style="width: 150px;">
                        <label class="form-label mb-1">Số lượng</label>
                        <input type="number" id="stockQuantity" class="form-control oms-input text-end fw-bold"
                               value="0">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="card-title-custom">Ảnh sản phẩm chính</div>
                <div class="text-center bg-light border-dashed rounded p-3 text-muted position-relative"
                     style="border: 2px dashed #cbd5e1; cursor: pointer; min-height: 160px; display: flex; align-items: center; justify-content: center;"
                     onclick="document.getElementById('mainImageInput').click()">

                    <div id="mainImagePlaceholder">
                        <i class="bi bi-cloud-arrow-up fs-2"></i>
                        <p class="mt-2 mb-0 fw-medium small">Click để tải ảnh lên</p>
                    </div>

                    <img id="mainImagePreview" src="" class="img-fluid rounded d-none"
                         style="max-height: 140px; object-fit: contain;">
                    <input type="file" id="mainImageInput" class="d-none" accept="image/*"
                           onchange="uploadMainImage(this)">
                </div>
                <input type="hidden" id="imageUrl" value="">
            </div>

            <div class="card p-4 mb-4 border-0 shadow-sm">
                <div class="mb-3">
                    <label class="form-label">Danh mục</label>
                    <select id="category" class="form-control" placeholder="Chọn danh mục...">
                        <option value="">Chọn danh mục</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nhãn hiệu (Hãng)</label>
                    <select id="brand" class="form-control" placeholder="Chọn nhãn hiệu...">
                        <option value="">Chọn nhãn hiệu</option>
                        <option th:each="b : ${brands}" th:value="${b}" th:text="${b}"></option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Tag</label>
                    <input type="text" id="tags" class="form-control" placeholder="Nhập tag và ấn enter...">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

    <script src="/js/product-variants.js"></script>
    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            const masterDataConfig = {
                create: function (input, callback) {
                    let dataType = 'BRAND';
                    if (this.input.id === 'unit') dataType = 'UNIT';

                    fetch('/api/v1/settings/master-data/quick-add', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({type: dataType, value: input})
                    }).then(res => res.ok ? res.json() : Promise.reject())
                        .then(data => callback({value: data.dataValue, text: data.dataValue}))
                        .catch(() => callback(false));
                },
                render: {
                    option_create: function (data, escape) {
                        return `<div class="create fw-semibold p-2 text-primary"><i class="bi bi-plus-circle me-1"></i> Thêm mới: <strong>${escape(data.input)}</strong></div>`;
                    }
                }
            };

            const categoryConfig = {
                create: function (input, callback) {
                    const formData = new FormData();
                    formData.append("name", input);
                    formData.append("description", "Thêm nhanh từ màn hình tạo sản phẩm");

                    fetch('/api/v1/categories', {
                        method: 'POST',
                        body: formData
                    }).then(res => res.ok ? res.json() : Promise.reject())
                        .then(data => callback({value: data.id, text: data.name}))
                        .catch(() => callback(false));
                },
                render: {
                    option_create: function (data, escape) {
                        return `<div class="create fw-semibold p-2 text-success"><i class="bi bi-folder-plus me-1"></i> Tạo danh mục mới: <strong>${escape(data.input)}</strong></div>`;
                    }
                }
            };

            new TomSelect('#category', categoryConfig);
            new TomSelect('#brand', masterDataConfig);
            new TomSelect('#unit', masterDataConfig);
            new TomSelect('#tags', {create: true, plugins: ['remove_button']});

            // Trình biên tập phân loại hàng kiểu Shopee (ảnh gắn ở nhóm phân loại 1)
            OMSVariants.init({
                tierListId: 'tierList',
                matrixWrapId: 'variantMatrix',
                addTierBtnId: 'addTierBtn',
                priceInputId: 'price',
                skuInputId: 'sku',
                nameInputId: 'name',
                manageStockId: 'manageStock',
                singleStockAreaId: 'singleProductStockArea',
                uploadFn: uploadFileToAPI
            });

            // Vẽ lại SKU/giá gợi ý khi đổi Tên / SKU / Giá sản phẩm
            document.getElementById('name').addEventListener('input', OMSVariants.refresh);
            document.getElementById('sku').addEventListener('input', OMSVariants.refresh);
            document.getElementById('price').addEventListener('input', OMSVariants.refresh);
            document.getElementById('manageStock').addEventListener('change', OMSVariants.refresh);
        });

        // Hàm tiện ích: Cập nhật tên kho khi chọn
        function updateBranchDisplay() {
            const select = document.getElementById("branchId");
            const displayName = document.getElementById("displaySelectedBranch");
            if (select.value) {
                displayName.innerText = select.options[select.selectedIndex].text;
            } else {
                displayName.innerText = 'Chưa chọn kho';
            }
        }


        function saveProduct() {
            const nameVal = document.getElementById("name").value.trim();
            const skuVal = document.getElementById("sku").value.trim();
            const unitVal = document.getElementById("unit").value.trim();
            const branchIdVal = document.getElementById("branchId").value; // Lấy ID kho

            if (!nameVal) {
                Toast.fire({
                    icon: 'error',
                    title: 'Vui lòng nhập Tên sản phẩm!'
                });
                document.getElementById("name").focus();
                return;
            }
            if (!unitVal) {
                Toast.fire({
                    icon: 'error',
                    title: 'Vui lòng nhập Đơn vị tính (VD: Chiếc, Bộ)!'
                });
                return;
            }
            if (!branchIdVal) {
                Toast.fire({
                    icon: 'error',
                    title: 'Vui lòng chọn Chi nhánh / Kho để nhập tồn kho ban đầu!'
                });
                document.getElementById("branchId").focus();
                return;
            }

            const payload = {
                sku: skuVal,
                name: nameVal,
                imageUrl: document.getElementById("imageUrl").value.trim(),
                categoryId: document.getElementById("category").value,
                brand: document.getElementById("brand").value,
                unit: unitVal,
                price: parseFloat(document.getElementById("price").value) || 0,
                stockQuantity: parseInt(document.getElementById("stockQuantity").value) || 0,
                branchId: parseInt(branchIdVal), // Truyền ID Kho xuống Backend
                minStockLevel: 0,
                description: document.getElementById("description").value,
                warrantyPeriod: (document.getElementById("warrantyMonths").value || '').trim(),
                attributes: [],
                variants: []
            };

            // Thu thập phân loại + biến thể từ trình biên tập dùng chung (ảnh gắn ở nhóm phân loại 1)
            const collected = OMSVariants.collect();
            payload.attributes = collected.attributes;
            payload.variants = collected.variants;

            fetch('/api/v1/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).then(res => {
                if (res.ok) {

                    Toast.fire({
                        icon: 'success',
                        title: 'Thêm sản phẩm thành công!'
                    }).then(() => {
                        window.location.href = '/ui/products';
                    });
                } else {
                    res.json().then(err => Toast.fire({
                        icon: 'error',
                        title: 'Lỗi Backend: ' + (err.message || 'Kiểm tra DTO Java!')
                    }))
                }
            }).catch(err => Toast.fire({
                icon: 'error',
                title: 'Lỗi kết nối máy chủ!'
            }));
        }

        // ================= XỬ LÝ UPLOAD ẢNH =================
        async function uploadFileToAPI(file) {
            const formData = new FormData();
            formData.append("file", file);

            const response = await fetch('/api/v1/upload', {
                method: 'POST',
                body: formData
            });
            if (!response.ok) throw new Error("Upload thất bại, hãy check lại API Java!");
            const data = await response.json();
            return data.url;
        }

        async function uploadMainImage(inputEl) {
            if (!inputEl.files || inputEl.files.length === 0) return;
            try {
                const url = await uploadFileToAPI(inputEl.files[0]);
                document.getElementById('imageUrl').value = url;
                const previewEl = document.getElementById('mainImagePreview');
                const placeholder = document.getElementById('mainImagePlaceholder');

                previewEl.src = url;
                previewEl.classList.remove('d-none');
                placeholder.classList.add('d-none');
            } catch (err) {
                Toast.fire({
                    icon: 'error',
                    title: 'Lỗi kết nối máy chủ!'
                });

            }
        }

    </script>
</div>
</body>
</html>
