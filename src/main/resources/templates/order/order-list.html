<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">
    <style>
        .filter-btn {
            background: white;
            border: 1px solid #dce0e4;
            color: #4b566b;
            font-size: 13px;
            font-weight: 500;
            height: 36px;
            display: flex;
            align-items: center;
            border-radius: 4px;
        }

        .filter-btn:hover {
            background-color: #f8f9fb;
            border-color: #cbd5e1;
        }

        .table-custom thead th {
            background: #f8f9fb;
            color: #4b566b;
            font-weight: 600;
            font-size: 13px;
            border-top: 1px solid #dee2e6;
            padding: 12px 10px;
            white-space: nowrap;
        }

        .table-custom td {
            vertical-align: middle;
            font-size: 13px;
            color: #2b3445;
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .nav-tabs-custom .nav-link {
            border: none;
            color: #64748b;
            font-weight: 500;
            padding: 10px 20px;
            font-size: 14px;
            position: relative;
            cursor: pointer;
            border-radius: 0;
        }

        .nav-tabs-custom .nav-link.active {
            color: #0d6efd;
            background: transparent;
            font-weight: 600;
        }

        .nav-tabs-custom .nav-link.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0d6efd;
        }

        .nav-tabs-custom .nav-link:hover:not(.active) {
            color: #0f172a;
        }

        .search-box {
            max-width: 450px;
            border: 1px solid #dce0e4;
            border-radius: 6px;
            background: white;
            transition: all 0.2s ease-in-out;
        }

        .search-box:focus-within {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, .25);
        }

        .search-box .input-group-text {
            background: transparent;
            border: none;
            padding-right: 8px;
        }

        .search-box .form-control {
            border: none;
            background: transparent;
            box-shadow: none;
            padding-left: 0;
            font-size: 13px;
            height: 34px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            text-align: center;
        }

        .badge-unpaid {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .badge-paid {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .badge-init {
            background-color: #e2e8f0;
            color: #475569;
            border: 1px solid #cbd5e1;
        }

        .badge-processing {
            background-color: #cce5ff;
            color: #004085;
            border: 1px solid #b8daff;
        }

        .badge-success {
            background-color: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }

        .badge-cancel {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .hover-primary:hover {
            color: #0d6efd !important;
            text-decoration: underline !important;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
        <h4 class="fw-bold mb-0 text-dark">Danh sách đơn hàng</h4>
        <div class="d-flex gap-2">
            <a th:href="@{/ui/orders/create}" class="btn btn-primary fw-bold px-3 shadow-sm">
                <i class="bi bi-plus-circle me-2"></i>Tạo đơn hàng
            </a>
        </div>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 8px;">
        <div class="card-header bg-white border-0 p-0">
            <ul class="nav nav-tabs nav-tabs-custom border-bottom px-3" id="orderTabs">
                <li class="nav-item"><a class="nav-link active" data-status="ALL">Tất cả</a></li>
                <li class="nav-item" th:each="status : ${orderStatuses}">
                    <a class="nav-link" th:data-status="${status.dataValue}" th:text="${status.dataLabel}"></a>
                </li>
            </ul>
        </div>

        <div class="card-body p-0">
            <div class="p-3 d-flex justify-content-between align-items-center gap-2 flex-wrap bg-white">
                <div class="input-group search-box flex-grow-1">
                    <span class="input-group-text"><i class="bi bi-search fs-5 text-muted"></i></span>
                    <input type="text" id="orderSearchInput" class="form-control"
                           placeholder="Tìm kiếm theo mã đơn, tên KH, SĐT, mã vận đơn sàn...">
                </div>

                <div class="d-flex gap-2 align-items-center">
                    <select class="form-select filter-btn w-auto" id="channelFilter" onchange="applyFilters()">
                        <option value="ALL">Tất cả Kênh bán</option>
                        <option th:each="c : ${channels}" th:value="${c.code}" th:text="${c.name}"></option>
                    </select>

                    <select class="form-select filter-btn w-auto fw-bold text-dark" id="datePreset"
                            onchange="handleDatePresetChange()">
                        <option value="all">Toàn thời gian</option>
                        <option value="today">Hôm nay</option>
                        <option value="yesterday">Hôm qua</option>
                        <option value="7days">7 ngày qua</option>
                        <option value="thisMonth">Tháng này</option>
                        <option value="lastMonth">Tháng trước</option>
                        <option value="custom">Tùy chọn...</option>
                    </select>

                    <div id="customDateContainer" class="gap-2 align-items-center d-none">
                        <input type="date" class="form-control filter-btn w-auto text-muted" id="startDate"
                               onchange="applyFilters()">
                        <span class="text-muted">-</span>
                        <input type="date" class="form-control filter-btn w-auto text-muted" id="endDate"
                               onchange="applyFilters()">
                    </div>

                    <button class="btn filter-btn" onclick="clearAllFilters()" title="Xóa bộ lọc">
                        <i class="bi bi-arrow-counterclockwise"></i>
                    </button>
                </div>
            </div>

            <div id="bulkActionBar" class="d-none align-items-center justify-content-between p-2 px-3"
                 style="background-color: #f0f8ff; border-top: 1px solid #dce0e4; border-bottom: 1px solid #dce0e4;">
                <div class="d-flex align-items-center gap-3">
                    <span class="fw-medium" style="color: #0369a1; font-size: 13px;">Đã chọn <span id="selectedCount"
                                                                                                   class="fw-bold fs-6">0</span> đơn hàng</span>
                    <span class="text-muted small">|</span>
                    <a href="javascript:void(0)" class="text-decoration-none fw-medium"
                       style="color: #0369a1; font-size: 13px;" onclick="clearSelection()">Bỏ chọn</a>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <select id="bulkStatusSelect" class="form-select form-select-sm w-auto"
                            style="font-size: 13px; min-width: 180px;">
                        <option value="">-- Chuyển sang trạng thái --</option>
                        <option th:each="status : ${orderStatuses}" th:value="${status.dataValue}"
                                th:text="${status.dataLabel}"></option>
                    </select>
                    <button class="btn btn-primary fw-medium px-3 shadow-sm"
                            style="font-size: 13px; padding-top: 6px; padding-bottom: 6px;"
                            onclick="bulkUpdateStatus()">
                        <i class="bi bi-arrow-repeat me-1"></i>Cập nhật trạng thái
                    </button>
                    <span class="text-muted small">|</span>
                    <button class="btn btn-white border-danger text-danger fw-medium px-3 shadow-sm"
                            style="font-size: 13px; padding-top: 6px; padding-bottom: 6px;"
                            onclick="deleteSelectedOrders()">
                        <i class="bi bi-trash3 me-1"></i>Xóa đơn hàng
                    </button>
                </div>
            </div>

            <div class="table-responsive" style="min-height: 400px;">
                <table class="table table-custom table-hover mb-0">
                    <thead>
                    <tr>
                        <th class="ps-4" style="width: 40px;"><input type="checkbox" class="form-check-input"
                                                                     id="checkAll"></th>
                        <th>Mã đơn hàng</th>
                        <th>Ngày tạo</th>
                        <th>Khách hàng</th>
                        <th>Sản phẩm</th>
                        <th>Kênh bán</th>
                        <th>Mã đơn sàn</th>
                        <th class="text-end">Khách phải trả</th>
                        <th class="text-end" sec:authorize="hasRole('ADMIN')">Lãi/Lỗ</th>
                        <th class="text-center">Thanh toán</th>
                        <th class="text-center">Trạng thái</th>
                    </tr>
                    </thead>
                    <tbody id="orderTableBody">
                    <tr>
                        <td colspan="11" class="text-center py-5">
                            <div class="spinner-border text-primary spinner-border-sm me-2" role="status"></div>
                            Đang tải dữ liệu...
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="p-3 d-flex justify-content-between align-items-center border-top bg-white">
                <div class="text-muted small" id="recordInfo">Đang tải...</div>
                <div class="d-flex align-items-center gap-3">
                    <nav>
                        <ul class="pagination pagination-sm mb-0" id="orderPagination"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const statusMapJsonString = /*[[${orderStatusMapJson}]]*/ '{}';
        const statusLabelMap = JSON.parse(statusMapJsonString || '{}');
        // Nhân viên (STAFF) không xem cột Lãi/Lỗ
        const IS_ADMIN = /*[[${isAdmin}]]*/ false;
        /*]]>*/
    </script>

    <script th:inline="none">
        let allOrders = [];
        let currentTabStatus = 'ALL';

        // --- PHÂN TRANG PHÍA CLIENT ---
        const ORDER_PAGE_SIZE = 15;
        let orderCurrentPage = 1;
        let orderFilteredCache = [];

        const paymentLabelMap = {
            'UNPAID': 'Chưa thanh toán',
            'PARTIAL': 'Thanh toán một phần',
            'PAID': 'Đã thanh toán',
            'REFUNDED': 'Đã hoàn tiền'
        };

        // Hàm format tiền thống nhất theo chuẩn có dấu phẩy en-US
        function formatMoney(amount) {
            return new Intl.NumberFormat('en-US').format(Math.round(amount || 0)) + '₫';
        }

        // Sao chép nhanh mã vận đơn sàn để dán sang trang đối soát của sàn TMĐT
        function copyTracking(code, event) {
            if (event) event.stopPropagation();
            if (!code) return;
            navigator.clipboard.writeText(code).then(() => {
                Toast.fire({icon: 'success', title: 'Đã sao chép mã đơn sàn: ' + code});
            }).catch(() => {
                Toast.fire({icon: 'error', title: 'Không sao chép được, vui lòng copy thủ công'});
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadOrders();

            document.querySelectorAll('#orderTabs .nav-link').forEach(tab => {
                tab.addEventListener('click', function (e) {
                    document.querySelectorAll('#orderTabs .nav-link').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentTabStatus = this.getAttribute('data-status');
                    applyFilters();
                });
            });

            let searchTimeout;
            document.getElementById('orderSearchInput').addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(applyFilters, 300);
            });

            document.getElementById('checkAll').addEventListener('change', function () {
                document.querySelectorAll('.order-checkbox').forEach(cb => {
                    cb.checked = this.checked;
                });
                toggleBulkActionBar();
            });
        });

        async function loadOrders() {
            try {
                const res = await fetch('/api/v1/orders');
                if (!res.ok) throw new Error("Lỗi mạng");
                allOrders = await res.json();
                applyFilters();
            } catch (e) {
                console.error(e);
                document.getElementById('orderTableBody').innerHTML = '<tr><td colspan="11" class="text-center py-5 text-danger"><i class="bi bi-exclamation-triangle fs-3 d-block mb-2"></i>Lỗi kết nối Server! Vui lòng thử lại sau.</td></tr>';
            }
        }

        function handleDatePresetChange() {
            const preset = document.getElementById('datePreset').value;
            const customContainer = document.getElementById('customDateContainer');
            const startInput = document.getElementById('startDate');
            const endInput = document.getElementById('endDate');

            const formatDate = (date) => date.toISOString().split('T')[0];
            const today = new Date();

            if (preset === 'custom') {
                customContainer.classList.remove('d-none');
                customContainer.classList.add('d-flex');
                return;
            } else {
                customContainer.classList.remove('d-flex');
                customContainer.classList.add('d-none');
            }

            if (preset === 'all') {
                startInput.value = '';
                endInput.value = '';
            } else if (preset === 'today') {
                startInput.value = formatDate(today);
                endInput.value = formatDate(today);
            } else if (preset === 'yesterday') {
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                startInput.value = formatDate(yesterday);
                endInput.value = formatDate(yesterday);
            } else if (preset === '7days') {
                const last7 = new Date(today);
                last7.setDate(last7.getDate() - 6);
                startInput.value = formatDate(last7);
                endInput.value = formatDate(today);
            } else if (preset === 'thisMonth') {
                const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
                startInput.value = formatDate(firstDay);
                endInput.value = formatDate(today);
            } else if (preset === 'lastMonth') {
                const firstDayPrev = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                const lastDayPrev = new Date(today.getFullYear(), today.getMonth(), 0);
                startInput.value = formatDate(firstDayPrev);
                endInput.value = formatDate(lastDayPrev);
            }

            applyFilters();
        }

        function applyFilters() {
            const keyword = document.getElementById('orderSearchInput').value.toLowerCase().trim();
            const channel = document.getElementById('channelFilter').value;

            const startDateStr = document.getElementById('startDate').value;
            const endDateStr = document.getElementById('endDate').value;
            const startTimestamp = startDateStr ? new Date(startDateStr + 'T00:00:00').getTime() : null;
            const endTimestamp = endDateStr ? new Date(endDateStr + 'T23:59:59').getTime() : null;

            const filteredOrders = allOrders.filter(o => {
                const matchTab = (currentTabStatus === 'ALL') || (o.status === currentTabStatus);
                const matchChannel = (channel === 'ALL') || (o.salesChannelCode === channel) || (!o.salesChannelCode && channel === 'ALL');

                let matchDate = true;
                if (startTimestamp || endTimestamp) {
                    if (o.createdAt) {
                        const orderTime = new Date(o.createdAt).getTime();
                        if (startTimestamp && orderTime < startTimestamp) matchDate = false;
                        if (endTimestamp && orderTime > endTimestamp) matchDate = false;
                    } else {
                        matchDate = false;
                    }
                }

                const cusName = o.customer ? (o.customer.fullName || o.customer.name || '').toLowerCase() : '';
                const cusPhone = o.customer ? (o.customer.phone || o.customer.phoneNumber || '') : '';
                const orderCode = o.orderCode ? o.orderCode.toLowerCase() : '';
                const tracking = (o.trackingCode || '').toLowerCase();
                const refCode = (o.referenceCode || '').toLowerCase();

                const matchKeyword = !keyword ||
                    orderCode.includes(keyword) ||
                    cusName.includes(keyword) ||
                    cusPhone.includes(keyword) ||
                    tracking.includes(keyword) ||
                    refCode.includes(keyword);

                return matchTab && matchChannel && matchDate && matchKeyword;
            });

            // Lưu kết quả đã lọc và quay về trang 1 mỗi khi đổi bộ lọc
            orderFilteredCache = filteredOrders;
            orderCurrentPage = 1;
            renderTable();
        }

        function clearAllFilters() {
            document.getElementById('orderSearchInput').value = '';
            document.getElementById('channelFilter').value = 'ALL';
            document.getElementById('datePreset').value = 'all';

            document.getElementById('customDateContainer').classList.replace('d-flex', 'd-none');
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';

            applyFilters();
        }

        function renderTable() {
            const tbody = document.getElementById('orderTableBody');
            const info = document.getElementById('recordInfo');

            const total = orderFilteredCache.length;

            if (total === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="text-center py-5 text-muted"><i class="bi bi-inbox fs-1 d-block mb-3 opacity-50"></i>Không tìm thấy đơn hàng nào phù hợp.</td></tr>';
                info.innerText = 'Hiển thị 0 kết quả';
                renderOrderPagination(0);
                clearSelection();
                return;
            }

            // Tính toán lát cắt theo trang hiện tại
            const totalPages = Math.ceil(total / ORDER_PAGE_SIZE);
            if (orderCurrentPage > totalPages) orderCurrentPage = totalPages;
            const startIdx = (orderCurrentPage - 1) * ORDER_PAGE_SIZE;
            const dataList = orderFilteredCache.slice(startIdx, startIdx + ORDER_PAGE_SIZE);

            let html = '';
            dataList.forEach(o => {
                let formattedDate = '---';
                if (o.createdAt) {
                    const d = new Date(o.createdAt);
                    formattedDate = d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }

                const totalAmount = formatMoney(o.totalAmount);

                // --- TÍNH TOÁN LÃI LỖ ---
                const details = o.details || [];
                const totalItemAmount = details.reduce((sum, i) => sum + ((i.unitPrice || 0) * (i.quantity || 0)), 0);
                const totalCostAmount = details.reduce((sum, i) => sum + ((i.costPrice || 0) * (i.quantity || 0)), 0);
                const totalProfit = (totalItemAmount - (o.discountAmount || 0)) - totalCostAmount;

                const profitColor = totalProfit >= 0 ? 'text-success' : 'text-danger';
                const profitSign = totalProfit > 0 ? '+' : '';
                // Chỉ ADMIN mới thấy cột Lãi/Lỗ
                const profitCell = IS_ADMIN
                    ? `<td class="text-end"><span class="fw-bold ${profitColor}">${profitSign}${formatMoney(totalProfit)}</span></td>`
                    : '';
                // ------------------------

                const cusName = o.customer ? (o.customer.fullName || o.customer.lastName + ' ' + o.customer.firstName || 'Khách lẻ') : 'Khách lẻ';
                const cusCode = o.customer ? (o.customer.code || o.customer.id || '') : '';
                const cusLink = cusCode ? `/ui/customers/${cusCode}` : 'javascript:void(0)';
                const channelText = o.salesChannelCode || '---';

                // --- DANH SÁCH SẢN PHẨM (đã gồm đủ tên biến thể trong productName) ---
                const escAttr = (s) => (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
                let productsHtml;
                if (!details.length) {
                    productsHtml = '<span class="text-muted">---</span>';
                } else {
                    productsHtml = details.map(d => {
                        const pname = d.productName || d.sku || 'Sản phẩm';
                        const qty = new Intl.NumberFormat('en-US').format(d.quantity || 0);
                        return `<div class="text-truncate" style="max-width: 280px;" title="${escAttr(pname)}">
                                    <span class="text-dark">${escAttr(pname)}</span>
                                    <span class="text-muted ms-1">× ${qty}</span>
                                </div>`;
                    }).join('');
                }

                // --- MÃ ĐƠN SÀN (để đối chiếu với đơn của sàn TMĐT) ---
                const trackingRaw = o.referenceCode || '';
                let trackingHtml;
                if (trackingRaw) {
                    const trackEsc = escAttr(trackingRaw);
                    trackingHtml = `<span class="fw-medium text-dark" style="cursor:pointer" title="Bấm để sao chép mã đơn sàn" onclick="copyTracking('${trackEsc}', event)">${trackEsc} <i class="bi bi-clipboard text-muted ms-1" style="font-size:11px;"></i></span>`;
                } else {
                    trackingHtml = '<span class="text-muted">---</span>';
                }

                const pStatus = o.paymentStatus || 'UNPAID';
                const pLabel = paymentLabelMap[pStatus] || pStatus;
                let paymentBadge = '';
                if (pStatus === 'PAID') {
                    paymentBadge = `<span class="status-badge badge-paid"><i class="bi bi-check-circle me-1"></i>${pLabel}</span>`;
                } else if (pStatus === 'PARTIAL') {
                    paymentBadge = `<span class="status-badge bg-warning bg-opacity-25 text-dark border border-warning"><i class="bi bi-pie-chart me-1"></i>${pLabel}</span>`;
                } else {
                    paymentBadge = `<span class="status-badge badge-unpaid"><i class="bi bi-clock me-1"></i>${pLabel}</span>`;
                }

                const st = o.status || 'CREATED';
                const stLabel = statusLabelMap[st] || st;
                let statusBadge = '';
                if (st === 'CREATED' || st === 'CONFIRMED' || st === 'DRAFT') {
                    statusBadge = `<span class="status-badge badge-init">${stLabel}</span>`;
                } else if (st === 'COMPLETED') {
                    statusBadge = `<span class="status-badge badge-success">${stLabel}</span>`;
                } else if (st === 'CANCELLED' || st === 'RETURNED') {
                    statusBadge = `<span class="status-badge badge-cancel">${stLabel}</span>`;
                } else {
                    statusBadge = `<span class="status-badge badge-processing">${stLabel}</span>`;
                }

                html += `
                    <tr>
                        <td class="ps-4">
                            <input type="checkbox" class="form-check-input order-checkbox" value="${o.orderCode}" onchange="toggleBulkActionBar()">
                        </td>
                        <td>
                            <a href="/ui/orders/detail/${o.orderCode}" class="text-decoration-none fw-bold text-primary hover-primary">${o.orderCode}</a>
                        </td>
                        <td class="text-muted">${formattedDate}</td>
                        <td>
                            <a href="${cusLink}" class="text-decoration-none fw-medium text-dark hover-primary">${cusName}</a>
                        </td>
                        <td style="min-width: 200px; font-size: 12.5px;">${productsHtml}</td>
                        <td class="text-muted fw-medium">${channelText}</td>
                        <td>${trackingHtml}</td>
                        <td class="text-end fw-bold text-dark">${totalAmount}</td>
                        ${profitCell}
                        <td class="text-center">${paymentBadge}</td>
                        <td class="text-center">${statusBadge}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
            const fromIdx = startIdx + 1;
            const toIdx = startIdx + dataList.length;
            info.innerText = `Hiển thị ${fromIdx}-${toIdx} trên tổng ${total} đơn hàng`;
            renderOrderPagination(total);
            clearSelection();
        }

        // Vẽ thanh phân trang dựa trên tổng số bản ghi đã lọc
        function renderOrderPagination(total) {
            const ul = document.getElementById('orderPagination');
            if (!ul) return;
            const totalPages = Math.ceil(total / ORDER_PAGE_SIZE);
            if (totalPages <= 1) {
                ul.innerHTML = '';
                return;
            }

            let html = '';
            html += `<li class="page-item ${orderCurrentPage === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="goToOrderPage(${orderCurrentPage - 1}); return false;"><i class="bi bi-chevron-left"></i></a></li>`;

            // Hiển thị tối đa 5 nút trang quanh trang hiện tại
            let startPage = Math.max(1, orderCurrentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            startPage = Math.max(1, endPage - 4);

            for (let p = startPage; p <= endPage; p++) {
                html += `<li class="page-item ${p === orderCurrentPage ? 'active' : ''}">
                            <a class="page-link" href="#" onclick="goToOrderPage(${p}); return false;">${p}</a></li>`;
            }

            html += `<li class="page-item ${orderCurrentPage === totalPages ? 'disabled' : ''}">
                        <a class="page-link" href="#" onclick="goToOrderPage(${orderCurrentPage + 1}); return false;"><i class="bi bi-chevron-right"></i></a></li>`;
            ul.innerHTML = html;
        }

        function goToOrderPage(p) {
            const totalPages = Math.ceil(orderFilteredCache.length / ORDER_PAGE_SIZE);
            if (p < 1 || p > totalPages) return;
            orderCurrentPage = p;
            renderTable();
        }

        function toggleBulkActionBar() {
            const checkedBoxes = document.querySelectorAll('.order-checkbox:checked');
            const bulkBar = document.getElementById('bulkActionBar');
            const allCheckboxes = document.querySelectorAll('.order-checkbox');

            document.getElementById('checkAll').checked = (checkedBoxes.length > 0 && checkedBoxes.length === allCheckboxes.length);

            if (checkedBoxes.length > 0) {
                document.getElementById('selectedCount').innerText = checkedBoxes.length;
                bulkBar.classList.remove('d-none');
                bulkBar.classList.add('d-flex');
            } else {
                bulkBar.classList.add('d-none');
                bulkBar.classList.remove('d-flex');
            }
        }

        function clearSelection() {
            document.querySelectorAll('.order-checkbox, #checkAll').forEach(cb => cb.checked = false);
            toggleBulkActionBar();
        }

        async function bulkUpdateStatus() {
            const checkboxes = document.querySelectorAll('.order-checkbox:checked');
            if (checkboxes.length === 0) {
                Toast.fire({icon: 'warning', title: 'Vui lòng chọn ít nhất 1 đơn hàng!'});
                return;
            }

            const select = document.getElementById('bulkStatusSelect');
            const newStatus = select.value;
            if (!newStatus) {
                Toast.fire({icon: 'warning', title: 'Vui lòng chọn trạng thái cần chuyển!'});
                return;
            }
            const statusLabel = statusLabelMap[newStatus] || newStatus;
            const orderCodes = Array.from(checkboxes).map(cb => cb.value);

            const confirmation = await Swal.fire({
                title: 'Xác nhận đổi trạng thái',
                html: `Chuyển <b>${orderCodes.length}</b> đơn hàng đã chọn sang trạng thái <b>"${statusLabel}"</b>?<br><span class="text-muted small">Đơn nào không hợp lệ (vd: đã hủy/đã hoàn thành, thiếu tồn kho) sẽ được báo riêng.</span>`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#0d6efd',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Xác nhận cập nhật',
                cancelButtonText: 'Hủy bỏ'
            });
            if (!confirmation.isConfirmed) return;

            const btn = document.querySelector('#bulkActionBar button.btn-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang xử lý...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/v1/orders/bulk-status', {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({orderCodes: orderCodes, status: newStatus})
                });

                if (!res.ok) {
                    const errText = await OMSGetError(res, 'Không thể cập nhật trạng thái!');
                    Toast.fire({icon: 'error', title: 'Lỗi: ' + errText});
                } else {
                    const data = await res.json();
                    if (data.failed === 0) {
                        await Swal.fire({
                            title: 'Hoàn tất!',
                            text: `Đã cập nhật thành công ${data.success}/${data.total} đơn hàng sang "${statusLabel}".`,
                            icon: 'success'
                        });
                    } else {
                        let failHtml = (data.failures || []).map(f =>
                            `<li class="text-start"><b>${f.orderCode}</b>: ${f.error}</li>`).join('');
                        await Swal.fire({
                            title: 'Cập nhật xong (có đơn lỗi)',
                            html: `Thành công <b>${data.success}</b>, lỗi <b>${data.failed}</b> trên tổng ${data.total} đơn.<hr>
                                   <ul class="small" style="max-height:200px;overflow:auto;padding-left:18px;">${failHtml}</ul>`,
                            icon: 'warning'
                        });
                    }
                }
            } catch (e) {
                Toast.fire({icon: 'error', title: 'Lỗi kết nối đến máy chủ!'});
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                select.value = '';
                await loadOrders();
            }
        }

        async function deleteSelectedOrders() {
            const checkboxes = document.querySelectorAll('.order-checkbox:checked');

            if (checkboxes.length === 0) {
                Toast.fire({icon: 'warning', title: 'Vui lòng chọn ít nhất 1 đơn hàng để xóa!'});
                return;
            }

            const confirmation = await Swal.fire({
                title: 'Xác nhận xóa vĩnh viễn',
                text: `CẢNH BÁO: Bạn có chắc chắn muốn xóa vĩnh viễn ${checkboxes.length} đơn hàng đã chọn không? Thao tác này không thể hoàn tác!`,
                icon: 'error',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Tôi hiểu, xác nhận xóa!',
                cancelButtonText: 'Hủy bỏ'
            });

            if (!confirmation.isConfirmed) return;

            let successCount = 0;
            const btn = document.querySelector('#bulkActionBar button');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang xử lý...';
            btn.disabled = true;

            for (let cb of checkboxes) {
                try {
                    const res = await fetch(`/api/v1/orders/${cb.value}`, {method: 'DELETE'});
                    if (res.ok) successCount++;
                } catch (e) {
                    console.error("Lỗi xóa đơn:", cb.value);
                }
            }

            if (successCount > 0) {
                await Swal.fire({
                    title: 'Hoàn tất!',
                    text: `Hệ thống đã xóa thành công ${successCount}/${checkboxes.length} đơn hàng đã chọn.`,
                    icon: 'success'
                });
            } else {
                Toast.fire({icon: 'error', title: 'Không có đơn hàng nào được xóa. Vui lòng kiểm tra lại!'});
            }

            btn.innerHTML = originalText;
            btn.disabled = false;
            await loadOrders();
        }
    </script>
</div>
</body>
