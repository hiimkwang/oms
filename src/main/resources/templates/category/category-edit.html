<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<body>
<div class="oms-container pb-5">
    <style>
        .upload-zone {
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #dee2e6;
            background-color: #f8f9fa;
            position: relative;
        }

        .upload-zone:hover {
            border-color: #0d6efd;
            background-color: #f1f7ff;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
        }

        .preview-container {
            position: relative;
            display: inline-block;
        }

        .btn-remove-img {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #dc3545;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 sticky-top bg-light py-3"
         style="z-index: 1000; top: 64px;">
        <div class="d-flex align-items-center gap-3">
            <a href="/ui/categories" class="btn btn-light border shadow-sm"><i class="bi bi-arrow-left"></i></a>
            <h4 class="fw-bold mb-0 text-dark">Chi tiết danh mục</h4>
        </div>
        <div class="d-flex gap-2">
            <a href="/ui/categories" class="btn btn-light border fw-medium">Hủy</a>
            <button class="btn btn-primary fw-bold px-4 shadow-sm" onclick="updateCategory()">Lưu thay đổi</button>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm p-4 mb-4">
                <h6 class="fw-bold mb-3 border-bottom pb-2">Thông tin cơ bản</h6>

                <input type="hidden" id="categoryId" th:value="${category.id}">

                <div class="mb-4">
                    <label class="form-label small fw-bold">Tên danh mục <span class="text-danger">*</span></label>
                    <input type="text" id="categoryName" class="form-control shadow-none"
                           th:value="${category.name != null ? category.name : category.dataValue}">
                </div>
                <div>
                    <label class="form-label small fw-bold">Mô tả</label>
                    <textarea id="categoryDesc" class="form-control shadow-none" rows="8"
                              th:text="${category.description}"></textarea>
                </div>
            </div>

            <div class="card border-0 shadow-sm p-4 border-top border-danger border-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="fw-bold text-danger mb-1">Xóa danh mục</h6>
                        <p class="text-muted small mb-0">Hành động này không thể hoàn tác. Các sản phẩm thuộc danh mục
                            sẽ chuyển về "Chưa phân loại".</p>
                    </div>
                    <button class="btn btn-outline-danger fw-bold px-4" onclick="deleteCategory()">Xóa</button>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-0 shadow-sm p-4 mb-4">
                <h6 class="fw-bold mb-3 border-bottom pb-2">Ảnh danh mục</h6>

                <div class="upload-zone rounded" id="uploadZone"
                     onclick="if(event.target.id !== 'removeImgBtn' && event.target.closest('#removeImgBtn') === null) document.getElementById('fileInput').click()">

                    <div id="uploadInstruction" th:classappend="${category.imageUrl != null} ? 'd-none' : ''">
                        <div class="text-center">
                            <i class="bi bi-cloud-arrow-up fs-1 text-primary"></i>
                            <p class="mt-2 mb-0 small fw-bold">Tải ảnh lên</p>
                            <small class="text-muted">Click để chọn ảnh từ máy tính</small>
                        </div>
                    </div>

                    <div class="preview-container" id="previewContainer"
                         th:classappend="${category.imageUrl == null} ? 'd-none' : ''">
                        <img id="imagePreview" th:src="${category.imageUrl != null ? category.imageUrl : '#'}"
                             alt="Preview">
                        <button type="button" class="btn-remove-img" id="removeImgBtn" onclick="removeImage(event)"><i
                                class="bi bi-x"></i></button>
                    </div>
                </div>

                <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(this)">
                <input type="hidden" id="isImageRemoved" value="false">

                <p class="text-muted small mt-2 mb-0 italic">* Nên chọn ảnh tỉ lệ 1:1 hoặc 4:3</p>
            </div>

            <div class="card border-0 shadow-sm p-3">
                <div class="d-flex justify-content-between text-muted small">
                    <span>Ngày tạo:</span>
                    <span class="fw-medium text-dark"
                          th:text="${#temporals.format(category.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
                <div class="d-flex justify-content-between text-muted small mt-2">
                    <span>Cập nhật lần cuối:</span>
                    <span class="fw-medium text-dark"
                          th:text="${category.updatedAt != null ? #temporals.format(category.updatedAt, 'dd/MM/yyyy HH:mm') : '---'}"></span>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('previewContainer').classList.remove('d-none');
                    document.getElementById('uploadInstruction').classList.add('d-none');
                    document.getElementById('isImageRemoved').value = "false";
                }
                reader.readAsDataURL(file);
            }
        }

        function removeImage(event) {
            event.stopPropagation();
            document.getElementById('fileInput').value = "";
            document.getElementById('imagePreview').src = "#";
            document.getElementById('previewContainer').classList.add('d-none');
            document.getElementById('uploadInstruction').classList.remove('d-none');
            document.getElementById('isImageRemoved').value = "true"; // Bật cờ xóa ảnh
        }

        async function updateCategory() {
            const id = document.getElementById("categoryId").value;
            const name = document.getElementById("categoryName").value;
            const desc = document.getElementById("categoryDesc").value;
            const fileInput = document.getElementById("fileInput");
            const isImageRemoved = document.getElementById("isImageRemoved").value;

            if (!name || name.trim() === "") {
                Toast.fire({
                    icon: 'error',
                    title: 'Tên danh mục không được để trống!'
                });
                return;
            }

            const formData = new FormData();
            formData.append("name", name);
            formData.append("description", desc);
            formData.append("isImageRemoved", isImageRemoved);

            if (fileInput.files[0]) {
                formData.append("image", fileInput.files[0]);
            }

            try {
                const response = await fetch(`/api/v1/categories/${id}`, {
                    method: 'PUT',
                    body: formData
                });

                if (response.ok) {
                    Toast.fire({
                        icon: 'success',
                        title: 'Cập nhật danh mục thành công!'
                    }).then(() => {
                        window.location.href = '/ui/categories';
                    });
                } else {
                    const error = await response.text();
                    Toast.fire({
                        icon: 'error',
                        title: 'Lỗi!'
                    });
                }
            } catch (err) {
                Toast.fire({
                    icon: 'error',
                    title: 'Không gọi được API, kiểm tra lại kết nối!'
                });
            }
        }

        async function deleteCategory() {
            const id = document.getElementById("categoryId").value;

            // 1. Dùng SweetAlert2 với ngôn từ chuyên nghiệp
            const confirmation = await Swal.fire({
                title: 'Xác nhận xóa danh mục',
                text: "Bạn có chắc chắn muốn xóa danh mục này không? Thao tác này không thể hoàn tác.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Xác nhận xóa',
                cancelButtonText: 'Hủy bỏ'
            });

            if (!confirmation.isConfirmed) return;

            try {
                const response = await fetch(`/api/v1/categories/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    Toast.fire({
                        icon: 'success',
                        title: 'Xóa danh mục thành công!'
                    }).then(() => {
                        window.location.href = '/ui/categories';
                    });

                } else {
                    Toast.fire({
                        icon: 'error',
                        title: 'Không thể xóa. Danh mục này đang chứa sản phẩm!'
                    });
                }
            } catch (err) {
                Toast.fire({
                    icon: 'error',
                    title: 'Lỗi kết nối đến máy chủ!'
                });
            }
        }
    </script>
</div>
</body>
</html>
