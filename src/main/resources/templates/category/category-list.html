<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">
    <style>
        /* Thống nhất style chuẩn hệ thống */
        .filter-btn {
            background: white;
            border: 1px solid #dce0e4;
            color: #4b566b;
            font-size: 13px;
            font-weight: 500;
            height: 36px;
            display: flex;
            align-items: center;
        }

        .filter-btn:hover {
            background-color: #f8f9fb;
            border-color: #cbd5e1;
        }

        .table-custom thead th {
            background: #f8f9fb;
            color: #4b566b;
            font-weight: 600;
            font-size: 13px;
            border-top: 1px solid #dee2e6;
            padding: 12px 10px;
        }

        .table-custom td {
            vertical-align: middle;
            font-size: 13px;
            color: #2b3445;
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .nav-tabs-custom .nav-link {
            border: none;
            color: #666;
            font-weight: 500;
            padding: 10px 20px;
            font-size: 14px;
            position: relative;
        }

        .nav-tabs-custom .nav-link.active {
            color: #0d6efd;
            background: transparent;
        }

        .nav-tabs-custom .nav-link.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0d6efd;
        }

        .search-box {
            max-width: 500px;
            border: 1px solid #dce0e4;
            border-radius: 6px;
            background: white;
            transition: all 0.2s ease-in-out;
        }

        .search-box:focus-within {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, .25);
        }

        .search-box .input-group-text {
            background: transparent;
            border: none;
            padding-right: 8px;
        }

        .search-box .form-control {
            border: none;
            background: transparent;
            box-shadow: none;
            padding-left: 0;
            font-size: 13px;
            height: 36px;
        }

        .product-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        .product-img-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background: #f1f5f9;
            border: 1px dashed #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }

        .cursor-pointer {
            cursor: pointer;
        }

        .table-hover tbody tr:hover {
            background-color: #f8fafc;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
        <h4 class="fw-bold mb-0 text-dark">Danh mục sản phẩm</h4>
        <div class="d-flex gap-2">
            <a th:href="@{/ui/categories/create}" class="btn btn-primary fw-bold px-3 shadow-sm">
                <i class="bi bi-plus-circle me-2"></i>Thêm danh mục
            </a>
        </div>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 8px;">

        <div class="card-header bg-white border-0 p-0">
            <ul class="nav nav-tabs nav-tabs-custom border-bottom px-3">
                <li class="nav-item"><a class="nav-link active" href="javascript:void(0)">Tất cả danh mục</a></li>
            </ul>
        </div>

        <div id="defaultToolbar" class="p-3 d-flex justify-content-between align-items-center gap-2 flex-wrap bg-white">
            <div class="input-group search-box flex-grow-1">
                <span class="input-group-text"><i class="bi bi-search fs-5 text-muted"></i></span>
                <input type="text" id="catSearchInput" class="form-control" placeholder="Tìm kiếm theo tên danh mục...">
            </div>
            <div class="d-flex gap-2">
                <button class="btn filter-btn px-3" onclick="window.location.reload()">
                    <i class="bi bi-arrow-clockwise me-2"></i>Làm mới
                </button>
            </div>
        </div>

        <div id="bulkActionBar" class="d-none align-items-center justify-content-between p-2 px-3"
             style="background-color: #f0f8ff; border-top: 1px solid #dce0e4; border-bottom: 1px solid #dce0e4;">
            <div class="d-flex align-items-center gap-3">
                <span class="fw-medium" style="color: #0369a1; font-size: 13px;">
                    Đã chọn <span id="selectedCount" class="fw-bold fs-6">0</span> danh mục
                </span>
                <span class="text-muted small">|</span>
                <a href="javascript:void(0)" class="text-decoration-none fw-medium"
                   style="color: #0369a1; font-size: 13px;" onclick="clearSelection()">Bỏ chọn</a>
            </div>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-white border-danger text-danger fw-medium px-4 shadow-sm"
                        style="font-size: 13px; padding-top: 6px; padding-bottom: 6px;"
                        onclick="deleteSelectedCategories()">
                    Xóa danh mục
                </button>
            </div>
        </div>

        <div class="table-responsive" style="min-height: 300px;">
            <table class="table table-custom table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-4" style="width: 40px;">
                        <input class="form-check-input" type="checkbox" id="checkAll" onchange="toggleAll(this)">
                    </th>
                    <th>Tên danh mục</th>
                    <th class="text-center">Số lượng sản phẩm</th>
                    <th class="text-end pe-4">Ngày tạo</th>
                </tr>
                </thead>
                <tbody id="categoryTableBody">

                <th:block th:each="cat : ${categories}">
                    <tr class="cursor-pointer category-row"
                        th:data-name="${cat.name != null ? cat.name : cat.dataValue}"
                        th:onclick="'window.location.href=\'/ui/categories/edit/' + ${cat.id} + '\''">

                        <td class="ps-4" onclick="event.stopPropagation()">
                            <input class="form-check-input item-check" type="checkbox" th:value="${cat.id}"
                                   onchange="updateBulkAction()">
                        </td>

                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <img th:if="${cat.imageUrl != null and cat.imageUrl != ''}" th:src="${cat.imageUrl}"
                                     class="product-img shadow-sm">
                                <div th:unless="${cat.imageUrl != null and cat.imageUrl != ''}"
                                     class="product-img-placeholder shadow-sm">
                                    <i class="bi bi-folder fs-6"></i>
                                </div>
                                <span class="fw-bold text-primary"
                                      th:text="${cat.name != null ? cat.name : cat.dataValue}"></span>
                            </div>
                        </td>
                        <td class="text-center fw-medium text-dark" th:text="${cat.productCount != null ? cat.productCount : 0}">
                            0
                        </td>
                        <td class="text-end text-muted pe-4">
                            <span th:text="${cat.createdAt != null ? #temporals.format(cat.createdAt, 'dd/MM/yyyy') : '---'}"></span>
                        </td>
                    </tr>
                </th:block>

                <tr th:if="${#lists.isEmpty(categories)}">
                    <td colspan="4" class="text-center py-5 text-muted">
                        <i class="bi bi-folder-x fs-2 d-block mb-2"></i>Chưa có danh mục nào.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="p-3 d-flex justify-content-between align-items-center border-top bg-white">
            <div class="text-muted small" id="recordInfo">
                <span th:if="${not #lists.isEmpty(categories)}"
                      th:text="'Hiển thị 1 - ' + ${#lists.size(categories)} + ' trên tổng số ' + ${#lists.size(categories)} + ' danh mục'"></span>
                <span th:unless="${not #lists.isEmpty(categories)}">Hiển thị 0 danh mục</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item disabled"><a class="page-link" href="#"><i class="bi bi-chevron-left"></i></a>
                        </li>
                        <li class="page-item active"><a class="page-link" href="#">1</a></li>
                        <li class="page-item"><a class="page-link" href="#"><i class="bi bi-chevron-right"></i></a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            // Logic Tìm kiếm nội bộ (Client-side)
            const searchInput = document.getElementById('catSearchInput');
            searchInput.addEventListener('input', function () {
                const val = this.value.trim().toLowerCase();
                const rows = document.querySelectorAll('.category-row');
                rows.forEach(row => {
                    const name = row.getAttribute('data-name').toLowerCase();
                    row.style.display = name.includes(val) ? "" : "none";
                });
            });
        });

        // Xử lý Checkbox & Bulk Actions
        function toggleAll(source) {
            const checkboxes = document.querySelectorAll('.item-check');
            checkboxes.forEach(cb => {
                // Chỉ chọn những dòng đang hiển thị (không bị ẩn bởi tìm kiếm)
                if (cb.closest('tr').style.display !== 'none') {
                    cb.checked = source.checked;
                }
            });
            updateBulkAction();
        }

        function clearSelection() {
            document.querySelectorAll('.item-check, #checkAll').forEach(cb => cb.checked = false);
            updateBulkAction();
        }

        function updateBulkAction() {
            const count = document.querySelectorAll('.item-check:checked').length;
            const bulkBar = document.getElementById('bulkActionBar');
            const toolbar = document.getElementById('defaultToolbar');

            if (count > 0) {
                document.getElementById('selectedCount').innerText = count;
                toolbar.classList.add('d-none');
                bulkBar.classList.remove('d-none');
                bulkBar.classList.add('d-flex');
            } else {
                toolbar.classList.remove('d-none');
                bulkBar.classList.add('d-none');
                bulkBar.classList.remove('d-flex');
            }

            // Cập nhật trạng thái của nút Check All
            const totalVisible = Array.from(document.querySelectorAll('.item-check')).filter(cb => cb.closest('tr').style.display !== 'none').length;
            document.getElementById('checkAll').checked = (count > 0 && count === totalVisible);
        }

        // Gọi API Xóa hàng loạt
        async function deleteSelectedCategories() {
            const checkedBoxes = document.querySelectorAll('.item-check:checked');
            if (checkedBoxes.length === 0) return;

            const ids = Array.from(checkedBoxes).map(cb => cb.value);

            if (!confirm(`Xác nhận xoá vĩnh viễn ${ids.length} danh mục đã chọn?`)) return;

            try {
                const res = await fetch('/ui/categories/bulk-delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(ids)
                });

                if (res.ok) {
                    alert(`Đã xóa thành công ${ids.length} danh mục!`);
                    window.location.reload();
                } else {
                    const err = await res.json();
                    alert("Lỗi khi xoá: " + (err.message || "Hãy kiểm tra xem danh mục có đang chứa sản phẩm không."));
                }
            } catch (err) {
                alert("Lỗi kết nối Server: " + err);
            }
        }
    </script>
</div>
</body>
</html>
