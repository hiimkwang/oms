<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<body>
<div class="oms-container pb-5">
    <style>
        .table-hover tbody tr {
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .category-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        /* Style cho thanh Bulk Actions giống ảnh Sapo */
        #bulkActionsBar {
            background-color: #f4f6f8;
            border-bottom: 1px solid #dee2e6;
        }

        .bulk-action-link {
            color: #007bff;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            transition: 0.2s;
        }

        .bulk-action-link:hover {
            color: #0056b3;
            text-decoration: underline;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-dark mb-0">Danh mục sản phẩm</h3>
        <a href="/ui/categories/create" class="btn btn-primary fw-bold shadow-sm px-4">
            <i class="bi bi-plus-lg me-1"></i> Thêm danh mục
        </a>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden">

        <div id="searchFilterBar" class="p-3 bg-white border-bottom d-flex gap-2 align-items-center">
            <div class="input-group flex-grow-1">
                <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-search"></i></span>
                <input type="text" id="catSearchInput" class="form-control border-start-0 ps-0 shadow-none"
                       placeholder="Tìm kiếm theo tên danh mục...">
            </div>
            <button class="btn btn-white border px-3" onclick="window.location.reload()">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>

        <div id="bulkActionsBar" class="p-3 d-none align-items-center gap-4">
            <div class="d-flex align-items-center gap-2">
                <input class="form-check-input mt-0" type="checkbox" id="bulkSelectAll" checked onclick="unselectAll()">
                <span class="text-dark">Đã chọn <strong id="selectedCount">0</strong> danh mục</span>
            </div>
            <div class="d-flex gap-4 align-items-center">
                <a class="bulk-action-link" onclick="deleteSelectedCategories()">Xóa danh mục</a>

                <div class="dropdown">
                    <button class="btn btn-white border btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        Thao tác khác
                    </button>
                    <ul class="dropdown-menu shadow-sm">
                        <li><a class="dropdown-item" href="#">Ẩn danh mục</a></li>
                        <li><a class="dropdown-item" href="#">Hiện danh mục</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="categoryTable">
                <thead class="table-light">
                <tr>
                    <th class="ps-4" style="width: 40px;">
                        <input class="form-check-input" type="checkbox" id="selectAll">
                    </th>
                    <th>Danh mục</th>
                    <th class="text-center">Số lượng sản phẩm</th>
                    <th class="text-end pe-4">Ngày tạo</th>
                </tr>
                </thead>
                <tbody id="categoryTableBody">
                <tr th:each="cat : ${categories}" class="category-row"
                    th:data-name="${cat.name != null ? cat.name : cat.dataValue}"
                    th:onclick="'window.location.href=\'/ui/categories/edit/' + ${cat.id} + '\''">

                    <td class="ps-4" onclick="event.stopPropagation()">
                        <input class="form-check-input row-checkbox" type="checkbox" th:value="${cat.id}">
                    </td>

                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <img th:if="${cat.imageUrl != null}" th:src="${cat.imageUrl}" class="category-img">
                            <div th:unless="${cat.imageUrl != null}"
                                 class="bg-light border rounded d-flex align-items-center justify-content-center text-muted"
                                 style="width: 40px; height: 40px;">
                                <i class="bi bi-image"></i>
                            </div>
                            <span class="fw-semibold text-primary"
                                  th:text="${cat.name != null ? cat.name : cat.dataValue}"></span>
                        </div>
                    </td>
                    <td class="text-center text-muted">0</td>
                    <td class="text-end pe-4 text-muted small"
                        th:text="${#temporals.format(cat.createdAt, 'dd/MM/yyyy')}">25/03/2026
                    </td>
                </tr>
                <tr id="noDataRow" th:if="${#lists.isEmpty(categories)}">
                    <td colspan="4" class="text-center py-5 text-muted">Chưa có danh mục nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const searchInput = document.getElementById('catSearchInput');
            const selectAll = document.getElementById('selectAll');
            const bulkSelectAll = document.getElementById('bulkSelectAll');
            const rowCheckboxes = document.querySelectorAll('.row-checkbox');
            const bulkBar = document.getElementById('bulkActionsBar');
            const searchBar = document.getElementById('searchFilterBar');
            const selectedCountSpan = document.getElementById('selectedCount');

            // 1. Logic Tìm kiếm
            searchInput.addEventListener('input', function () {
                const val = this.value.trim().toLowerCase();
                const rows = document.querySelectorAll('.category-row');
                rows.forEach(row => {
                    const name = row.getAttribute('data-name').toLowerCase();
                    row.style.display = name.includes(val) ? "" : "none";
                });
            });

            // 2. Logic Chọn tất cả từ thead
            selectAll.addEventListener('change', function () {
                rowCheckboxes.forEach(cb => {
                    if (cb.closest('tr').style.display !== 'none') {
                        cb.checked = this.checked;
                    }
                });
                toggleBulkBar();
            });

            // 3. Logic Chọn từng dòng
            rowCheckboxes.forEach(cb => {
                cb.addEventListener('change', toggleBulkBar);
            });

            function toggleBulkBar() {
                const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');
                const count = checkedBoxes.length;

                if (count > 0) {
                    selectedCountSpan.innerText = count;
                    searchBar.classList.add('d-none');
                    searchBar.classList.remove('d-flex');
                    bulkBar.classList.remove('d-none');
                    bulkBar.classList.add('d-flex');
                    bulkSelectAll.checked = true; // Luôn tích ô checkbox trên thanh bulk action

                    // Update thead checkbox
                    selectAll.checked = (count === rowCheckboxes.length);
                } else {
                    searchBar.classList.remove('d-none');
                    searchBar.classList.add('d-flex');
                    bulkBar.classList.add('d-none');
                    bulkBar.classList.remove('d-flex');
                    selectAll.checked = false;
                }
            }

            // Hàm Hủy chọn tất cả (khi bấm vào checkbox trên thanh bulk action)
            window.unselectAll = function () {
                selectAll.checked = false;
                rowCheckboxes.forEach(cb => cb.checked = false);
                toggleBulkBar();
            }
        });

        // Xoá hàng loạt
        function deleteSelectedCategories() {
            const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');
            const ids = Array.from(checkedBoxes).map(cb => cb.value);

            if (!confirm(`Xác nhận xoá ${ids.length} danh mục đã chọn?`)) return;

            fetch('/ui/categories/bulk-delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(ids)
            }).then(res => {
                if (res.ok) {
                    location.reload();
                } else {
                    alert("Lỗi khi xoá! Hãy kiểm tra xem danh mục có đang chứa sản phẩm không.");
                }
            });
        }
    </script>
</div>
</body>
</html>
