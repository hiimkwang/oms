<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">

    <style>
        .oms-toolbar .btn, .oms-toolbar .input-group-text, .oms-toolbar .form-control {
            height: 38px;
            display: flex;
            align-items: center;
        }

        .table-custom thead th {
            background-color: #f4f6f8;
            font-size: 13px;
            color: #333;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
            padding-top: 12px;
            padding-bottom: 12px;
        }

        .table-custom tbody tr {
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .table-custom tbody td {
            vertical-align: middle;
            font-size: 14px;
            padding-top: 12px;
            padding-bottom: 12px;
        }

        .status-active {
            background-color: #e6f6ee;
            color: #008a47;
            border: 1px solid #c2ebd5;
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-inactive {
            background-color: #f8f9fa;
            color: #6c757d;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Style cho thanh Bulk Actions */
        #bulkActionsBar {
            background-color: #f4f6f8;
            height: 70px;
        }

        .bulk-action-link {
            color: #dc3545;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            transition: 0.2s;
        }

        .bulk-action-link:hover {
            color: #b02a37;
            text-decoration: underline;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-dark mb-0">Danh sách nhà cung cấp</h3>
        <div class="d-flex gap-2">
            <button class="btn btn-white border fw-medium shadow-sm text-dark"><i class="bi bi-box-arrow-up me-1"></i>
                Xuất file
            </button>
            <button class="btn btn-white border fw-medium shadow-sm text-dark"><i
                    class="bi bi-box-arrow-in-down me-1"></i> Nhập file
            </button>
            <a th:href="@{/ui/suppliers/create}" class="btn btn-primary fw-bold shadow-sm px-3"><i
                    class="bi bi-plus-lg me-1"></i> Thêm nhà cung cấp</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="border-bottom px-4 pt-3">
            <ul class="nav nav-underline border-0">
                <li class="nav-item">
                    <a class="nav-link active fw-semibold text-primary border-primary border-bottom border-2 pb-2"
                       href="#">Tất cả</a>
                </li>
            </ul>
        </div>

        <form id="filterForm" method="GET" action="/ui/suppliers" class="m-0">
            <div id="searchFilterBar" class="oms-toolbar p-3 bg-white border-bottom d-flex gap-2 align-items-center flex-nowrap">

                <div class="input-group flex-grow-1">
                    <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-search"></i></span>
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="form-control border-start-0 ps-0 shadow-none"
                           placeholder="Tìm kiếm theo tên, mã, SĐT nhà cung cấp">
                </div>

                <select name="assignee" class="form-select border shadow-none text-dark w-auto" style="height: 38px;">
                    <option value="">Tất cả nhân viên</option>
                    <option value="QUANG BUI" th:selected="${assignee == 'QUANG BUI'}">QUANG BUI</option>
                    <option value="ADMIN" th:selected="${assignee == 'ADMIN'}">ADMIN</option>
                </select>

                <button type="submit" class="btn btn-light border fw-medium text-dark px-4 text-nowrap">Lọc</button>
            </div>
        </form>

        <div id="bulkActionsBar" class="p-3 d-none align-items-center gap-4 border-bottom">
            <div class="d-flex align-items-center gap-2">
                <input class="form-check-input mt-0" type="checkbox" id="bulkSelectAll" checked onclick="unselectAll()">
                <span class="text-dark">Đã chọn <strong id="selectedCount">0</strong> nhà cung cấp</span>
            </div>
            <div class="d-flex gap-4 align-items-center">
                <a class="bulk-action-link" onclick="deleteSelectedSuppliers()"><i class="bi bi-trash me-1"></i> Xóa nhà
                    cung cấp</a>
                <div class="dropdown">
                    <button class="btn btn-white border btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        Thao tác khác
                    </button>
                    <ul class="dropdown-menu shadow-sm">
                        <li><a class="dropdown-item" href="#">Ngừng hoạt động</a></li>
                        <li><a class="dropdown-item" href="#">Gán thẻ (Tags)</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover table-custom mb-0 text-center text-nowrap">
                <thead>
                <tr>
                    <th class="ps-4" style="width: 40px;">
                        <input class="form-check-input" type="checkbox" id="selectAll">
                    </th>
                    <th class="text-start">Mã NCC</th>
                    <th class="text-start">Tên NCC</th>
                    <th>Trạng thái</th>
                    <th>Số điện thoại</th>
                    <th class="pe-4">Email</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${suppliers}" class="supplier-row" th:data-code="${s.code}">
                    <td class="ps-4" onclick="event.stopPropagation()">
                        <input class="form-check-input row-checkbox" type="checkbox" th:value="${s.code}">
                    </td>
                    <td class="text-start">
                        <span class="text-primary text-decoration-none fw-bold" th:text="${s.code}"></span>
                    </td>
                    <td class="text-start text-dark fw-medium" th:text="${s.name}"></td>
                    <td>
                        <span th:if="${s.status != null and s.status.name() == 'ACTIVE'}" class="status-active">Đang hoạt động</span>
                        <span th:if="${s.status != null and s.status.name() == 'INACTIVE'}" class="status-inactive">Ngừng hoạt động</span>
                    </td>
                    <td class="text-muted" th:text="${s.phone != null and s.phone != '' ? s.phone : '---'}"></td>
                    <td class="text-muted pe-4" th:text="${s.email != null and s.email != '' ? s.email : '---'}"></td>
                </tr>

                <tr th:if="${#lists.isEmpty(suppliers)}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                        Chưa có nhà cung cấp nào.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="card-footer bg-white border-0 py-3 d-flex justify-content-between align-items-center text-muted small">
            <div>
                <span th:if="${not #lists.isEmpty(suppliers)}"
                      th:text="'Từ 1 đến ' + ${#lists.size(suppliers)} + ' trên tổng ' + ${#lists.size(suppliers)}"></span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center gap-2">
                    <span>Hiển thị</span>
                    <select class="form-select form-select-sm shadow-none" style="width: 60px;">
                        <option value="20" selected>20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <span>Kết quả</span>
                </div>
                <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-white border text-muted" disabled><i class="bi bi-chevron-left"></i>
                    </button>
                    <button class="btn btn-sm btn-primary">1</button>
                    <button class="btn btn-sm btn-white border text-muted" disabled><i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="text-center py-3">
            <a href="#" class="text-primary text-decoration-none small">Tìm hiểu thêm về nhà cung cấp</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const selectAll = document.getElementById('selectAll');
            const bulkSelectAll = document.getElementById('bulkSelectAll');
            const rowCheckboxes = document.querySelectorAll('.row-checkbox');
            const searchBar = document.getElementById('searchFilterBar');
            const bulkBar = document.getElementById('bulkActionsBar');
            const selectedCountSpan = document.getElementById('selectedCount');

            // 1. Logic click dòng (Row) nhảy sang trang chi tiết (Sử dụng data-code)
            const rows = document.querySelectorAll('.supplier-row');
            rows.forEach(row => {
                row.addEventListener('click', function (e) {
                    // Tránh việc bấm vào checkbox mà cũng bị nhảy trang
                    if (e.target.tagName.toLowerCase() === 'input' || e.target.closest('td:first-child')) {
                        return;
                    }
                    const code = this.getAttribute('data-code');
                    if (code) {
                        window.location.href = `/ui/suppliers/${code}`;
                    }
                });
            });

            // 2. Logic Checkbox & Bulk Bar
            if (selectAll) {
                selectAll.addEventListener('change', function () {
                    rowCheckboxes.forEach(cb => cb.checked = this.checked);
                    toggleBulkBar();
                });
            }

            rowCheckboxes.forEach(cb => {
                cb.addEventListener('change', toggleBulkBar);
            });

            function toggleBulkBar() {
                const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');
                const count = checkedBoxes.length;

                if (count > 0) {
                    selectedCountSpan.innerText = count;
                    searchBar.classList.add('d-none');
                    searchBar.classList.remove('d-flex');
                    bulkBar.classList.remove('d-none');
                    bulkBar.classList.add('d-flex');
                    bulkSelectAll.checked = true;
                    selectAll.checked = (count === rowCheckboxes.length);
                } else {
                    searchBar.classList.remove('d-none');
                    searchBar.classList.add('d-flex');
                    bulkBar.classList.add('d-none');
                    bulkBar.classList.remove('d-flex');
                    selectAll.checked = false;
                }
            }

            window.unselectAll = function () {
                if (selectAll) selectAll.checked = false;
                rowCheckboxes.forEach(cb => cb.checked = false);
                toggleBulkBar();
            }
        });

        // 3. API Xoá hàng loạt
        function deleteSelectedSuppliers() {
            const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');
            const codes = Array.from(checkedBoxes).map(cb => cb.value);

            if (!confirm(`Xác nhận xoá ${codes.length} nhà cung cấp đã chọn? Hành động này có thể ảnh hưởng đến các phiếu nhập cũ.`)) return;

            fetch('/api/v1/suppliers/bulk-delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(codes)
            }).then(res => {
                if (res.ok) {
                    location.reload();
                } else {
                    res.text().then(msg => alert("Lỗi khi xoá: " + msg));
                }
            }).catch(err => alert("Lỗi kết nối Backend!"));
        }
    </script>
</div>
</body>
</html>
