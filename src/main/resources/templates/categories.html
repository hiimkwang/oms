<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<body>
<div class="oms-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold text-dark mb-0">Danh mục sản phẩm</h3>
    <a href="/ui/categories/create" class="btn btn-primary fw-bold shadow-sm px-4">
      <i class="bi bi-plus-lg me-1"></i> Thêm danh mục
    </a>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="border-bottom px-4 pt-3">
      <ul class="nav nav-underline border-0">
        <li class="nav-item">
          <a class="nav-link active fw-semibold text-primary" href="#">Tất cả</a>
        </li>
      </ul>
    </div>

    <div class="p-3 bg-light border-bottom d-flex gap-2">
      <div class="input-group flex-grow-1">
        <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control border-start-0 ps-0" placeholder="Tìm kiếm danh mục sản phẩm...">
      </div>
      <select class="form-select w-auto"><option>Loại danh mục</option></select>
      <select class="form-select w-auto"><option>Kênh bán hàng</option></select>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
        <tr>
          <th class="ps-4" style="width: 40px;"><input class="form-check-input" type="checkbox"></th>
          <th>Danh mục</th>
          <th class="text-center">Số lượng</th>
          <th>Điều kiện áp dụng</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categories}">
          <td class="ps-4"><input class="form-check-input" type="checkbox"></td>
          <td>
            <div class="d-flex align-items-center gap-3">
              <div class="bg-light border rounded d-flex align-items-center justify-content-center text-muted" style="width: 40px; height: 40px;">
                <i class="bi bi-image"></i>
              </div>
              <a href="#" class="fw-semibold text-primary text-decoration-none" th:text="${cat.dataValue}">Tên danh mục</a>
            </div>
          </td>
          <td class="text-center text-muted">0</td>
          <td class="text-muted">—</td>
        </tr>
        <tr th:if="${#lists.isEmpty(categories)}">
          <td colspan="4" class="text-center py-5 text-muted">Chưa có danh mục nào.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="card-footer bg-white border-0 py-3 d-flex justify-content-between align-items-center text-muted small">
      <span>Hiển thị kết quả</span>
      <a href="#" class="text-decoration-none">Tìm hiểu thêm về danh mục sản phẩm</a>
    </div>
  </div>
</div>
</body>
</html>
