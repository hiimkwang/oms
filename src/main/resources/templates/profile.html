<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<head>
    <title>Hồ sơ cá nhân</title>
</head>
<body>
<section>
    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body text-center">
                        <img th:src="'https://ui-avatars.com/api/?name=' + ${user.fullName} + '&background=0ea5e9&color=fff'"
                             class="rounded-circle mb-3" width="100">
                        <h5 th:text="${user.fullName}">Tên người dùng</h5>
                        <p class="text-muted"
                           th:text="${user.role != null && #strings.equals(user.role, 'ADMIN') ? 'Quản trị viên' : 'Nhân viên'}">
                            Chức vụ
                        </p>
                        <hr>
                        <div class="text-start">
                            <p><strong><i class="bi bi-person me-2"></i>Tài khoản:</strong> <span
                                    th:text="${user.username}"></span></p>
                            <p><strong><i class="bi bi-envelope me-2"></i>Email:</strong> <span
                                    th:text="${user.email != null ? user.email : 'Chưa cập nhật'}"></span></p>
                            <p><strong><i class="bi bi-geo-alt me-2"></i>Chi nhánh:</strong> <span
                                    th:text="${user.branch != null ? user.branch.name : 'Hệ thống'}"></span></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8">

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0">Cập nhật thông tin</h5>
                    </div>
                    <div class="card-body">
                        <form id="updateProfileForm" th:action="@{/profile/update}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                                <input type="text" name="fullName" class="form-control" th:value="${user.fullName}"
                                       required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" name="email" class="form-control" th:value="${user.email}"
                                           placeholder="Ví dụ: abc@gmail.com">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Số điện thoại</label>
                                    <input type="text" name="phone" class="form-control" th:value="${user.phone}"
                                           placeholder="Nhập số điện thoại">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success px-4"><i class="bi bi-save me-1"></i> Lưu thông
                                tin
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0">Đổi mật khẩu</h5>
                    </div>
                    <div class="card-body">
                        <form id="changePasswordForm" th:action="@{/profile/change-password}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu hiện tại</label>
                                <input type="password" name="oldPassword" class="form-control" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Mật khẩu mới</label>
                                    <input type="password" id="newPassword" name="newPassword" class="form-control"
                                           required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Xác nhận mật khẩu mới</label>
                                    <input type="password" id="confirmPassword" class="form-control" required>
                                    <div id="passwordError" class="text-danger small mt-1" style="display:none;">Mật
                                        khẩu xác nhận không khớp!
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-shield-lock me-1"></i>
                                Cập nhật mật khẩu
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 1. Xử lý đổi thông tin
        document.getElementById('updateProfileForm').onsubmit = function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch(this.action, {
                method: 'POST',
                body: formData
            }).then(res => res.text()).then(msg => {
                Toast.fire({
                    icon: 'success',
                    title: msg
                });
                if (msg.includes("thành công")) location.reload(); // Load lại trang để Avatar và Tên cập nhật theo
            });
        };

        // 2. Xử lý đổi mật khẩu
        document.getElementById('changePasswordForm').onsubmit = function (e) {
            e.preventDefault();
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (newPass !== confirmPass) {
                document.getElementById('passwordError').style.display = 'block';
                return;
            } else {
                document.getElementById('passwordError').style.display = 'none';
            }

            const formData = new FormData(this);
            fetch(this.action, {
                method: 'POST',
                body: formData
            }).then(res => res.text()).then(msg => {
                Toast.fire({
                    icon: 'success',
                    title: msg
                });
                if (msg.includes("thành công")) {
                    this.reset();
                }
            });
        };
    </script>
</section>
</body>
</html>
