<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">
    <style>
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid;
        }

        .status-trading {
            background-color: #e6f6ee;
            color: #008a47;
            border-color: #c2ebd5;
        }

        .status-unreceived {
            background-color: #fff4e5;
            color: #ff9800;
            border-color: #ffe5cc;
        }

        .status-completed {
            background-color: #f1f5f9;
            color: #475569;
            border-color: #cbd5e1;
        }

        .table-custom thead th {
            background-color: #f4f6f8;
            font-size: 13px;
            color: #333;
            font-weight: 600;
            padding: 12px 8px;
        }

        .nav-underline .nav-link {
            cursor: pointer;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-dark mb-0">Danh sách đơn nhập hàng</h3>
        <div class="d-flex gap-2">
            <button class="btn btn-white border fw-medium shadow-sm text-dark"><i class="bi bi-box-arrow-up me-1"></i>
                Xuất file
            </button>
            <a th:href="@{/ui/imports/create}" class="btn btn-primary fw-bold shadow-sm px-3"><i
                    class="bi bi-plus-lg me-1"></i> Tạo đơn nhập hàng</a>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="border-bottom px-4 pt-3">
            <ul class="nav nav-underline border-0" id="statusTabs">
                <li class="nav-item"><a
                        class="nav-link active fw-bold text-primary border-primary border-bottom border-2 pb-2"
                        data-status="all">Tất cả</a></li>
                <li class="nav-item"><a class="nav-link text-muted pb-2" data-status="Đang giao dịch">Đang giao dịch</a>
                </li>
                <li class="nav-item"><a class="nav-link text-muted pb-2" data-status="Hoàn thành">Hoàn thành</a></li>
            </ul>
        </div>

        <div class="p-3 bg-white border-bottom d-flex gap-2 align-items-center flex-nowrap">
            <div class="input-group flex-grow-1">
                <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-search"></i></span>
                <input type="text" id="searchInput" class="form-control border-start-0 ps-0 shadow-none"
                       placeholder="Tìm theo mã đơn nhập, tên NCC...">
            </div>
            <select id="filterImportStatus" class="form-select border shadow-none" style="width: 180px;">
                <option value="">Tất cả trạng thái nhập</option>
                <option value="Chưa nhập">Chưa nhập</option>
                <option value="Đã nhập hàng">Đã nhập hàng</option>
            </select>
            <button class="btn btn-white border px-3 text-nowrap" onclick="window.location.reload()"><i
                    class="bi bi-arrow-clockwise"></i></button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 text-center text-nowrap" id="importTable">
                <thead>
                <tr>
                    <th class="ps-4" style="width: 40px;"><input class="form-check-input" type="checkbox"></th>
                    <th class="text-start">Mã đơn nhập</th>
                    <th>Ngày tạo</th>
                    <th>Chi nhánh nhập</th>
                    <th>Trạng thái</th>
                    <th>Trạng thái nhập</th>
                    <th>Nhà cung cấp</th>
                    <th>Nhân viên tạo</th>
                    <th>Số lượng</th>
                    <th class="pe-4 text-end">Giá trị đơn</th>
                </tr>
                </thead>
                <tbody id="importTableBody">
                <tr th:each="order : ${importOrders}" class="import-row">
                    <td class="ps-4"><input class="form-check-input" type="checkbox"></td>

                    <td class="text-start col-code">
                        <a th:href="@{/ui/imports/{id}(id=${order.id})}"
                           class="text-primary text-decoration-none fw-medium" th:text="${order.code}"></a>
                    </td>

                    <td class="text-muted small"
                        th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${order.branchName}"></td>

                    <td class="col-trading-status">
                    <span class="status-badge"
                          th:classappend="${order.totalAmount > 0} ? 'status-trading' : 'status-completed'"
                          th:text="${order.totalAmount > 0 ? 'Đang giao dịch' : 'Hoàn thành'}"></span>
                    </td>

                    <td class="col-import-status">
                        <span class="status-badge status-unreceived">Chưa nhập</span>
                    </td>

                    <td class="col-supplier-name"
                        th:text="${order.supplier != null ? order.supplier.name : 'N/A'}"></td>

                    <td class="text-muted" th:text="${order.creatorName}"></td>
                    <td class="fw-medium" th:text="${order.totalQuantity}"></td>
                    <td class="pe-4 text-end fw-bold"
                        th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                </tr>

                <tr id="noDataRow" th:if="${#lists.isEmpty(importOrders)}">
                    <td colspan="10" class="text-center p-5 text-muted">Chưa có đơn nhập hàng nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const searchInput = document.getElementById('searchInput');
        const filterImportStatus = document.getElementById('filterImportStatus');
        const tabs = document.querySelectorAll('#statusTabs .nav-link');

        function applyFilters() {
            const searchTerm = searchInput.value.trim().toLowerCase();
            const importStatusTerm = filterImportStatus.value;
            const activeTab = document.querySelector('#statusTabs .nav-link.active').getAttribute('data-status');

            // Lấy tất cả hàng có class import-row
            const rows = document.querySelectorAll('.import-row');
            let visibleCount = 0;

            rows.forEach(row => {
                // Lấy text cụ thể từ các cột để tìm kiếm chính xác hơn
                const codeText = row.querySelector('.col-code').innerText.toLowerCase();
                const supplierText = row.querySelector('.col-supplier-name').innerText.toLowerCase();
                const tradingStatus = row.querySelector('.col-trading-status').innerText.trim();
                const importStatus = row.querySelector('.col-import-status').innerText.trim();

                // 1. Kiểm tra tìm kiếm (Mã đơn hoặc Tên NCC)
                const matchesSearch = codeText.includes(searchTerm) || supplierText.includes(searchTerm);

                // 2. Kiểm tra Select box Trạng thái nhập
                const matchesImportStatus = (importStatusTerm === "") || (importStatus === importStatusTerm);

                // 3. Kiểm tra Tab (Tất cả / Đang giao dịch / Hoàn thành)
                const matchesTab = (activeTab === "all") || (tradingStatus === activeTab);

                // Hiển thị nếu khớp cả 3 điều kiện
                if (matchesSearch && matchesImportStatus && matchesTab) {
                    row.style.display = "";
                    visibleCount++;
                } else {
                    row.style.display = "none";
                }
            });

            // Hiển thị dòng "Không có dữ liệu" nếu lọc xong không còn hàng nào
            const noDataRow = document.getElementById('noDataRow');
            if (noDataRow) {
                noDataRow.style.display = (visibleCount === 0 && rows.length > 0) ? "" : "none";
                if (visibleCount === 0 && rows.length > 0) {
                    noDataRow.innerHTML = `<td colspan="10" class="text-center p-5 text-muted">Không tìm thấy kết quả phù hợp</td>`;
                }
            }
        }

        // Sự kiện gõ phím tìm kiếm
        searchInput.addEventListener('input', applyFilters);

        // Sự kiện đổi Select box
        filterImportStatus.addEventListener('change', applyFilters);

        // Sự kiện click Tab
        tabs.forEach(tab => {
            tab.addEventListener('click', function (e) {
                e.preventDefault();
                // Đổi class active
                tabs.forEach(t => {
                    t.classList.remove('active', 'fw-bold', 'text-primary', 'border-primary', 'border-bottom', 'border-2');
                    t.classList.add('text-muted');
                });
                this.classList.add('active', 'fw-bold', 'text-primary', 'border-primary', 'border-bottom', 'border-2');
                this.classList.remove('text-muted');

                applyFilters();
            });
        });
    });
</script>
</body>
</html>
