<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">
    <style>
        /* Thống nhất style chuẩn hệ thống */
        .filter-btn {
            background: white;
            border: 1px solid #dce0e4;
            color: #4b566b;
            font-size: 13px;
            font-weight: 500;
            height: 36px;
            display: flex;
            align-items: center;
        }

        .filter-btn:hover {
            background-color: #f8f9fb;
            border-color: #cbd5e1;
        }

        .table-custom thead th {
            background: #f8f9fb;
            color: #4b566b;
            font-weight: 600;
            font-size: 13px;
            border-top: 1px solid #dee2e6;
            padding: 12px 10px;
        }

        .table-custom td {
            vertical-align: middle;
            font-size: 13px;
            color: #2b3445;
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .nav-tabs-custom .nav-link {
            border: none;
            color: #666;
            font-weight: 500;
            padding: 10px 20px;
            font-size: 14px;
            position: relative;
            cursor: pointer;
        }

        .nav-tabs-custom .nav-link.active {
            color: #0d6efd;
            background: transparent;
            font-weight: 600;
        }

        .nav-tabs-custom .nav-link.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0d6efd;
        }

        .search-box {
            max-width: 500px;
            border: 1px solid #dce0e4;
            border-radius: 6px;
            background: white;
            transition: all 0.2s ease-in-out;
        }

        .search-box:focus-within {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, .25);
        }

        .search-box .input-group-text {
            background: transparent;
            border: none;
            padding-right: 8px;
        }

        .search-box .form-control {
            border: none;
            background: transparent;
            box-shadow: none;
            padding-left: 0;
            font-size: 13px;
            height: 36px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid;
            display: inline-block;
        }

        .status-active {
            background-color: #e6f6ee;
            color: #008a47;
            border-color: #c2ebd5;
        }

        .status-inactive {
            background-color: #f1f5f9;
            color: #475569;
            border-color: #cbd5e1;
        }

        .cursor-pointer {
            cursor: pointer;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
        <h4 class="fw-bold mb-0 text-dark">Nhà cung cấp</h4>
        <div class="d-flex gap-2">
            <button class="btn filter-btn px-3 shadow-sm"><i class="bi bi-upload me-2"></i>Xuất file</button>
            <button class="btn filter-btn px-3 shadow-sm"><i class="bi bi-download me-2"></i>Nhập file</button>
            <a th:href="@{/ui/suppliers/create}" class="btn btn-primary fw-bold px-3 shadow-sm">
                <i class="bi bi-plus-circle me-2"></i>Thêm nhà cung cấp
            </a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-4"
         role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 8px;">

        <div class="card-header bg-white border-0 p-0">
            <ul class="nav nav-tabs nav-tabs-custom border-bottom px-3">
                <li class="nav-item"><a class="nav-link active" href="javascript:void(0)">Tất cả nhà cung cấp</a></li>
            </ul>
        </div>

        <div class="card-body p-0">
            <form id="filterForm" method="GET" th:action="@{/ui/suppliers}" class="m-0">
                <div id="defaultToolbar"
                     class="p-3 d-flex justify-content-between align-items-center gap-2 flex-wrap bg-white">
                    <div class="input-group search-box flex-grow-1">
                        <span class="input-group-text"><i class="bi bi-search fs-5 text-muted"></i></span>
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control"
                               placeholder="Tìm theo tên, mã, SĐT nhà cung cấp...">
                    </div>

                    <div class="d-flex gap-2">
                        <select name="assignee" class="form-select filter-btn w-auto">
                            <option value="">Tất cả nhân viên</option>
                            <option th:each="u : ${users}"
                                    th:value="${u.fullName}"
                                    th:text="${u.fullName}"
                                    th:selected="${assignee == u.fullName}">
                            </option>
                        </select>
                        <button type="submit" class="btn btn-primary fw-bold px-4" style="font-size: 13px;">Lọc</button>
                        <button type="button" class="btn filter-btn px-3"
                                onclick="window.location.href='/ui/suppliers'">
                            <i class="bi bi-arrow-clockwise me-2"></i>Làm mới
                        </button>
                    </div>
                </div>
            </form>

            <div id="bulkActionBar" class="d-none align-items-center justify-content-between p-2 px-3"
                 style="background-color: #f0f8ff; border-top: 1px solid #dce0e4; border-bottom: 1px solid #dce0e4;">
                <div class="d-flex align-items-center gap-3">
                    <span class="fw-medium" style="color: #0369a1; font-size: 13px;">
                        Đã chọn <span id="selectedCount" class="fw-bold fs-6">0</span> nhà cung cấp
                    </span>
                    <span class="text-muted small">|</span>
                    <a href="javascript:void(0)" class="text-decoration-none fw-medium"
                       style="color: #0369a1; font-size: 13px;" onclick="clearSelection()">Bỏ chọn</a>
                </div>
                <div class="d-flex gap-2">
                    <div class="dropdown">
                        <button class="btn btn-white border fw-medium px-3 shadow-sm bg-white"
                                style="font-size: 13px; padding-top: 6px; padding-bottom: 6px;"
                                data-bs-toggle="dropdown">
                            Thao tác khác <i class="bi bi-chevron-down ms-1 small"></i>
                        </button>
                        <ul class="dropdown-menu shadow-sm border-0">
                            <li><a class="dropdown-item" href="#">Ngừng hoạt động</a></li>
                            <li><a class="dropdown-item" href="#">Cho phép hoạt động</a></li>
                        </ul>
                    </div>
                    <button type="button" class="btn btn-white border-danger text-danger fw-medium px-4 shadow-sm"
                            style="font-size: 13px; padding-top: 6px; padding-bottom: 6px;"
                            onclick="deleteSelectedSuppliers()">
                        Xóa nhà cung cấp
                    </button>
                </div>
            </div>

            <div class="table-responsive" style="min-height: 350px;">
                <table class="table table-custom table-hover align-middle mb-0 text-nowrap" id="supplierTable">
                    <thead>
                    <tr>
                        <th class="ps-4" style="width: 40px;">
                            <input class="form-check-input" type="checkbox" id="checkAll" onchange="toggleAll(this)">
                        </th>
                        <th class="text-start">Mã NCC</th>
                        <th class="text-start">Tên nhà cung cấp</th>
                        <th class="text-center">Trạng thái</th>
                        <th>Số điện thoại</th>
                        <th class="pe-4">Email</th>
                    </tr>
                    </thead>
                    <tbody id="supplierTableBody">
                    <tr th:each="s : ${suppliers}" class="cursor-pointer supplier-row" th:data-code="${s.code}">
                        <td class="ps-4" onclick="event.stopPropagation()">
                            <input class="form-check-input item-check" type="checkbox" th:value="${s.code}"
                                   onchange="updateBulkAction()">
                        </td>
                        <td class="text-start">
                            <span class="fw-bold text-primary" th:text="${s.code}"></span>
                        </td>
                        <td class="text-start fw-bold text-dark" th:text="${s.name}"></td>
                        <td class="text-center">
                            <span class="status-badge"
                                  th:classappend="${s.status != null and s.status.name() == 'ACTIVE'} ? 'status-active' : 'status-inactive'"
                                  th:text="${s.status != null and s.status.name() == 'ACTIVE'} ? 'Đang hoạt động' : 'Ngừng hoạt động'"></span>
                        </td>
                        <td class="text-muted" th:text="${s.phone != null and s.phone != '' ? s.phone : '---'}"></td>
                        <td class="text-muted pe-4"
                            th:text="${s.email != null and s.email != '' ? s.email : '---'}"></td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(suppliers)}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-2 d-block mb-2"></i>Chưa có nhà cung cấp nào.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="p-3 d-flex justify-content-between align-items-center border-top bg-white">
                <div class="text-muted small">
                    <span th:if="${not #lists.isEmpty(suppliers)}"
                          th:text="'Hiển thị 1 - ' + ${#lists.size(suppliers)} + ' trên tổng số ' + ${#lists.size(suppliers)} + ' kết quả'"></span>
                    <span th:unless="${not #lists.isEmpty(suppliers)}">Hiển thị 0 kết quả</span>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center gap-2">
                        <span class="small text-muted">Hiển thị</span>
                        <select class="form-select form-select-sm w-auto shadow-none">
                            <option>20</option>
                        </select>
                        <span class="small text-muted">kết quả</span>
                    </div>
                    <nav th:if="${not #lists.isEmpty(suppliers)}">
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item disabled"><a class="page-link" href="#"><i
                                    class="bi bi-chevron-left"></i></a></li>
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                            <li class="page-item disabled"><a class="page-link" href="#"><i
                                    class="bi bi-chevron-right"></i></a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            // 1. Click dòng nhảy chi tiết (Trừ Checkbox)
            const rows = document.querySelectorAll('.supplier-row');
            rows.forEach(row => {
                row.addEventListener('click', function (e) {
                    if (e.target.type === 'checkbox' || e.target.classList.contains('form-check-input')) return;
                    const code = this.getAttribute('data-code');
                    if (code) window.location.href = `/ui/suppliers/${code}`;
                });
            });
        });

        // 2. Xử lý Checkbox & Bulk Actions
        function toggleAll(source) {
            const checkboxes = document.querySelectorAll('.item-check');
            checkboxes.forEach(cb => cb.checked = source.checked);
            updateBulkAction();
        }

        function clearSelection() {
            document.querySelectorAll('.item-check, #checkAll').forEach(cb => cb.checked = false);
            updateBulkAction();
        }

        function updateBulkAction() {
            const count = document.querySelectorAll('.item-check:checked').length;
            const bulkBar = document.getElementById('bulkActionBar');
            const toolbar = document.getElementById('defaultToolbar');
            const selectedCountSpan = document.getElementById('selectedCount');

            if (count > 0) {
                selectedCountSpan.innerText = count;
                toolbar.classList.add('d-none');
                bulkBar.classList.remove('d-none');
                bulkBar.classList.add('d-flex');
            } else {
                toolbar.classList.remove('d-none');
                bulkBar.classList.add('d-none');
                bulkBar.classList.remove('d-flex');
            }

            const total = document.querySelectorAll('.item-check').length;
            document.getElementById('checkAll').checked = (count > 0 && count === total);
        }

        // 3. Gọi API Xóa hàng loạt
        async function deleteSelectedSuppliers() {
            const checkedBoxes = document.querySelectorAll('.item-check:checked');

            // 1. Nhắc nhở nếu người dùng chưa chọn nhà cung cấp nào
            if (checkedBoxes.length === 0) {
                Toast.fire({
                    icon: 'warning',
                    title: 'Vui lòng chọn ít nhất 1 nhà cung cấp để xóa!'
                });
                return;
            }

            const codes = Array.from(checkedBoxes).map(cb => cb.value);

            // 2. Bảng xác nhận xóa bằng SweetAlert2
            const confirmation = await Swal.fire({
                title: 'Xác nhận xóa hàng loạt',
                text: `Bạn có chắc chắn muốn xóa vĩnh viễn ${codes.length} nhà cung cấp đã chọn không? Thao tác này không thể hoàn tác.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',   // Đỏ cảnh báo nguy hiểm
                cancelButtonColor: '#3085d6', // Xanh an toàn
                confirmButtonText: 'Xác nhận xóa',
                cancelButtonText: 'Hủy bỏ'
            });

            // Dừng lại nếu người dùng chọn Hủy
            if (!confirmation.isConfirmed) return;

            try {
                const res = await fetch('/api/v1/suppliers/bulk-delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(codes)
                });

                if (res.ok) {
                    // 3. Đợi Toast hiện xong thông báo rồi mới reload trang (Dùng await)
                    await Toast.fire({
                        icon: 'success',
                        title: `Đã xóa thành công ${codes.length} nhà cung cấp!`
                    });
                    window.location.reload();
                } else {
                    const msg = await res.text();
                    Toast.fire({
                        icon: 'error',
                        title: 'Lỗi khi xóa: ' + (msg || 'Vui lòng thử lại sau.')
                    });
                }
            } catch (err) {
                Toast.fire({
                    icon: 'error',
                    title: 'Lỗi kết nối đến máy chủ!'
                });
            }
        }
    </script>
</div>
</body>
</html>
