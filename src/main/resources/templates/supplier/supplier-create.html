<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">
    <style>
        .card-title-custom {
            font-size: 15px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        .form-label-custom {
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .form-control-custom {
            font-size: 14px;
            border-color: #dce0e4;
            box-shadow: none;
            height: 38px;
        }

        .form-control-custom:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.1);
        }

        .asterisk {
            color: #dc3545;
            margin-left: 2px;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/ui/suppliers}" class="btn btn-white border shadow-sm px-2"><i
                    class="bi bi-arrow-left"></i></a>
            <h3 class="fw-bold text-dark mb-0">Thêm mới nhà cung cấp</h3>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/ui/suppliers}" class="btn btn-white border fw-medium shadow-sm text-dark px-4">Hủy</a>
            <button type="button" class="btn btn-primary fw-bold shadow-sm px-4" onclick="submitSupplier()">Thêm mới
            </button>
        </div>
    </div>

    <form id="supplierForm">
        <div class="row g-4">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <div class="card-title-custom">Thông tin chung</div>
                        <div class="mb-4">
                            <label class="form-label-custom">Tên nhà cung cấp <span class="asterisk">*</span></label>
                            <input type="text" id="name" class="form-control form-control-custom"
                                   placeholder="Nhập tên nhà cung cấp" required>
                        </div>
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label-custom">Mã nhà cung cấp</label>
                                <input type="text" id="code" class="form-control form-control-custom"
                                       placeholder="Nhập mã nhà cung cấp (Ví dụ: NCC001)">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Số điện thoại</label>
                                <div class="input-group">
                                    <input type="text" id="phone" class="form-control form-control-custom border-end-0"
                                           placeholder="Nhập số điện thoại">
                                    <span class="input-group-text bg-white border-start-0"
                                          style="border-color: #dce0e4;"><i
                                            class="bi bi-telephone text-muted"></i></span>
                                </div>
                            </div>
                        </div>
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label-custom">Email</label>
                                <input type="email" id="email" class="form-control form-control-custom"
                                       placeholder="Nhập email">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Mã số thuế</label>
                                <input type="text" id="taxCode" class="form-control form-control-custom"
                                       placeholder="Nhập mã số thuế">
                            </div>
                        </div>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label-custom">Website</label>
                                <input type="text" id="website" class="form-control form-control-custom"
                                       placeholder="https://">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Số fax</label>
                                <input type="text" id="fax" class="form-control form-control-custom"
                                       placeholder="Nhập số fax">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="card-title-custom">Địa chỉ</div>
                        <div class="mb-4">
                            <label class="form-label-custom">Quốc gia</label>
                            <select id="country" class="form-select form-control-custom">
                                <option value="Việt Nam" selected>Việt Nam</option>
                                <option value="Trung Quốc">Trung Quốc</option>
                                <option value="Mỹ">Mỹ</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>

                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label-custom">Tỉnh/Thành phố</label>
                                <input type="text" id="province" class="form-control form-control-custom"
                                       placeholder="VD: Hà Nội">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Phường/Xã</label>
                                <input type="text" id="ward" class="form-control form-control-custom"
                                       placeholder="VD: Dịch Vọng">
                            </div>
                        </div>

                        <div class="mb-2">
                            <label class="form-label-custom">Địa chỉ chi tiết</label>
                            <input type="text" id="addressDetail" class="form-control form-control-custom"
                                   placeholder="Số nhà, tên đường, tòa nhà...">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <div class="card-title-custom">Nhân viên phụ trách</div>
                        <label class="form-label-custom">Người chịu trách nhiệm</label>
                        <select id="assignee" class="form-select form-control-custom">
                            <option th:each="u : ${users}"
                                    th:value="${u.fullName}"
                                    th:text="${u.fullName}"
                                    th:selected="${currentUser != null && u.id == currentUser.id}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="card-title-custom mb-0">Tag</div>
                            <a href="javascript:void(0)" class="text-primary small text-decoration-none fw-medium">Quản
                                lý tag</a>
                        </div>
                        <input type="text" id="tags" class="form-control form-control-custom"
                               placeholder="Nhập tag và ấn enter">
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end mt-4 border-top pt-4">
            <button type="button" class="btn btn-primary fw-bold shadow-sm px-5 py-2" onclick="submitSupplier()">Lưu nhà
                cung cấp
            </button>
        </div>
    </form>

    <script th:inline="javascript">
        async function submitSupplier() {
            const name = document.getElementById('name').value.trim();
            if (!name) {
                alert('Vui lòng nhập tên nhà cung cấp!');
                document.getElementById('name').focus();
                return;
            }

            const payload = {
                name: name,
                code: document.getElementById('code').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                taxCode: document.getElementById('taxCode').value.trim(),
                website: document.getElementById('website').value.trim(),
                fax: document.getElementById('fax').value.trim(),
                country: document.getElementById('country').value,
                province: document.getElementById('province').value.trim(),
                ward: document.getElementById('ward').value.trim(),
                addressDetail: document.getElementById('addressDetail').value.trim(),
                assignee: document.getElementById('assignee').value,
                tags: document.getElementById('tags').value.trim()
            };

            try {
                const response = await fetch('/api/v1/suppliers', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('Thêm mới nhà cung cấp thành công!');
                    window.location.href = '/ui/suppliers';
                } else {
                    const errorData = await response.json();
                    alert('Lỗi: ' + (errorData.message || 'Không thể lưu dữ liệu.'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Lỗi kết nối đến máy chủ!');
            }
        }
    </script>
</div>
</body>
</html>
