<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::div.setting-wrapper})}">
<body>
<div class="setting-wrapper">
    <style>
        .card-title-custom {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
        }

        .form-label-custom {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-control-custom {
            font-size: 13px;
            border-color: #cbd5e1;
            box-shadow: none;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .form-control-custom:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, .1);
        }

        .table-custom th {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            background-color: #f8fafc;
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        .table-custom td {
            font-size: 13px;
            color: #1e293b;
            padding: 12px 16px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
        }
    </style>

    <div class="row g-4">
        <div th:replace="~{settings/settings-sidebar :: sidebar}"></div>

        <div class="col-md-9">
            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
                    <h5 class="card-title-custom mb-0"><i class="bi bi-building text-primary me-2"></i>Quản lý chi nhánh
                    </h5>
                    <button class="btn btn-primary btn-sm fw-bold px-3 shadow-sm" data-bs-toggle="modal"
                            data-bs-target="#branchModal" onclick="resetBranchForm()">
                        <i class="bi bi-plus-lg me-1"></i> Thêm chi nhánh
                    </button>
                </div>

                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-custom mb-0">
                            <thead>
                            <tr>
                                <th style="width: 25%">Tên chi nhánh</th>
                                <th style="width: 35%">Địa chỉ</th>
                                <th style="width: 15%">Điện thoại</th>
                                <th style="width: 15%">Trạng thái</th>
                                <th style="width: 10%" class="text-end">Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(branches)}">
                                <td colspan="5" class="text-center text-muted py-4">Chưa có chi nhánh nào được tạo.</td>
                            </tr>

                            <tr th:each="b : ${branches}">
                                <td class="fw-bold text-dark" th:text="${b.name}"></td>
                                <td class="text-muted"
                                    th:text="${b.address != null && b.address != '' ? b.address : '---'}"></td>
                                <td th:text="${b.phone != null && b.phone != '' ? b.phone : '---'}"></td>
                                <td>
                                    <span th:if="${b.active}"
                                          class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-2 py-1">Đang hoạt động</span>
                                    <span th:unless="${b.active}"
                                          class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 px-2 py-1">Ngừng hoạt động</span>
                                </td>
                                <td class="text-end">
                                    <button class="btn btn-light btn-sm text-primary p-1 px-2"
                                            th:data-id="${b.id}"
                                            th:data-name="${b.name}"
                                            th:data-address="${b.address != null ? b.address : ''}"
                                            th:data-phone="${b.phone != null ? b.phone : ''}"
                                            th:data-active="${b.active}"
                                            onclick="editBranch(this)">
                                        <i class="bi bi-pencil-square"></i>
                                    </button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="branchModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light border-bottom-0 py-3">
                    <h6 class="modal-title fw-bold" id="branchModalTitle">Thêm chi nhánh mới</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="branchForm">
                        <input type="hidden" id="branchId" name="id">

                        <div class="mb-3">
                            <label class="form-label-custom">Tên chi nhánh <span class="text-danger">*</span></label>
                            <input type="text" id="branchName" name="name" class="form-control form-control-custom"
                                   placeholder="VD: Cửa hàng Hai Bà Trưng" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label-custom">Số điện thoại</label>
                            <input type="text" id="branchPhone" name="phone" class="form-control form-control-custom"
                                   placeholder="Nhập số điện thoại chi nhánh">
                        </div>

                        <div class="mb-3">
                            <label class="form-label-custom">Địa chỉ chi tiết</label>
                            <textarea id="branchAddress" name="address" class="form-control form-control-custom"
                                      rows="2" placeholder="Số nhà, đường, quận/huyện..."></textarea>
                        </div>

                        <div class="form-check form-switch mt-4" id="statusDiv" style="display: none;">
                            <input class="form-check-input" type="checkbox" id="branchActive" name="active" checked>
                            <label class="form-check-label small fw-bold text-dark" for="branchActive">Chi nhánh đang
                                hoạt động</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0 pb-3 px-4">
                    <button type="button" class="btn btn-white border px-4" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary fw-bold px-4" onclick="saveBranch(this)">Lưu chi
                        nhánh
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function resetBranchForm() {
            document.getElementById('branchForm').reset();
            document.getElementById('branchId').value = '';
            document.getElementById('branchModalTitle').innerText = 'Thêm chi nhánh mới';
            document.getElementById('statusDiv').style.display = 'none'; // Ẩn nút trạng thái khi thêm mới
            document.getElementById('branchActive').checked = true;
        }

        function editBranch(btn) {
            // Đọc dữ liệu từ các thuộc tính data-* của nút bấm
            const id = btn.getAttribute('data-id');
            const name = btn.getAttribute('data-name');
            const address = btn.getAttribute('data-address');
            const phone = btn.getAttribute('data-phone');
            const active = btn.getAttribute('data-active') === 'true'; // Chuyển chuỗi 'true' thành boolean

            // Đổ dữ liệu lên form
            document.getElementById('branchId').value = id;
            document.getElementById('branchName').value = name;
            document.getElementById('branchAddress').value = address;
            document.getElementById('branchPhone').value = phone;
            document.getElementById('branchActive').checked = active;

            // Đổi tiêu đề và hiện trạng thái
            document.getElementById('branchModalTitle').innerText = 'Cập nhật chi nhánh';
            document.getElementById('statusDiv').style.display = 'block';

            // Khởi tạo modal động ngay tại thời điểm bấm nút để không bị lỗi chưa load Bootstrap
            const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('branchModal'));
            modal.show();
        }

        async function saveBranch(btnElement) {
            const form = document.getElementById('branchForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const id = document.getElementById('branchId').value;
            const payload = {
                name: document.getElementById('branchName').value,
                phone: document.getElementById('branchPhone').value,
                address: document.getElementById('branchAddress').value,
                active: document.getElementById('branchActive').checked
            };

            const originalBtnHtml = btnElement.innerHTML;
            btnElement.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Đang lưu...';
            btnElement.disabled = true;

            const url = id ? `/api/v1/settings/branches/${id}` : '/api/v1/settings/branches';
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    // Tắt modal an toàn và load lại trang
                    const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('branchModal'));
                    modal.hide();
                    window.location.reload();
                } else {
                    Toast.fire({
                        icon: 'error',
                        title: 'Có lỗi xảy ra khi lưu chi nhánh!'
                    });
                    btnElement.innerHTML = originalBtnHtml;
                    btnElement.disabled = false;
                }
            } catch (error) {
                console.error("Lỗi:", error);
                Toast.fire({
                    icon: 'error',
                    title: 'Lỗi xử lý giao diện hoặc mất kết nối!'
                });
                btnElement.innerHTML = originalBtnHtml;
                btnElement.disabled = false;
            }
        }
    </script>
</div>
</body>
</html>
