<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<body>
<div class="oms-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-dark mb-0">Kho hàng hóa</h3>
            <p class="text-muted small mb-0">Quản lý danh sách sản phẩm và tồn kho của MECHKEY</p>
        </div>
        <button class="btn btn-primary fw-bold shadow-sm px-4" data-bs-toggle="modal" data-bs-target="#addProductModal">
            <i class="bi bi-plus-lg me-1"></i> Thêm sản phẩm
        </button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-3">Mã SKU</th>
                    <th>Tên sản phẩm</th>
                    <th>Hãng / Danh mục</th>
                    <th class="text-end">Giá bán đề xuất</th>
                    <th class="text-center">Tồn kho</th>
                    <th class="text-center pe-3">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td class="ps-3 fw-bold text-primary" th:text="${p.sku}"></td>
                    <td>
                        <div class="fw-semibold" th:text="${p.name}"></div>
                        <small class="text-muted" th:text="${p.unit}"></small>
                    </td>
                    <td>
                        <span class="badge bg-secondary me-1" th:text="${p.brand}"></span>
                        <span class="badge bg-light text-dark border" th:text="${p.category}"></span>
                    </td>
                    <td class="text-end fw-bold text-dark"
                        th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                    <td class="text-center">
                        <span class="badge rounded-pill"
                              th:classappend="${p.stockQuantity > 0 ? 'bg-success' : 'bg-danger'}"
                              th:text="${p.stockQuantity}"></span>
                    </td>
                    <td class="text-center pe-3">
                        <button class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                        Chưa có sản phẩm nào trong kho.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="addProductModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold">Thêm hàng hóa mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Mã SP (SKU) <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="sku" placeholder="VD: KB-AULA-F75" required>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-bold small">Tên sản phẩm <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name"
                                       placeholder="VD: Bàn phím Aula F75 Blue" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Danh mục</label>
                                <div class="input-group">
                                    <select class="form-select" id="category">
                                        <option th:each="cat : ${categories}" th:value="${cat}"
                                                th:text="${cat}"></option>
                                    </select>
                                    <button class="btn btn-outline-secondary" type="button"
                                            onclick="openQuickAddModal('CATEGORY', 'Thêm danh mục')"><i
                                            class="bi bi-plus-lg"></i></button>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Hãng sản xuất</label>
                                <div class="input-group">
                                    <select class="form-select" id="brand">
                                        <option th:each="b : ${brands}" th:value="${b}" th:text="${b}"></option>
                                    </select>
                                    <button class="btn btn-outline-secondary" type="button"
                                            onclick="openQuickAddModal('BRAND', 'Thêm hãng')"><i
                                            class="bi bi-plus-lg"></i></button>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Đơn vị tính</label>
                                <select class="form-select" id="unit">
                                    <option th:each="u : ${units}" th:value="${u}" th:text="${u}"></option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Giá bán đề xuất</label>
                                <input type="number" class="form-control fw-bold text-primary" id="price" value="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Tồn kho ban đầu</label>
                                <input type="number" class="form-control" id="stockQuantity" value="0">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary fw-bold" onclick="saveProduct()">Lưu sản phẩm</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="quickAddModal" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h6 class="modal-title fw-bold" id="quickAddTitle">Thêm mới</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="quickAddType">
                    <input type="text" class="form-control" id="quickAddValue" placeholder="Nhập tên...">
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-sm btn-primary w-100 fw-bold" onclick="saveQuickAdd()">Xác
                        nhận
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<script th:inline="javascript">
    // Hàm lưu sản phẩm chính
    function saveProduct() {
        const payload = {
            sku: document.getElementById("sku").value,
            name: document.getElementById("name").value,
            category: document.getElementById("category").value,
            brand: document.getElementById("brand").value,
            unit: document.getElementById("unit").value,
            price: parseFloat(document.getElementById("price").value) || 0,
            stockQuantity: parseInt(document.getElementById("stockQuantity").value) || 0
        };

        fetch('/api/v1/products', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).then(res => {
            if (res.ok) {
                alert("Thành công!");
                location.reload();
            } else alert("Lỗi khi lưu!");
        });
    }

    // Logic thêm nhanh (Quick Add)
    let qaModal = null;

    function openQuickAddModal(type, title) {
        if (!qaModal) qaModal = new bootstrap.Modal(document.getElementById('quickAddModal'));
        document.getElementById("quickAddType").value = type;
        document.getElementById("quickAddTitle").innerText = title;
        document.getElementById("quickAddValue").value = "";
        qaModal.show();
    }

    function saveQuickAdd() {
        const type = document.getElementById("quickAddType").value;
        const val = document.getElementById("quickAddValue").value;

        fetch('/api/v1/settings/master-data/quick-add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({type: type, value: val})
        }).then(res => res.json()).then(data => {
            const selectId = type === 'CATEGORY' ? 'category' : 'brand';
            const select = document.getElementById(selectId);
            const opt = document.createElement("option");
            opt.value = data.dataValue;
            opt.text = data.dataValue;
            select.add(opt);
            select.value = data.dataValue;
            qaModal.hide();
        });
    }
</script>
</body>
</html>
