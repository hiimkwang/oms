<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">
    <style>
        .stat-card {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            padding: 20px;
        }

        .stat-label {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
        }

        .math-operator {
            font-size: 20px;
            color: #94a3b8;
            font-weight: 300;
        }

        .filter-btn {
            background: white;
            border: 1px solid #dce0e4;
            color: #4b566b;
            font-size: 13px;
            font-weight: 500;
            height: 36px;
            display: flex;
            align-items: center;
            border-radius: 4px;
        }

        .filter-btn:hover {
            background-color: #f8f9fb;
            border-color: #cbd5e1;
        }

        .table-custom thead th {
            background: #f8f9fb;
            color: #4b566b;
            font-weight: 600;
            font-size: 13px;
            border-top: 1px solid #dee2e6;
            border-bottom: 1px solid #dee2e6;
            padding: 12px 10px;
            white-space: nowrap;
        }

        .table-custom td {
            vertical-align: middle;
            font-size: 13px;
            color: #2b3445;
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .nav-tabs-custom .nav-link {
            border: none;
            color: #64748b;
            font-weight: 500;
            padding: 10px 20px;
            font-size: 14px;
            position: relative;
            cursor: pointer;
            border-radius: 0;
        }

        .nav-tabs-custom .nav-link.active {
            color: #0d6efd;
            background: transparent;
            font-weight: 600;
        }

        .nav-tabs-custom .nav-link.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0d6efd;
        }

        .nav-tabs-custom .nav-link:hover:not(.active) {
            color: #0f172a;
        }

        .search-box {
            max-width: 450px;
            border: 1px solid #dce0e4;
            border-radius: 6px;
            background: white;
            transition: all 0.2s ease-in-out;
        }

        .search-box:focus-within {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, .25);
        }

        .search-box .input-group-text {
            background: transparent;
            border: none;
            padding-right: 8px;
        }

        .search-box .form-control {
            border: none;
            background: transparent;
            box-shadow: none;
            padding-left: 0;
            font-size: 13px;
            height: 34px;
        }

        .text-receipt {
            color: #10b981 !important;
            font-weight: 600;
        }

        .text-payment {
            color: #ef4444 !important;
            font-weight: 600;
        }

        .hover-primary:hover {
            color: #0d6efd !important;
            text-decoration: underline !important;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
        <h4 class="fw-bold mb-0 text-dark">Sổ quỹ</h4>
        <div class="d-flex gap-2">
            <button class="btn filter-btn px-3 shadow-sm"><i class="bi bi-upload me-2"></i>Xuất file</button>
            <div class="dropdown">
                <button class="btn btn-primary fw-bold px-3 shadow-sm dropdown-toggle" type="button"
                        data-bs-toggle="dropdown">
                    <i class="bi bi-plus-circle me-2"></i>Tạo phiếu
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                    <li><a class="dropdown-item py-2" th:href="@{/ui/cashbook/receipt/create}"><i
                            class="bi bi-arrow-down-left-circle text-success me-2"></i>Tạo phiếu thu</a></li>
                    <li><a class="dropdown-item py-2" th:href="@{/ui/cashbook/payment/create}"><i
                            class="bi bi-arrow-up-right-circle text-danger me-2"></i>Tạo phiếu chi</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="stat-card mb-4">
        <div class="row align-items-center text-center">
            <div class="col">
                <div class="stat-label">Quỹ đầu kỳ</div>
                <div class="stat-value"
                     th:text="${#numbers.formatDecimal(summary.openingBalance, 0, 'COMMA', 0, 'POINT') + '₫'}">0₫
                </div>
            </div>
            <div class="col-auto math-operator">+</div>
            <div class="col">
                <div class="stat-label">Tổng thu</div>
                <div class="stat-value text-success"
                     th:text="${#numbers.formatDecimal(summary.totalIn, 0, 'COMMA', 0, 'POINT') + '₫'}">0₫
                </div>
            </div>
            <div class="col-auto math-operator">-</div>
            <div class="col">
                <div class="stat-label">Tổng chi</div>
                <div class="stat-value text-danger"
                     th:text="${#numbers.formatDecimal(summary.totalOut, 0, 'COMMA', 0, 'POINT') + '₫'}">0₫
                </div>
            </div>
            <div class="col-auto math-operator">=</div>
            <div class="col">
                <div class="stat-label">Tồn quỹ</div>
                <div class="stat-value text-primary"
                     th:text="${#numbers.formatDecimal(summary.closingBalance, 0, 'COMMA', 0, 'POINT') + '₫'}">0₫
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 8px;">

        <div class="card-header bg-white border-0 p-0">
            <ul class="nav nav-tabs nav-tabs-custom border-bottom px-3" id="cashbookTabs">
                <li class="nav-item"><a class="nav-link" th:classappend="${param.type == null} ? 'active'"
                                        onclick="applyFilters('ALL')">Tất cả giao dịch</a></li>
                <li class="nav-item"><a class="nav-link"
                                        th:classappend="${param.type != null and param.type[0] == 'RECEIPT'} ? 'active'"
                                        onclick="applyFilters('RECEIPT')">Phiếu thu</a></li>
                <li class="nav-item"><a class="nav-link"
                                        th:classappend="${param.type != null and param.type[0] == 'PAYMENT'} ? 'active'"
                                        onclick="applyFilters('PAYMENT')">Phiếu chi</a></li>
            </ul>
        </div>

        <div class="card-body p-0">
            <div id="defaultToolbar"
                 class="p-3 d-flex justify-content-between align-items-center gap-2 flex-wrap bg-white">
                <div class="input-group search-box flex-grow-1">
                    <span class="input-group-text"><i class="bi bi-search fs-5 text-muted"></i></span>
                    <input type="text" id="txSearchInput" class="form-control"
                           placeholder="Tìm theo mã phiếu, tên đối tượng, lý do..." th:value="${param.keyword}"
                           onkeypress="handleEnter(event)">
                </div>

                <div class="d-flex gap-2 align-items-center">
                    <select class="form-select filter-btn w-auto fw-bold text-dark" id="datePreset"
                            onchange="handleDateChange()">
                        <option value="today" th:selected="${param.preset == null or param.preset[0] == 'today'}">Hôm
                            nay
                        </option>
                        <option value="yesterday"
                                th:selected="${param.preset != null and param.preset[0] == 'yesterday'}">Hôm qua
                        </option>
                        <option value="thisMonth"
                                th:selected="${param.preset != null and param.preset[0] == 'thisMonth'}">Tháng này
                        </option>
                        <option value="lastMonth"
                                th:selected="${param.preset != null and param.preset[0] == 'lastMonth'}">Tháng trước
                        </option>
                        <option value="thisYear"
                                th:selected="${param.preset != null and param.preset[0] == 'thisYear'}">Năm nay
                        </option>
                        <option value="custom" th:selected="${param.preset != null and param.preset[0] == 'custom'}">Tùy
                            chọn...
                        </option>
                    </select>

                    <div id="customDateContainer" class="gap-2 align-items-center"
                         th:classappend="${param.preset != null and param.preset[0] == 'custom'} ? 'd-flex' : 'd-none'">
                        <input type="date" class="form-control filter-btn w-auto text-muted" id="startDate"
                               th:value="${param.start != null ? #strings.substring(param.start[0],0,10) : ''}"
                               onchange="applyFilters()">
                        <span class="text-muted">-</span>
                        <input type="date" class="form-control filter-btn w-auto text-muted" id="endDate"
                               th:value="${param.end != null ? #strings.substring(param.end[0],0,10) : ''}"
                               onchange="applyFilters()">
                    </div>

                    <select class="form-select filter-btn w-auto" id="branchFilter" onchange="applyFilters()">
                        <option value="ALL">Tất cả chi nhánh</option>
                        <option th:each="b : ${branches}" th:value="${b.id}" th:text="${b.name}"
                                th:selected="${param.branchId != null and param.branchId[0] == b.id.toString()}"></option>
                    </select>

                    <button class="btn filter-btn" onclick="clearAllFilters()" title="Xóa bộ lọc">
                        <i class="bi bi-arrow-counterclockwise"></i>
                    </button>
                </div>
            </div>

            <div id="bulkActionBar" class="d-none align-items-center justify-content-between p-2 px-3"
                 style="background-color: #f0f8ff; border-top: 1px solid #dce0e4; border-bottom: 1px solid #dce0e4; height: 60px;">
                <div class="d-flex align-items-center gap-3">
                    <span class="fw-medium" style="color: #0369a1; font-size: 13px;">Đã chọn <span id="selectedCount"
                                                                                                   class="fw-bold fs-6">0</span> phiếu</span>
                    <span class="text-muted small">|</span>
                    <a href="javascript:void(0)" class="text-decoration-none fw-medium"
                       style="color: #0369a1; font-size: 13px;" onclick="clearSelection()">Bỏ chọn</a>
                </div>
                <div>
                    <button class="btn btn-white border-danger text-danger fw-medium px-4 shadow-sm"
                            style="font-size: 13px; padding-top: 6px; padding-bottom: 6px;"
                            onclick="deleteSelectedTransactions()">
                        <i class="bi bi-trash3 me-1"></i>Xóa giao dịch
                    </button>
                </div>
            </div>

            <div class="table-responsive" style="min-height: 400px;">
                <table class="table table-custom table-hover mb-0">
                    <thead>
                    <tr>
                        <th class="ps-4" style="width: 40px;"><input type="checkbox" class="form-check-input"
                                                                     id="checkAll" onchange="toggleAll(this)"></th>
                        <th>Mã phiếu</th>
                        <th>Ngày ghi nhận</th>
                        <th>Tên đối tượng</th>
                        <th>Lý do</th>
                        <th>Tham chiếu</th>
                        <th class="text-end pe-4">Số tiền</th>
                    </tr>
                    </thead>
                    <tbody>

                    <tr th:each="t : ${transactions}">
                        <td class="ps-4"><input type="checkbox" class="form-check-input tx-checkbox" th:value="${t.id}"
                                                onchange="checkSelection()"></td>
                        <td><a th:href="@{/ui/cashbook/detail/{id}(id=${t.id})}"
                               class="text-primary fw-bold text-decoration-none hover-primary" th:text="${t.code}"></a>
                        </td>

                        <td class="text-muted"
                            th:text="${#temporals.format(t.transactionDate, 'dd/MM/yyyy HH:mm')}"></td>

                        <td class="fw-medium text-dark" th:text="${t.targetName ?: 'Khách vãng lai'}"></td>
                        <td th:text="${t.reason}"></td>
                        <td class="text-muted small" th:text="${t.referenceCode ?: '---'}"></td>

                        <td class="text-end fw-bold pe-4"
                            th:classappend="${t.type.name() == 'RECEIPT' ? 'text-receipt' : 'text-payment'}"
                            th:text="${(t.type.name() == 'RECEIPT' ? '' : '-') + #numbers.formatDecimal(t.amount, 0, 'COMMA', 0, 'POINT') + '₫'}">
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(transactions)}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-2 d-block mb-3 opacity-25"></i>
                            Không tìm thấy giao dịch nào phù hợp.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="p-3 d-flex justify-content-between align-items-center border-top bg-white">
                <div class="text-muted small" th:text="'Hiển thị ' + ${transactions.size()} + ' bản ghi'"></div>
                <div class="d-flex align-items-center gap-3">
                    <nav th:if="${transactions.size() > 0}">
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item disabled"><a class="page-link" href="#"><i
                                    class="bi bi-chevron-left"></i></a></li>
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                            <li class="page-item disabled"><a class="page-link" href="#"><i
                                    class="bi bi-chevron-right"></i></a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">

        function handleEnter(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                applyFilters();
            }
        }

        // Hiện ô Tùy chọn ngày nếu chọn 'custom'
        function handleDateChange() {
            const preset = document.getElementById('datePreset').value;
            const customContainer = document.getElementById('customDateContainer');

            if (preset === 'custom') {
                customContainer.classList.replace('d-none', 'd-flex');
            } else {
                customContainer.classList.replace('d-flex', 'd-none');
                applyFilters(); // Submit luôn nếu chọn Hôm nay, Hôm qua...
            }
        }

        // Gom tất cả params và Redirect
        function applyFilters(overrideTabType) {
            const keyword = document.getElementById('txSearchInput').value.trim();
            const branchId = document.getElementById('branchFilter').value;
            const preset = document.getElementById('datePreset').value;

            const params = new URLSearchParams(window.location.search);

            // Xử lý Search & Chi nhánh
            if (keyword) params.set('keyword', keyword); else params.delete('keyword');
            if (branchId && branchId !== 'ALL') params.set('branchId', branchId); else params.delete('branchId');

            // Xử lý Tabs
            if (overrideTabType !== undefined) {
                if (overrideTabType === 'ALL') params.delete('type');
                else params.set('type', overrideTabType);
            }

            // Xử lý Ngày
            if (preset && preset !== 'today') params.set('preset', preset); else params.delete('preset');

            if (preset === 'custom') {
                const start = document.getElementById('startDate').value;
                const end = document.getElementById('endDate').value;
                if (start) params.set('start', start + 'T00:00:00'); else params.delete('start');
                if (end) params.set('end', end + 'T23:59:59'); else params.delete('end');
            } else {
                params.delete('start');
                params.delete('end');
            }

            // Gọi thẳng xuống Backend
            window.location.href = window.location.pathname + '?' + params.toString();
        }

        // Xóa bộ lọc
        function clearAllFilters() {
            window.location.href = window.location.pathname; // Về trang trắng mặc định
        }

        // --- Logic Bulk Action ---
        function toggleAll(source) {
            document.querySelectorAll('.tx-checkbox').forEach(cb => cb.checked = source.checked);
            checkSelection();
        }

        function clearSelection() {
            document.getElementById('checkAll').checked = false;
            document.querySelectorAll('.tx-checkbox').forEach(cb => cb.checked = false);
            checkSelection();
        }

        function checkSelection() {
            const checkedBoxes = document.querySelectorAll('.tx-checkbox:checked');
            const bulkBar = document.getElementById('bulkActionBar');
            const defaultToolbar = document.getElementById('defaultToolbar');

            document.getElementById('checkAll').checked = (checkedBoxes.length > 0 && checkedBoxes.length === document.querySelectorAll('.tx-checkbox').length);

            if (checkedBoxes.length > 0) {
                document.getElementById('selectedCount').innerText = checkedBoxes.length;
                defaultToolbar.classList.add('d-none');
                defaultToolbar.classList.remove('d-flex');
                bulkBar.classList.remove('d-none');
                bulkBar.classList.add('d-flex');
            } else {
                bulkBar.classList.add('d-none');
                bulkBar.classList.remove('d-flex');
                defaultToolbar.classList.add('d-flex');
                defaultToolbar.classList.remove('d-none');
            }
        }

        async function deleteSelectedTransactions() {
            const checkboxes = document.querySelectorAll('.tx-checkbox:checked');

            // 1. Nhắc nhở nếu chưa chọn giao dịch nào
            if (checkboxes.length === 0) {
                Toast.fire({
                    icon: 'warning',
                    title: 'Vui lòng chọn ít nhất 1 giao dịch để xóa!'
                });
                return;
            }

            const ids = Array.from(checkboxes).map(cb => cb.value);

            // 2. Hiện bảng xác nhận chuyên nghiệp
            const confirmation = await Swal.fire({
                title: 'Xác nhận xóa hàng loạt',
                text: `Cảnh báo: Bạn có chắc chắn muốn xóa vĩnh viễn ${ids.length} giao dịch này không? Hành động này sẽ làm thay đổi số dư tồn quỹ!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',   // Màu đỏ cho hành động nguy hiểm
                cancelButtonColor: '#3085d6', // Màu xanh cho nút hủy
                confirmButtonText: 'Xác nhận xóa',
                cancelButtonText: 'Hủy bỏ'
            });

            if (!confirmation.isConfirmed) return;

            try {
                const res = await fetch('/api/v1/cashbook/bulk', {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(ids)
                });

                if (res.ok) {
                    // 3. Đợi báo thành công xong mới reload trang
                    await Toast.fire({
                        icon: 'success',
                        title: `Đã xóa thành công ${ids.length} giao dịch!`
                    });
                    window.location.reload();
                } else {
                    const errText = await res.text();
                    Toast.fire({
                        icon: 'error',
                        title: 'Lỗi: ' + (errText || 'Không thể xóa các giao dịch đã chọn!')
                    });
                }
            } catch (e) {
                Toast.fire({
                    icon: 'error',
                    title: 'Lỗi kết nối đến máy chủ!'
                });
            }
        }
    </script>
</div>
</body>
</html>
