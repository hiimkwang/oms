<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::div.oms-container})}">
<head></head>
<body>
<div class="oms-container pb-5">
    <style>
        .filter-btn {
            background: white;
            border: 1px solid #dce0e4;
            color: #4b566b;
            font-size: 13px;
            font-weight: 500;
            height: 36px;
            display: flex;
            align-items: center;
        }

        .filter-btn:hover {
            background-color: #f8f9fb;
            border-color: #cbd5e1;
        }

        .table-custom thead th {
            background: #f8f9fb;
            color: #4b566b;
            font-weight: 600;
            font-size: 13px;
            border-top: 1px solid #dee2e6;
            padding: 12px 10px;
        }

        .table-custom td {
            vertical-align: middle;
            font-size: 13px;
            color: #2b3445;
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .nav-tabs-custom .nav-link {
            border: none;
            color: #666;
            font-weight: 500;
            padding: 10px 20px;
            font-size: 14px;
            position: relative;
            cursor: pointer;
        }

        .nav-tabs-custom .nav-link.active {
            color: #3b82f6;
            background: transparent;
            font-weight: 600;
        }

        .nav-tabs-custom .nav-link.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #3b82f6;
        }

        .search-box {
            max-width: 350px;
            border: 1px solid #dce0e4;
            border-radius: 6px;
            background: white;
            transition: all 0.2s ease-in-out;
        }

        .search-box:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, .25);
        }

        .search-box .input-group-text {
            background: transparent;
            border: none;
            padding-right: 8px;
        }

        .search-box .form-control {
            border: none;
            background: transparent;
            box-shadow: none;
            padding-left: 0;
            font-size: 13px;
            height: 36px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid;
            display: inline-block;
        }

        .status-trading {
            background-color: #f1f5f9;
            color: #475569;
            border-color: #cbd5e1;
        }

        .status-completed {
            background-color: #e6f6ee;
            color: #008a47;
            border-color: #c2ebd5;
        }

        .status-unreceived {
            background-color: #fff4e5;
            color: #ff9800;
            border-color: #ffe5cc;
        }

        .status-cancelled {
            background-color: #fef2f2;
            color: #dc2626;
            border-color: #fecaca;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 pt-2">
        <h4 class="fw-bold mb-0 text-dark">Danh sách đơn nhập hàng</h4>
        <div class="d-flex gap-2">
            <a th:href="@{/ui/imports/create}" class="btn btn-primary fw-bold px-3 shadow-sm">
                <i class="bi bi-plus-circle me-2"></i>Tạo đơn nhập hàng
            </a>
        </div>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 8px;">

        <div class="card-header bg-white border-0 p-0"
             th:with="dbStatuses=${@masterDataService.getMasterDataByType('RECEIPT_STATUS')}">
            <ul class="nav nav-tabs nav-tabs-custom border-bottom px-3" id="statusTabs">
                <li class="nav-item"><a class="nav-link active" data-status="ALL">Tất cả</a></li>
                <li class="nav-item" th:each="st : ${dbStatuses}">
                    <a class="nav-link" th:data-status="${st.dataValue}" th:text="${st.dataLabel}"></a>
                </li>

                <th:block th:if="${#lists.isEmpty(dbStatuses)}">
                    <li class="nav-item"><a class="nav-link" data-status="TRADING">Đang giao dịch</a></li>
                    <li class="nav-item"><a class="nav-link" data-status="COMPLETED">Hoàn thành</a></li>
                    <li class="nav-item"><a class="nav-link" data-status="CANCELLED">Đã hủy</a></li>
                </th:block>
            </ul>
        </div>

        <div class="card-body p-0">
            <div id="defaultToolbar" class="p-3 d-flex flex-column gap-3 bg-white">
                <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap">
                    <div class="input-group search-box flex-grow-1">
                        <span class="input-group-text"><i class="bi bi-search fs-5 text-muted"></i></span>
                        <input type="text" id="searchInput" class="form-control"
                               placeholder="Tìm theo mã đơn nhập, tên nhà cung cấp...">
                    </div>

                    <div class="d-flex gap-2 align-items-center flex-wrap">
                        <select id="dateFilter" class="form-select filter-btn w-auto">
                            <option value="ALL">Tất cả thời gian</option>
                            <option value="THIS_WEEK">Tuần này</option>
                            <option value="THIS_MONTH">Tháng này</option>
                            <option value="THIS_YEAR">Năm nay</option>
                            <option value="CUSTOM">Tùy chọn...</option>
                        </select>

                        <div id="customDateRange" class="d-none gap-2 align-items-center">
                            <input type="date" id="startDate" class="form-control filter-btn w-auto" title="Từ ngày">
                            <span class="text-muted">-</span>
                            <input type="date" id="endDate" class="form-control filter-btn w-auto" title="Đến ngày">
                        </div>

                        <select id="filterImportStatus" class="form-select filter-btn w-auto">
                            <option value="ALL">Tất cả trạng thái nhập</option>
                            <option value="PENDING">Chưa nhập kho</option>
                            <option value="COMPLETED">Đã nhập hàng</option>
                        </select>
                        <button class="btn filter-btn px-3" onclick="window.location.reload()">
                            <i class="bi bi-arrow-clockwise me-2"></i>Làm mới
                        </button>
                    </div>
                </div>
            </div>

            <div id="bulkActionBar" class="d-none align-items-center justify-content-between p-2 px-3"
                 style="background-color: #f0f8ff; border-top: 1px solid #dce0e4; border-bottom: 1px solid #dce0e4;">
                <div class="d-flex align-items-center gap-3">
                    <span class="fw-medium" style="color: #2563eb; font-size: 13px;">
                        Đã chọn <span id="selectedCount" class="fw-bold fs-6">0</span> đơn nhập
                    </span>
                    <span class="text-muted small">|</span>
                    <a href="javascript:void(0)" class="text-decoration-none fw-medium"
                       style="color: #2563eb; font-size: 13px;" onclick="clearSelection()">Bỏ chọn</a>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-white border-danger text-danger fw-medium px-4 shadow-sm"
                            style="font-size: 13px; padding-top: 6px; padding-bottom: 6px;" onclick="deleteSelected()">
                        Xóa đơn hàng
                    </button>
                </div>
            </div>

            <div class="table-responsive" style="min-height: 350px;">
                <table class="table table-custom table-hover align-middle mb-0 text-nowrap" id="importTable">
                    <thead>
                    <tr>
                        <th class="ps-4" style="width: 40px;">
                            <input class="form-check-input" type="checkbox" id="checkAll" onchange="toggleAll(this)">
                        </th>
                        <th class="text-start">Mã đơn nhập</th>
                        <th>Ngày tạo</th>
                        <th>Trạng thái chung</th>
                        <th>Trạng thái nhập kho</th>
                        <th>Nhà cung cấp</th>
                        <th class="text-center">Số lượng</th>
                        <th class="pe-4 text-end">Giá trị đơn</th>
                    </tr>
                    </thead>
                    <tbody id="importTableBody">

                    <tr th:each="order : ${importOrders}"
                        class="import-row"
                        th:data-search="|${order.code} ${order.supplier != null ? order.supplier.name : ''}|"
                        th:data-trading-status="${order.status}"
                        th:data-import-status="${order.importStatus}"
                        th:data-date="${order.createdAt}">

                        <td class="ps-4">
                            <input class="form-check-input item-check" type="checkbox" th:value="${order.id}"
                                   onchange="updateBulkAction()">
                        </td>
                        <td class="text-start">
                            <a th:href="@{/ui/imports/{code}(code=${order.code})}"
                               class="fw-bold text-primary text-decoration-none" th:text="${order.code}"></a>
                        </td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

                        <td>
                            <span class="status-badge"
                                  th:classappend="${order.status == 'CANCELLED' ? 'status-cancelled' : (order.status == 'COMPLETED' ? 'status-completed' : 'status-trading')}">
                                <th:block th:each="st : ${@masterDataService.getMasterDataByType('RECEIPT_STATUS')}">
                                    <span th:if="${st.dataValue == order.status}" th:text="${st.dataLabel}"
                                          th:remove="tag"></span>
                                </th:block>
                                <th:block th:if="${@masterDataService.getMasterDataByType('RECEIPT_STATUS').isEmpty()}">
                                    <span th:text="${order.status == 'TRADING' ? 'Đang giao dịch' : (order.status == 'COMPLETED' ? 'Hoàn thành' : 'Đã hủy')}"
                                          th:remove="tag"></span>
                                </th:block>
                            </span>
                        </td>

                        <td>
                            <span class="status-badge"
                                  th:classappend="${order.importStatus == 'COMPLETED' ? 'status-completed' : 'status-unreceived'}">
                                <th:block th:each="st : ${@masterDataService.getMasterDataByType('IMPORT_STATUS')}">
                                    <span th:if="${st.dataValue == order.importStatus}" th:text="${st.dataLabel}"
                                          th:remove="tag"></span>
                                </th:block>
                                <th:block th:if="${@masterDataService.getMasterDataByType('IMPORT_STATUS').isEmpty()}">
                                    <span th:text="${order.importStatus == 'PENDING' ? 'Chưa nhập kho' : 'Đã nhập kho'}"
                                          th:remove="tag"></span>
                                </th:block>
                            </span>
                        </td>

                        <td class="fw-medium text-dark"
                            th:text="${order.supplier != null ? order.supplier.name : '---'}"></td>
                        <td class="text-center fw-medium" th:text="${order.totalQuantity}"></td>
                        <td class="pe-4 text-end fw-bold text-dark"
                            th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                    </tr>

                    <tr id="emptySearchRow" style="display: none;" data-empty>
                        <td colspan="8" class="text-center p-5 text-muted">
                            <i class="bi bi-search fs-2 d-block mb-2"></i>Không tìm thấy kết quả phù hợp
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(importOrders)}" data-empty>
                        <td colspan="8" class="text-center p-5 text-muted">
                            <i class="bi bi-box-seam fs-2 d-block mb-2"></i>Hệ thống chưa có đơn nhập hàng nào
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="p-3 d-flex justify-content-between align-items-center border-top bg-white">
                <div class="text-muted small" id="recordInfo"></div>
                <nav>
                    <ul class="pagination pagination-sm mb-0" id="importPagination"></ul>
                </nav>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            const searchInput = document.getElementById('searchInput');
            const filterImportStatus = document.getElementById('filterImportStatus');
            const dateFilter = document.getElementById('dateFilter');
            const customDateRange = document.getElementById('customDateRange');
            const startDate = document.getElementById('startDate');
            const endDate = document.getElementById('endDate');

            const tabs = document.querySelectorAll('#statusTabs .nav-link');
            const tbody = document.getElementById('importTableBody');
            const emptyRow = document.getElementById('emptySearchRow');

            // SẮP XẾP: Đơn mới nhất lên đầu tiên khi trang load
            let rowsArray = Array.from(document.querySelectorAll('.import-row'));
            rowsArray.sort((a, b) => {
                const dateA = new Date(a.getAttribute('data-date') || 0);
                const dateB = new Date(b.getAttribute('data-date') || 0);
                return dateB - dateA; // Sắp xếp giảm dần (Mới nhất lên trước)
            });
            // Re-append lại vào DOM theo thứ tự mới
            rowsArray.forEach(row => tbody.appendChild(row));

            // Khởi tạo phân trang client-side (bỏ qua dòng đã bị lọc data-filtered-out)
            const importPager = OMSPaginate({tbodyId: 'importTableBody', pageSize: 20, paginationId: 'importPagination', infoId: 'recordInfo', noun: 'đơn hàng'});

            // Logic Bộ lọc Thời gian
            dateFilter.addEventListener('change', function () {
                if (this.value === 'CUSTOM') {
                    customDateRange.classList.remove('d-none');
                    customDateRange.classList.add('d-flex');
                } else {
                    customDateRange.classList.add('d-none');
                    customDateRange.classList.remove('d-flex');
                    applyFilters();
                }
            });

            function applyFilters() {
                const searchTerm = searchInput ? searchInput.value.trim().toLowerCase() : '';
                const importStatusTerm = filterImportStatus ? filterImportStatus.value : 'ALL';
                const dateFilterVal = dateFilter ? dateFilter.value : 'ALL';

                const startVal = startDate ? startDate.value : '';
                const endVal = endDate ? endDate.value : '';

                const activeTabEl = document.querySelector('#statusTabs .nav-link.active');
                const activeTab = activeTabEl ? activeTabEl.getAttribute('data-status') : 'ALL';

                // Lấy mốc thời gian chuẩn bị cho Date Filter
                const now = new Date();

                // Mốc Tuần này
                const startOfWeek = new Date(now);
                const day = startOfWeek.getDay();
                const diff = startOfWeek.getDate() - day + (day === 0 ? -6 : 1);
                startOfWeek.setDate(diff);
                startOfWeek.setHours(0, 0, 0, 0);

                // Mốc Tháng này, Năm nay
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                const startOfYear = new Date(now.getFullYear(), 0, 1);

                let hasVisible = false;

                rowsArray.forEach(row => {
                    const searchData = (row.getAttribute('data-search') || '').toLowerCase();
                    const tradingStatus = row.getAttribute('data-trading-status');
                    const importStatus = row.getAttribute('data-import-status');
                    const rowDate = new Date(row.getAttribute('data-date') || 0);

                    // Check Logic Cũ
                    const matchSearch = searchData.includes(searchTerm);
                    const matchTab = (activeTab === "ALL" || tradingStatus === activeTab);
                    const matchSelect = (importStatusTerm === "ALL" || importStatus === importStatusTerm);

                    // Check Logic Ngày tháng
                    let matchDate = true;
                    if (dateFilterVal !== 'ALL') {
                        if (dateFilterVal === 'THIS_WEEK') {
                            matchDate = rowDate >= startOfWeek;
                        } else if (dateFilterVal === 'THIS_MONTH') {
                            matchDate = rowDate >= startOfMonth;
                        } else if (dateFilterVal === 'THIS_YEAR') {
                            matchDate = rowDate >= startOfYear;
                        } else if (dateFilterVal === 'CUSTOM') {
                            if (startVal) {
                                const s = new Date(startVal);
                                s.setHours(0, 0, 0, 0);
                                if (rowDate < s) matchDate = false;
                            }
                            if (endVal) {
                                const e = new Date(endVal);
                                e.setHours(23, 59, 59, 999);
                                if (rowDate > e) matchDate = false;
                            }
                        }
                    }

                    if (matchSearch && matchTab && matchSelect && matchDate) {
                        row.setAttribute('data-filtered-out', '0');
                        hasVisible = true;
                    } else {
                        row.setAttribute('data-filtered-out', '1');
                    }
                });

                if (emptyRow) {
                    emptyRow.style.display = (!hasVisible && rowsArray.length > 0) ? '' : 'none';
                }
                // Phân trang lại trên tập kết quả vừa lọc
                if (importPager) importPager.refresh();
                updateBulkAction();
            }

            if (searchInput) searchInput.addEventListener('input', applyFilters);
            if (filterImportStatus) filterImportStatus.addEventListener('change', applyFilters);
            if (startDate) startDate.addEventListener('change', applyFilters);
            if (endDate) endDate.addEventListener('change', applyFilters);

            tabs.forEach(tab => {
                tab.addEventListener('click', function (e) {
                    e.preventDefault();
                    tabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    applyFilters();
                });
            });
        });

        function toggleAll(source) {
            const checkboxes = document.querySelectorAll('.item-check');
            checkboxes.forEach(cb => {
                const tr = cb.closest('tr');
                // Chỉ chọn dòng đang thực sự hiển thị (không bị ẩn bởi lọc hoặc phân trang)
                const visible = tr.style.display !== 'none' && tr.getAttribute('data-filtered-out') !== '1';
                if (visible) {
                    cb.checked = source.checked;
                }
            });
            updateBulkAction();
        }

        function clearSelection() {
            document.querySelectorAll('.item-check, #checkAll').forEach(cb => cb.checked = false);
            updateBulkAction();
        }

        function updateBulkAction() {
            const count = document.querySelectorAll('.item-check:checked').length;
            const bulkBar = document.getElementById('bulkActionBar');
            const toolbar = document.getElementById('defaultToolbar');

            if (count > 0) {
                document.getElementById('selectedCount').innerText = count;
                toolbar.classList.add('d-none');
                bulkBar.classList.remove('d-none');
                bulkBar.classList.add('d-flex');
            } else {
                toolbar.classList.remove('d-none');
                bulkBar.classList.add('d-none');
                bulkBar.classList.remove('d-flex');
            }
        }

        async function deleteSelected() {
            const checkedBoxes = document.querySelectorAll('.item-check:checked');

            if (checkedBoxes.length === 0) {
                Toast.fire({icon: 'warning', title: 'Vui lòng chọn ít nhất 1 đơn nhập hàng để xóa!'});
                return;
            }

            const ids = Array.from(checkedBoxes).map(cb => Number(cb.value));

            const confirmation = await Swal.fire({
                title: 'Xác nhận xóa hàng loạt',
                text: `Bạn có chắc chắn muốn xóa ${ids.length} đơn nhập hàng đã chọn không? Thao tác này không thể hoàn tác.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Xác nhận xóa',
                cancelButtonText: 'Hủy bỏ'
            });

            if (!confirmation.isConfirmed) return;

            try {
                const res = await fetch('/api/v1/imports/bulk-delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(ids)
                });

                if (res.ok) {
                    await Toast.fire({icon: 'success', title: `Đã xóa thành công ${ids.length} đơn nhập hàng!`});
                    window.location.reload();
                } else {
                    const err = await res.json();
                    Toast.fire({icon: 'error', title: 'Lỗi: ' + (err.message || 'Không thể xóa đơn hàng!')});
                }
            } catch (err) {
                Toast.fire({icon: 'error', title: 'Lỗi kết nối đến máy chủ!'});
            }
        }
    </script>
</div>
</body>
</html>
