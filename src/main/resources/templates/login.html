<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${storeName != null ? 'Đăng nhập - ' + storeName : 'Đăng nhập - OMS'}">Đăng nhập - OMS</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #0d6efd;
            --primary-hover: #0b5ed7;
            --bg-color: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            background-color: var(--bg-color);
            /* Background họa tiết chấm bi mờ công nghệ */
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 15px;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            /* Tăng padding top một chút khi bỏ logo */
            padding: 48px 32px 40px 32px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            letter-spacing: -0.75px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        .input-group {
            border-radius: 8px;
            transition: all 0.2s;
        }

        .input-group-text {
            background: #ffffff;
            border-color: var(--border-color);
            color: #94a3b8;
            border-right: none;
            border-radius: 8px 0 0 8px;
            padding-left: 16px;
        }

        .form-control-custom {
            border-left: none;
            border-color: var(--border-color);
            background: #ffffff;
            padding: 12px 16px 12px 0;
            font-size: 14px;
            color: var(--text-main);
            border-radius: 0 8px 8px 0;
        }

        .form-control-custom::placeholder {
            color: #cbd5e1;
        }

        .form-control-custom:focus {
            box-shadow: none;
        }

        /* KHẮC PHỤC LỖI AUTOFILL MÀU XANH CỦA CHROME (GIỮ NỀN TRẮNG) */
        .form-control-custom:-webkit-autofill,
        .form-control-custom:-webkit-autofill:hover,
        .form-control-custom:-webkit-autofill:focus,
        .form-control-custom:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            -webkit-text-fill-color: var(--text-main) !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control-custom {
            background: #ffffff;
            border-color: var(--primary-color);
        }

        .input-group:focus-within {
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15);
        }

        .btn-login {
            background: var(--primary-color);
            border: none;
            padding: 12px;
            font-weight: 600;
            font-size: 15px;
            border-radius: 8px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(13, 110, 253, 0.25);
        }

        .alert-custom {
            font-size: 13px;
            border-radius: 8px;
            padding: 12px 16px;
            border: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .copyright {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h2 class="login-title">Chào mừng trở lại!</h2>
            <div class="login-subtitle">Đăng nhập để vào hệ thống quản trị <span
                    th:text="${storeName != null ? storeName : 'OMS'}">OMS</span></div>
        </div>

        <div th:if="${param.error}" class="alert alert-danger alert-custom mb-4">
            <i class="bi bi-exclamation-circle-fill fs-5"></i>
            <span>Tài khoản hoặc mật khẩu không chính xác!</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-success alert-custom mb-4">
            <i class="bi bi-check-circle-fill fs-5"></i>
            <span>Bạn đã đăng xuất khỏi hệ thống an toàn.</span>
        </div>

        <form th:action="@{/perform_login}" method="post">
            <div class="mb-4">
                <label class="form-label">Tài khoản</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control form-control-custom" required autofocus
                           placeholder="Nhập tên đăng nhập">
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label class="form-label mb-0">Mật khẩu</label>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control form-control-custom" required
                           placeholder="Nhập mật khẩu">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100">
                Đăng nhập vào hệ thống <i class="bi bi-arrow-right ms-1"></i>
            </button>
        </form>
    </div>

</div>
<div class="copyright"
     th:text="'&copy; 2026 ' + (${storeName != null ? storeName : 'MECHKEY'}) + ' OMS. All rights reserved.'">
    &copy; 2026 MECHKEY OMS. All rights reserved.
</div>

</body>
</html>
